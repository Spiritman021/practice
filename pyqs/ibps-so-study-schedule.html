<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBPS SO Prelims 2026 — 75-Day Study Schedule</title>
<meta name="description" content="Interactive 75-day study schedule for IBPS SO Prelims 2026 with daily tasks, progress tracking, and analytics.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a1a;--card:#12122a;--card2:#1a1a3e;--border:#2a2a5a;
--accent:#6c5ce7;--accent2:#a29bfe;--accent3:#fd79a8;
--green:#00b894;--yellow:#fdcb6e;--red:#e17055;--blue:#74b9ff;
--cyan:#81ecec;--orange:#e17055;
--text:#e8e8f0;--text2:#a0a0c0;--text3:#707090;
--radius:12px;--shadow:0 4px 20px rgba(0,0,0,0.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

/* HEADER */
.hero{background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 40%,#2d1b69 100%);padding:40px 20px 30px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(108,92,231,0.08) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(253,121,168,0.06) 0%,transparent 50%);animation:heroGlow 8s ease-in-out infinite alternate}
@keyframes heroGlow{0%{transform:rotate(0deg)}100%{transform:rotate(3deg)}}
.hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;background:linear-gradient(135deg,#a29bfe,#fd79a8,#fdcb6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}
.hero .subtitle{font-size:clamp(.85rem,2vw,1.05rem);color:var(--text2);margin-top:8px;position:relative;z-index:1}
.hero .exam-date{display:inline-block;margin-top:14px;padding:8px 20px;background:rgba(108,92,231,0.2);border:1px solid var(--accent);border-radius:20px;font-weight:600;font-size:.9rem;color:var(--accent2);position:relative;z-index:1}

/* COUNTDOWN */
.countdown-bar{display:flex;justify-content:center;gap:20px;padding:20px;background:var(--card);border-bottom:1px solid var(--border)}
.cd-item{text-align:center}
.cd-num{font-size:1.8rem;font-weight:800;color:var(--accent2)}
.cd-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px}

/* NAV TABS */
.nav-tabs{display:flex;gap:6px;padding:16px 20px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:wrap;justify-content:center}
.nav-tab{padding:8px 18px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .2s;white-space:nowrap}
.nav-tab:hover{border-color:var(--accent);color:var(--accent2)}
.nav-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* OVERVIEW STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;padding:20px;max-width:1200px;margin:0 auto}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-val{font-size:1.6rem;font-weight:800}
.stat-label{font-size:.72rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* PHASE SECTIONS */
.phase-section{max-width:1200px;margin:0 auto;padding:20px}
.phase-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.phase-badge{padding:6px 14px;border-radius:6px;font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:1px}
.phase-title{font-size:1.3rem;font-weight:700}
.phase-dates{font-size:.8rem;color:var(--text3)}
.phase-desc{font-size:.85rem;color:var(--text2);margin-bottom:20px;padding:14px;background:var(--card);border-radius:var(--radius);border-left:3px solid var(--accent)}

/* WEEK BLOCKS */
.week-block{margin-bottom:24px}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card2);border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--border);cursor:pointer;user-select:none}
.week-header:hover{background:rgba(108,92,231,0.1)}
.week-title{font-weight:700;font-size:.95rem}
.week-progress{display:flex;align-items:center;gap:10px}
.week-pct{font-size:.8rem;font-weight:600;color:var(--accent2)}
.week-bar{width:100px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.week-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}
.week-chevron{font-size:1.2rem;color:var(--text3);transition:transform .3s}
.week-header.collapsed .week-chevron{transform:rotate(-90deg)}
.week-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
.week-body.hidden{display:none}

/* DAY CARDS */
.day-card{display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:14px 16px;border-bottom:1px solid rgba(42,42,90,0.5);align-items:start;transition:background .2s}
.day-card:hover{background:rgba(108,92,231,0.04)}
.day-card:last-child{border-bottom:none}
.day-card.revision{background:rgba(253,203,110,0.05)}
.day-card.mock{background:rgba(0,184,148,0.05)}
.day-card.rest{background:rgba(129,236,236,0.05)}
.day-card.completed{opacity:0.6}

.day-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:2px;background:transparent}
.day-check:hover{border-color:var(--accent)}
.day-check.checked{background:var(--green);border-color:var(--green)}
.day-check.checked::after{content:'✓';color:#fff;font-size:.75rem;font-weight:700}

.day-info{min-width:0}
.day-date{font-size:.72rem;color:var(--text3);margin-bottom:2px}
.day-title{font-weight:700;font-size:.88rem;margin-bottom:6px}

.day-tasks{display:flex;flex-direction:column;gap:4px}
.task-item{display:flex;align-items:flex-start;gap:8px;font-size:.78rem;color:var(--text2);line-height:1.4}
.task-tag{padding:1px 6px;border-radius:4px;font-size:.65rem;font-weight:700;flex-shrink:0;margin-top:1px}
.tag-r{background:rgba(108,92,231,0.2);color:var(--accent2)}
.tag-q{background:rgba(0,184,148,0.2);color:var(--green)}
.tag-e{background:rgba(253,121,168,0.2);color:var(--accent3)}
.tag-m{background:rgba(253,203,110,0.2);color:var(--yellow)}
.tag-rev{background:rgba(129,236,236,0.2);color:var(--cyan)}

.day-hours{font-size:.7rem;color:var(--text3);text-align:right;white-space:nowrap;flex-shrink:0}

/* DAILY ROUTINE */
.routine-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:20px 0}
.routine-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.routine-time{font-size:.7rem;color:var(--accent2);font-weight:600;margin-bottom:4px}
.routine-task{font-weight:600;font-size:.85rem}
.routine-desc{font-size:.72rem;color:var(--text3);margin-top:4px}

/* ANALYTICS */
.analytics{max-width:1200px;margin:0 auto;padding:20px}
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.chart-title{font-weight:700;font-size:1rem;margin-bottom:14px}
.hbar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hbar-label{width:80px;font-size:.75rem;color:var(--text2);text-align:right;flex-shrink:0}
.hbar-track{flex:1;height:20px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:4px;transition:width .6s}
.hbar-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.65rem;font-weight:600;color:rgba(255,255,255,0.9)}

/* NOTES */
.notes-section{max-width:1200px;margin:0 auto;padding:20px}
.notes-area{width:100%;min-height:120px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;resize:vertical;outline:none}
.notes-area:focus{border-color:var(--accent)}
.notes-btn{margin-top:10px;padding:8px 20px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:.8rem}
.notes-btn:hover{background:var(--accent2)}

/* BACK LINK */
.back-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;color:var(--accent2);font-size:.85rem;font-weight:500}

/* TAB CONTENT */
.tab-content{display:none}
.tab-content.active{display:block}

/* RESPONSIVE */
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
  .stat-card{padding:12px}
  .stat-val{font-size:1.2rem}
  .day-card{grid-template-columns:auto 1fr;gap:10px;padding:10px 12px}
  .day-hours{display:none}
  .countdown-bar{gap:12px}
  .cd-num{font-size:1.3rem}
  .phase-section,.analytics,.notes-section{padding:12px}
  .routine-grid{grid-template-columns:1fr}
  .week-bar{width:60px}
  .hero{padding:24px 14px 20px}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease forwards}
</style>
</head>

<a href="../index.html" class="back-link">← Back to Practice Hub</a>

<div class="hero">
  <h1>📅 75-Day IBPS SO Prelims Battle Plan</h1>
  <p class="subtitle">15 June → 28 August 2026 • 4-5 Hours/Day • Complete Roadmap</p>

<div class="countdown-bar" id="countdown">

<div class="nav-tabs" id="navTabs">

  <div class="nav-tab" data-tab="phase2">⚡ Phase 2</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA: Complete 75-day schedule
// ═══════════════════════════════════════════════════════════════
const EXAM_DATE = new Date(2026, 7, 29); // Aug 29
const START_DATE = new Date(2026, 5, 15); // Jun 15

let MENTOR_FEEDBACK = `Welcome to Day 2 of your prep! Today you tackle Linear SA Advanced, Average basics, and RC strategies. Keep your focus on accuracy rather than speed today. Make sure to log your progress in the Notes & AI Sync tab at the end of the day to get your trajectory update!`;

const PHASES = [
  {id:'phase1',name:'Phase 1: Foundation Completion',color:'#6c5ce7',dates:'Jun 15 – Jul 5 (21 days)',
   desc:'Complete ALL remaining topics. Goal: 100% syllabus coverage. Focus on learning new concepts from Adda247 videos + practice 15-20 Qs per topic daily.'},
  {id:'phase2',name:'Phase 2: Practice & Speed Building',color:'#00b894',dates:'Jul 6 – Jul 26 (21 days)',
   desc:'Master speed & accuracy via sectional tests and mocks. Goal: Attempt 35+ in Reasoning, 30+ in Quant, 35+ in English within time.'},
  {id:'phase3',name:'Phase 3: Mock Test Mastery',color:'#fdcb6e',dates:'Jul 27 – Aug 16 (21 days)',
   desc:'1 mock per day + deep analysis. Goal: Consistent 100+ score. Build exam temperament, time management, and stamina.'},
  {id:'phase4',name:'Phase 4: Final Sprint & Revision',color:'#fd79a8',dates:'Aug 17 – Aug 28 (12 days)',
   desc:'Revision only. No new topics. Focus on formula sheets, tricks, PYQ revision, and mental preparation. Sleep well.'}
];

const DAILY_ROUTINE = [
  {time:'First 30 min',task:'📖 Grammar + Editorial',desc:'10 grammar rules (Nimisha mam) + 1 Hindu editorial'},
  {time:'Next 1.5 hrs',task:'🎯 Primary Topic',desc:'New topic from Adda247 video + make notes'},
  {time:'Next 1 hr',task:'📝 Secondary Topic',desc:'Practice yesterday\'s topic OR 2nd new topic'},
  {time:'Next 1 hr',task:'⚡ Practice Set',desc:'15-20 Qs on primary topic (timed)'},
  {time:'Last 30 min',task:'🔄 Vocab + Revision',desc:'5 new words + revise yesterday\'s notes'}
];

// Helper to create a day entry
function D(month,date,dayName,title,tasks,type,hours){
  const daysOfWeek = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const computedDayName = daysOfWeek[new Date(2026, month, date).getDay()];
  return {month,date,dayName:computedDayName,title,tasks,type:type||'normal',hours:hours||'4-5h'};
}
// Task: [tag, description]  tag = R/Q/E/M/REV
function T(tag,desc){return {tag,desc};}

const SCHEDULE = {
// ═══════ PHASE 1: FOUNDATION (Jun 15 - Jul 5) ═══════
phase1: [
  // Week 1: Jun 15-21 - Seating Arrangement + Quant Basics + Grammar Sprint
  {name:'Week 1: Seating Arrangement + Quant Basics + Grammar Sprint',days:[
    D(5,15,'Mon','Linear SA + Simplification + Grammar',[T('R','SA Linear: Single row, facing North/South — Learn from Adda247 video'),T('E','Grammar Rules 16-30 (Nimisha mam) — Take notes'),T('Q','Simplification & Approximation — Tricks + 20 speed Qs'),T('R','Practice: 10 SA Linear basic Qs')],'normal','4.5h'),
    D(5,16,'Tue','Linear SA Advanced + Average + RC',[T('R','SA Linear: Double row, facing each other — Video + Practice'),T('Q','Average — Basic concepts + 15 practice Qs'),T('E','RC Strategy: Learn to identify question types — 1 passage'),T('R','Practice: 10 SA Linear advanced Qs')],'normal','4.5h'),
    D(5,17,'Wed','Circular SA + Boats & Streams + Grammar',[T('R','SA Circular: Even positions, facing inside/outside — Video'),T('Q','Boats & Streams — Concepts of upstream, downstream + 15 Qs'),T('E','Grammar Rules 31-45 — Make formula sheet'),T('R','Practice: 10 SA Circular Qs')],'normal','4.5h'),
    D(5,18,'Thu','Complex SA + Number Series & Quadratic',[T('R','SA Square, Triangular & Complex arrangements — Video + Notes'),T('Q','Revision: Number Series & Quadratic Eq patterns — 15 Qs speed drill'),T('E','Grammar Rules 46-60'),T('R','Practice: 10 SA Complex Qs')],'normal','4.5h'),
    D(5,19,'Fri','Floor Puzzle + Time & Work + Grammar',[T('R','Puzzles: Floor-based single variable — Video + technique'),T('Q','Time & Work — Concept of efficiency, alternate days + 15 Qs'),T('E','Grammar Rules 61-75'),T('R','Practice: 4 Floor Puzzle sets')],'normal','5h'),
    D(5,20,'Sat','Floor Puzzle (Multi) + Pipes & Cisterns + Cloze',[T('R','Puzzles: Floor-based multi-variable — Video'),T('Q','Pipes & Cisterns — Concept of inlet/outlet pipes + 10 Qs'),T('E','Grammar Rules 76-90 + Cloze Test basic concept'),T('R','Practice: 4 Multi-variable Floor Puzzles')],'normal','5h'),
    D(5,21,'Sun','🔄 Week 1 Revision Day',[T('REV','Revise SA & Puzzles — Quick concept recap (30 min)'),T('REV','Grammar Rules 91-105 — Note error-prone rules'),T('REV','Quant Revision: Average, Boats & Streams, T&W — 15 mixed Qs'),T('R','Reasoning Sectional: 30 Qs in 25 min — Score yourself')],'revision','4.5h'),
  ]},
  // Week 2: Jun 22-28 - Advanced Puzzles + DI Basics + English Core
  {name:'Week 2: Puzzles + DI Basics + English Core',days:[
    D(5,22,'Mon','Box Puzzle + TSD + RC Deep',[T('R','Puzzles: Box-based & scheduling type — Video + Notes'),T('Q','Time Speed Distance basics — Concept of relative speed + 10 Qs'),T('E','Grammar Rules 106-120 — Complete the set!'),T('R','Practice: 4 Box puzzle sets')],'normal','5h'),
    D(5,23,'Tue','Multi-Parameter Puzzle + Trains + Para Jumbles',[T('R','Puzzles: Multi-parameter complex (3+ variables) — Video'),T('Q','Trains & Speed Math — Concept of poles, bridges, overtaking + 10 Qs'),T('E','Para Jumble: Concept + 10 Qs — Learn link-sentence method'),T('R','Practice: 4 complex puzzle sets')],'normal','5h'),
    D(5,24,'Wed','Machine Input-Output + Table DI Basics + Sentence Imp',[T('R','Machine Input-Output: Pattern identification — Video + Notes'),T('Q','DI Table Basics — How to read charts, ratio & percentage calculation + 2 sets'),T('E','Sentence Improvement/Correction — Concept + 10 Qs'),T('R','Practice: 3 Machine I/O sets')],'normal','5h'),
    D(5,25,'Thu','Data Sufficiency (R) + Pie Chart DI + Word Interchange',[T('R','Data Sufficiency (Reasoning): When data is sufficient — Video'),T('Q','DI Pie Chart Basics — Degree to percentage conversion + 2 sets'),T('E','Word Interchange (new pattern) — Concept + examples'),T('R','Practice: 10 Data Sufficiency Qs')],'normal','4.5h'),
    D(5,26,'Fri','Order & Ranking + Bar DI + Fill in Blanks',[T('R','Order & Ranking — Concept + 15 Qs'),T('Q','DI Bar Graph Basics — Comparison & average calculation + 2 sets'),T('E','Inappropriate Word (passage-based) — Concept + practice'),T('R','Practice: 10 ranking Qs')],'normal','4.5h'),
    D(5,27,'Sat','Logical Reasoning + Line DI + Fillers',[T('R','Logical/Critical Reasoning: Course of action, assumptions — Video'),T('Q','DI Line Graph Basics — Growth rate calculation + 2 sets'),T('E','Double Fillers + Column-based matching — Concept + 10 Qs'),T('R','Practice: 10 logical reasoning Qs')],'normal','5h'),
    D(5,28,'Sun','🔄 Week 2 Revision',[T('REV','Revise all Puzzles & Machine I/O — Quick tricks'),T('REV','English Sectional: 30 Qs in 25 min — Score yourself'),T('REV','Quant Revision: TSD, Trains, DI basics — 15 mixed Qs'),T('REV','Review all mistakes + update formula sheet')],'revision','4h'),
  ]},
  // Week 3: Jun 29 - Jul 5 - Advanced DI + Deep Practice
  {name:'Week 3: Advanced DI + Reasoning & English Practice',days:[
    D(5,29,'Mon','Advanced Table DI + SA Practice + RC',[T('Q','DI Table (Advanced) — Missing values, logical table DI + 3 sets'),T('R','SA Practice: 10 mixed SA Qs (timed 15 min)'),T('E','RC: 2 passages — Focus on vocab-based Qs'),T('Q','Practice: 2 more advanced table DI sets')],'normal','5h'),
    D(5,30,'Tue','Advanced Pie DI + Circular SA + Error Detection',[T('Q','DI Pie Chart (Advanced) — Double pie chart, degree + percentage + 3 sets'),T('R','SA Circular Practice: 10 Qs (timed)'),T('E','Error Detection: 15 Qs timed practice'),T('Q','Practice: 2 more double pie DI sets')],'normal','5h'),
    D(6,1,'Wed','Advanced Bar DI + Puzzle Practice + Cloze',[T('Q','DI Bar Graph (Advanced) — Stacked bar chart, profit/loss charts + 3 sets'),T('R','Puzzle Practice: 10 Qs (2 sets, timed 15 min)'),T('E','Cloze Test: 2 passages practice'),T('Q','Practice: 2 more advanced bar graph sets')],'normal','5h'),
    D(6,2,'Thu','Advanced Line DI + Machine I/O + Para Jumble',[T('Q','DI Line Graph (Advanced) — Multiple line chart, ratio line graphs + 3 sets'),T('R','Machine I/O: 10 Qs timed practice'),T('E','Para Jumble: 10 Qs practice'),T('Q','Practice: Mixed DI — 1 table + 1 pie + 1 bar')],'normal','5h'),
    D(6,3,'Fri','DI Caselet/Missing + Mixed Reasoning + Word Interchange',[T('Q','DI Caselet & Missing DI — Paragraph-based DI, Venn diagram DI + 3 sets'),T('R','Mixed Reasoning: 20 Qs from all topics (timed 25 min)'),T('E','Word Interchange + Fillers: 10 Qs'),T('Q','Practice: 2 caselet sets')],'normal','5h'),
    D(6,4,'Sat','Quant Data Sufficiency + RC Advanced + Logical R',[T('Q','Data Sufficiency (Quant) — Statement sufficiency for arithmetic & DI + 15 Qs'),T('R','Logical Reasoning: 10 Qs — Strengthen weak areas'),T('E','RC Advanced: 2 long passages with all Q types'),T('Q','TSD & Trains Advanced revision — 10 Qs')],'normal','5h'),
    D(6,5,'Sun','🔄 PHASE 1 COMPLETION',[T('REV','Quant Sectional: 50 Qs in 40 min — Full test'),T('REV','Full Syllabus checklist — Mark every topic as ✅ or ⚠️'),T('REV','Make final formula sheet for all 3 subjects'),T('REV','Identify top 5 weak areas for Phase 2 focus')],'revision','4h'),
  ]},
],
// ═══════ PHASE 2: PRACTICE & SPEED (Jul 6 - Jul 26) ═══════
phase2: [
  // Week 4: Jul 6-12 - Sectional Mastery & Speed Building
  {name:'Week 4: Sectional Mastery & Speed Building',days:[
    D(6,6,'Mon','Puzzle & DI Sprint',[T('R','Puzzle Speed Drill: 5 sets timed (5 min each max)'),T('Q','DI Practice: 3 sets from all types (timed 20 min)'),T('E','RC: 3 passages timed (20 min total)'),T('REV','Analyze: Which puzzle types take longest?')],'normal','5h'),
    D(6,7,'Tue','SA Sprint + Arithmetic Mix',[T('R','SA Sprint: 5 sets timed — Track time per set'),T('Q','Arithmetic Mix: 20 Qs (all done topics) timed 20 min'),T('E','Error Detection + Sentence Improvement: 15 Qs'),T('REV','Speed log: Note time per question type')],'normal','5h'),

// STORAGE: localStorage integration
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = 'ibps_so_schedule_v2';

function loadProgress(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}
  catch(e){return {};}
}
function saveProgress(data){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}
function toggleDay(dayId){
  const p=loadProgress();
  p[dayId]=!p[dayId];
  saveProgress(p);
  renderCurrentTab();
  updateCountdown();
}

function loadNotes(){
  try{return localStorage.getItem('ibps_so_notes')||'';}catch(e){return '';}
}
function saveNotes(text){
  localStorage.setItem('ibps_so_notes',text);
}

// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════
let currentTab='overview';
const collapsedWeeks = {};

function getDayId(phaseId,weekIdx,dayIdx){
  return `${phaseId}_w${weekIdx}_d${dayIdx}`;
}

function getTagClass(tag){
  const map={R:'tag-r',Q:'tag-q',E:'tag-e',M:'tag-m',REV:'tag-rev'};
  return map[tag]||'tag-r';
}
function getTagLabel(tag){
  const map={R:'REAS',Q:'QUANT',E:'ENG',M:'MOCK',REV:'REV'};
  return map[tag]||tag;
}
function getDayTypeClass(type){
  const map={revision:'revision',mock:'mock',rest:'rest'};
  return map[type]||'';
}

function formatDate(m,d){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[m]} ${d}`;
}

function renderDayCard(day,dayId,progress){
  const checked=progress[dayId]||false;
  const typeClass=getDayTypeClass(day.type);
  const tasksHtml=day.tasks.map(t=>`
    <div class="task-item">
      <span class="task-tag ${getTagClass(t.tag)}">${getTagLabel(t.tag)}</span>
      <span>${t.desc}</span>
    </div>`).join('');
  
  return `
    <div class="day-card ${typeClass} ${checked?'completed':''}" id="card_${dayId}">
      <div class="day-check ${checked?'checked':''}" onclick="toggleDay('${dayId}')" title="Mark as done"></div>
      <div class="day-info">
        <div class="day-date">${day.dayName}, ${formatDate(day.month,day.date)}</div>
        <div class="day-title">${day.title}</div>
        <div class="day-tasks">${tasksHtml}</div>
      </div>
      <div class="day-hours">${day.hours}</div>
    </div>`;
}

function calcWeekProgress(phaseId,weekIdx,week,progress){
  let done=0,total=week.days.length;
  week.days.forEach((d,di)=>{
    if(progress[getDayId(phaseId,weekIdx,di)])done++;
  });
  return {done,total,pct:total?Math.round(done/total*100):0};
}

function renderWeek(phaseId,weekIdx,week,progress){
  const wp=calcWeekProgress(phaseId,weekIdx,week,progress);
  const wKey=`${phaseId}_w${weekIdx}`;
  const isCollapsed=collapsedWeeks[wKey]||false;
  
  const daysHtml=week.days.map((day,di)=>
    renderDayCard(day,getDayId(phaseId,weekIdx,di),progress)
  ).join('');
  
  return `
    <div class="week-block fade-in">
      <div class="week-header ${isCollapsed?'collapsed':''}" onclick="toggleWeek('${wKey}')">
        <span class="week-title">${week.name}</span>
        <div class="week-progress">
          <span class="week-pct">${wp.done}/${wp.total}</span>
          <div class="week-bar"><div class="week-bar-fill" style="width:${wp.pct}%"></div></div>
          <span class="week-pct">${wp.pct}%</span>
          <span class="week-chevron">▼</span>
        </div>
      </div>
      <div class="week-body ${isCollapsed?'hidden':''}" id="wb_${wKey}">
        ${daysHtml}
      </div>
    </div>`;
}

function toggleWeek(wKey){
  collapsedWeeks[wKey]=!collapsedWeeks[wKey];
  const el=document.getElementById('wb_'+wKey);
  const hdr=el.previousElementSibling;
  if(collapsedWeeks[wKey]){el.classList.add('hidden');hdr.classList.add('collapsed');}
  else{el.classList.remove('hidden');hdr.classList.remove('collapsed');}
}

function renderPhase(phaseId){
  const phase=PHASES.find(p=>p.id===phaseId);
  const weeks=SCHEDULE[phaseId];
  const progress=loadProgress();
  
  let html=`<div class="phase-section">
    <div class="phase-header">
      <span class="phase-badge" style="background:${phase.color}22;color:${phase.color};border:1px solid ${phase.color}">${phase.name.split(':')[0]}</span>
      <div>
        <div class="phase-title">${phase.name.split(':')[1]||''}</div>
        <div class="phase-dates">${phase.dates}</div>
      </div>
    </div>
    <div class="phase-desc">${phase.desc}</div>`;
  
  if(phaseId==='phase1'){
    html+=`<h3 style="font-size:.95rem;margin-bottom:14px;color:var(--accent2)">📌 Daily Routine Template (Phase 1)</h3>
    <div class="routine-grid">
      ${DAILY_ROUTINE.map(r=>`<div class="routine-item"><div class="routine-time">${r.time}</div><div class="routine-task">${r.task}</div><div class="routine-desc">${r.desc}</div></div>`).join('')}
    </div>`;
  }
  
  weeks.forEach((week,wi)=>{
    html+=renderWeek(phaseId,wi,week,progress);
  });
  
  html+='</div>';
  return html;
}

function getOverallStats(){
  const progress=loadProgress();
  let totalDays=0,completedDays=0,mocksDone=0;
  let phaseStats={};
  let subjectHours={R:0,Q:0,E:0,M:0,REV:0};
  
  Object.keys(SCHEDULE).forEach(phaseId=>{
    let pDone=0,pTotal=0;
    SCHEDULE[phaseId].forEach((week,wi)=>{
      week.days.forEach((day,di)=>{
        totalDays++;
        pTotal++;
        const id=getDayId(phaseId,wi,di);
        if(progress[id]){
          completedDays++;
          pDone++;
          if(day.type==='mock')mocksDone++;
        }
      });
    });
    phaseStats[phaseId]={done:pDone,total:pTotal,pct:pTotal?Math.round(pDone/pTotal*100):0};
  });
  
  return {totalDays,completedDays,mocksDone,phaseStats,
    pct:totalDays?Math.round(completedDays/totalDays*100):0};
}

function generateAIPrompt(){
  const s=getOverallStats();
  const progress=loadProgress();
  const notes=loadNotes();
  
  let completedDaysList=[];
  let nextPendingDay=null;
  
  Object.keys(SCHEDULE).forEach(phaseId=>{
    SCHEDULE[phaseId].forEach((week,wi)=>{
      week.days.forEach((day,di)=>{
        const id=getDayId(phaseId,wi,di);
        const dateStr=formatDate(day.month,day.date);
        const label=`${dateStr} (${day.dayName}): ${day.title}`;
        if(progress[id]){
          completedDaysList.push(`- [x] ${label}`);
        }else{
          completedDaysList.push(`- [ ] ${label}`);
          if(!nextPendingDay)nextPendingDay=day;
        }
      });
    });
  });

  const recentCompleted=completedDaysList.filter(d=>d.startsWith('- [x]')).slice(-3);
  
  const promptText=`Hi! Here is my daily progress update for IBPS SO Prelims 2026 prep (Current local time: ${new Date().toLocaleDateString()}):

📊 PREPARATION STATUS:
- Overall Progress: ${s.pct}% (${s.completedDays}/${s.totalDays} Days Completed)
- Mock Tests Done: ${s.mocksDone}/26
- Remaining Days: ${s.totalDays-s.completedDays} days

✅ RECENT COMPLETED DAYS:
${recentCompleted.length>0?recentCompleted.join('\n'):'(No days marked as completed yet)'}

🎯 NEXT IN LINE:
${nextPendingDay?`- ${formatDate(nextPendingDay.month,nextPendingDay.date)} (${nextPendingDay.dayName}): ${nextPendingDay.title} (${nextPendingDay.hours})` : 'All scheduled days completed!'}

📝 PERSONAL NOTES & LOG:
${notes?notes:'(No personal notes added yet)'}

Please analyze this progress, provide a summary, and give me a clear action plan and focus tips for my next upcoming topic.`;

  return promptText;
}

function showAIPrompt(){
  const currentNotes=document.getElementById('notesArea').value;
  saveNotes(currentNotes);
  const prompt=generateAIPrompt();
  document.getElementById('aiPromptText').value=prompt;
  document.getElementById('aiPromptContainer').style.display='block';
}

function copyAIPrompt(){
  const copyText=document.getElementById('aiPromptText');
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  try{
    navigator.clipboard.writeText(copyText.value);
    const btn=event.target;
    btn.textContent='✅ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy to Clipboard',1500);
  }catch(err){
    alert('Failed to copy. Please manually select and copy the text.');
  }
}

function getActualProgressData(){
  const progress = loadProgress();
  
  let syllabusTarget = [46, 64, 82, 100, 100, 100, 100, 100, 100, 100, 100, 100];
  let mocksTarget = [0, 0, 0, 0, 1, 3, 7, 12, 17, 22, 26, 26];
  let sectionalsTarget = [0, 1, 2, 3, 5, 8, 10, 14, 18, 22, 26, 30];
  
  let chronDays = [];
  Object.keys(SCHEDULE).forEach(phaseId => {
    SCHEDULE[phaseId].forEach((week, wi) => {
      week.days.forEach((day, di) => {
        const id = `${phaseId}_w${wi}_d${di}`;
        chronDays.push({day, id, phaseId});
      });
    });
  });
  
  let actualSyllabus = [46];
  let actualMocks = [0];
  let actualSectionals = [0];
  
  let cumMocks = 0;
  let cumSectionals = 0;
  let completedPhase1Days = 0;
  
  const weekRanges = [
    {start: 0, end: 6},
    {start: 7, end: 13},
    {start: 14, end: 20},
    {start: 21, end: 27},
    {start: 28, end: 34},
    {start: 35, end: 41},
    {start: 42, end: 48},
    {start: 49, end: 55},
    {start: 56, end: 62},
    {start: 63, end: 69},
    {start: 70, end: 74}
  ];
  
  weekRanges.forEach(range => {
    for(let i = range.start; i <= range.end; i++){
      if(i >= chronDays.length) break;
      const item = chronDays[i];
      const checked = progress[item.id] || false;
      if(checked){
        if(item.phaseId === 'phase1'){
          completedPhase1Days++;
        }
        if(item.day.type === 'mock'){
          cumMocks++;
        }
        if(item.day.tasks.some(t => t.desc.toLowerCase().includes('sectional'))){
          cumSectionals++;
        }
      }
    }
    
    let syllabusPct = 46 + Math.round((Math.min(completedPhase1Days, 21) / 21) * 54);
    actualSyllabus.push(syllabusPct);
    actualMocks.push(cumMocks);
    actualSectionals.push(cumSectionals);
  });
  
  return {
    labels: ['Start', 'Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5', 'Week 6', 'Week 7', 'Week 8', 'Week 9', 'Week 10', 'Week 11'],
    syllabus: { target: syllabusTarget, actual: actualSyllabus },
    mocks: { target: mocksTarget, actual: actualMocks },
    sectionals: { target: sectionalsTarget, actual: actualSectionals }
  };
}

function generateTrajectoryTable(type, targetData, actualData, milestones){
  const labels = ['Start', 'Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5', 'Week 6', 'Week 7', 'Week 8', 'Week 9', 'Week 10', 'Week 11'];
  
  let html = `
    <div style="margin-top:10px; overflow-x:auto;">
      <table style="width:100%; border-collapse:collapse; font-size:0.75rem; text-align:left; color:var(--text2); min-width: 480px;">
        <thead>
          <tr style="border-bottom:1px solid var(--border); color:var(--text3);">
            <th style="padding:6px 8px; width: 15%;">Timeline</th>
            <th style="padding:6px 8px; width: 15%; text-align: center;">Target Goal</th>
            <th style="padding:6px 8px; width: 15%; text-align: center;">Your Actual</th>
            <th style="padding:6px 8px; width: 55%;">Weekly Milestone Focus</th>
          </tr>
        </thead>
        <tbody>
  `;
  
  const today = new Date();
  const diffDays = Math.floor((today - START_DATE)/(1000*60*60*24));
  const currentWeekNum = Math.min(11, Math.max(1, Math.ceil((diffDays + 1)/7)));
  
  for(let i=0; i<labels.length; i++){
    const isCurrent = (i === currentWeekNum);
    const rowBg = isCurrent ? 'rgba(108, 92, 231, 0.08)' : 'transparent';
    const borderLeft = isCurrent ? '3px solid var(--accent)' : 'none';
    const cellStyle = isCurrent ? 'font-weight: 600; color: var(--accent2);' : '';
    
    const targetVal = targetData[i];
    const actualVal = actualData[i];
    
    const isFuture = (i > currentWeekNum);
    const displayActual = isFuture ? '-' : (type === 'percentage' ? actualVal + '%' : actualVal);
    const displayTarget = type === 'percentage' ? targetVal + '%' : targetVal;
    
    html += `
      <tr style="background:${rowBg}; border-bottom:1px solid rgba(42,42,90,0.3); border-left:${borderLeft};">
        <td style="padding:8px; ${cellStyle}">${labels[i]}${isCurrent ? ' 📌' : ''}</td>
        <td style="padding:8px; text-align: center; ${cellStyle}">${displayTarget}</td>
        <td style="padding:8px; text-align: center; ${cellStyle}">${displayActual}</td>
        <td style="padding:8px; color: var(--text3); font-size:0.72rem; ${isCurrent ? 'color: var(--text2);' : ''}">${milestones[i]}</td>
      </tr>
    `;
  }
  
  html += `
        </tbody>
      </table>
    </div>
  `;
  return html;
}

function drawSingleChart(canvasId, targetData, actualData, color, maxVal, labelSuffix, yAxisTitle){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  
  const dpr = window.devicePixelRatio || 1;
  const widthCss = canvas.width / dpr;
  const heightCss = canvas.height / dpr;
  
  ctx.clearRect(0, 0, widthCss, heightCss);
  
  // Draw card background inside canvas to make it feel premium
  ctx.fillStyle = '#0e0e24';
  ctx.fillRect(0, 0, widthCss, heightCss);
  
  const paddingLeft = 60;
  const paddingRight = 30;
  const paddingTop = 40;
  const paddingBottom = 45;
  const width = widthCss - paddingLeft - paddingRight;
  const height = heightCss - paddingTop - paddingBottom;
  
  const data = getActualProgressData();
  const n = data.labels.length;
  
  // 1. Draw grid lines
  ctx.strokeStyle = 'rgba(42, 42, 90, 0.5)';
  ctx.lineWidth = 1;
  
  // Y-axis grid lines and ticks
  const yTicks = 5;
  for(let i=0; i<yTicks; i++){
    const y = paddingTop + (height / (yTicks - 1)) * i;
    ctx.beginPath();
    ctx.moveTo(paddingLeft, y);
    ctx.lineTo(widthCss - paddingRight, y);
    ctx.stroke();
    
    const val = maxVal - (maxVal * (i / (yTicks - 1)));
    ctx.fillStyle = '#a0a0c0';
    ctx.font = '500 10px Inter';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(val.toFixed(0) + labelSuffix, paddingLeft - 10, y);
  }
  
  // X-axis ticks (Vertical lines)
  for(let i=0; i<n; i++){
    const x = paddingLeft + (width / (n - 1)) * i;
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(42, 42, 90, 0.3)';
    ctx.moveTo(x, paddingTop);
    ctx.lineTo(x, heightCss - paddingBottom);
    ctx.stroke();
    
    ctx.fillStyle = '#a0a0c0';
    ctx.font = '500 9px Inter';
    ctx.textAlign = 'center';
    
    // On small screens, hide every alternate label to prevent overlap
    if(widthCss < 480 && i % 2 !== 0 && i !== n-1) continue;
    
    ctx.fillText(data.labels[i].replace('Week ', 'W'), x, heightCss - paddingBottom + 14);
  }
  
  // 2. Y-Axis Title
  ctx.fillStyle = '#e8e8f0';
  ctx.font = '600 10px Inter';
  ctx.save();
  ctx.translate(16, paddingTop + height / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillText(yAxisTitle, 0, 0);
  ctx.restore();
  
  // X-Axis Title
  ctx.textAlign = 'center';
  ctx.fillText('Preparation Timeline (Weeks)', paddingLeft + width / 2, heightCss - 10);
  
  // Calculate current week
  const today = new Date();
  const diffDays = Math.floor((today - START_DATE)/(1000*60*60*24));
  const currentWeekNum = Math.min(11, Math.max(1, Math.ceil((diffDays + 1)/7)));
  
  // 3. Draw Area under curves first (so lines render on top)
  // Target Area (faint)
  fillArea(targetData, color + '12', color + '00', null);
  
  // Actual Area (slightly stronger)
  fillArea(actualData, color + '22', color + '00', currentWeekNum);
  
  function fillArea(valData, colorStart, colorEnd, drawLimit) {
    ctx.save();
    const grad = ctx.createLinearGradient(0, paddingTop, 0, paddingTop + height);
    grad.addColorStop(0, colorStart);
    grad.addColorStop(1, colorEnd);
    ctx.fillStyle = grad;
    
    ctx.beginPath();
    ctx.moveTo(paddingLeft, paddingTop + height);
    
    let pointsCount = 0;
    for(let i = 0; i < n; i++) {
      if(drawLimit !== null && i > drawLimit) break;
      const x = paddingLeft + (width / (n - 1)) * i;
      const val = valData[i];
      const y = paddingTop + height - (height * (val / maxVal));
      ctx.lineTo(x, y);
      pointsCount++;
    }
    
    if (pointsCount > 0) {
      const lastX = paddingLeft + (width / (n - 1)) * (pointsCount - 1);
      ctx.lineTo(lastX, paddingTop + height);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
  
  // 4. Plot Trajectory Lines
  function plotLine(valData, colorLine, isDashed, drawLimit) {
    ctx.save();
    ctx.strokeStyle = colorLine;
    ctx.lineWidth = isDashed ? 1.5 : 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    if(isDashed){
      ctx.setLineDash([4, 4]);
    } else {
      ctx.setLineDash([]);
    }
    
    ctx.beginPath();
    let started = false;
    for(let i=0; i<n; i++){
      if(drawLimit !== null && i > drawLimit) continue;
      const x = paddingLeft + (width / (n - 1)) * i;
      const val = valData[i];
      const y = paddingTop + height - (height * (val / maxVal));
      
      if(!started){
        ctx.moveTo(x, y);
        started = true;
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.stroke();
    ctx.restore();
  }
  
  // Target Line (Dashed)
  plotLine(targetData, color + 'aa', true, null);
  // Actual Line (Solid)
  plotLine(actualData, color, false, currentWeekNum);
  
  // 5. Plot Points (circles)
  function drawPoints(valData, colorLine, drawLimit, isActualLine) {
    for(let i=0; i<n; i++){
      if(drawLimit !== null && i > drawLimit) continue;
      
      const x = paddingLeft + (width / (n - 1)) * i;
      const val = valData[i];
      const y = paddingTop + height - (height * (val / maxVal));
      
      ctx.fillStyle = isActualLine ? colorLine : '#0e0e24';
      ctx.strokeStyle = colorLine;
      ctx.lineWidth = 1.5;
      
      ctx.beginPath();
      ctx.arc(x, y, isActualLine ? 4.5 : 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
  }
  
  drawPoints(targetData, color + '88', null, false);
  drawPoints(actualData, color, currentWeekNum, true);
  
  // 6. Draw Value Labels using Capsule Text
  function drawCapsuleText(text, x, y, bgColor, textColor, textAlign) {
    ctx.save();
    ctx.font = 'bold 9px Inter';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    const textWidth = ctx.measureText(text).width;
    const paddingX = 5;
    const paddingY = 2;
    const w = textWidth + paddingX * 2;
    const h = 10 + paddingY * 2;
    
    let rectX = x - w / 2;
    if (textAlign === 'left') rectX = x;
    else if (textAlign === 'right') rectX = x - w;
    
    const rectY = y - h / 2;
    
    // Draw rounded capsule
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    drawRoundedRect(rectX, rectY, w, h, 3);
    ctx.fill();
    
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    drawRoundedRect(rectX, rectY, w, h, 3);
    ctx.stroke();
    
    // Text
    ctx.fillStyle = textColor;
    let textX = x;
    if (textAlign === 'left') textX = x + w / 2;
    else if (textAlign === 'right') textX = x - w / 2;
    ctx.fillText(text, textX, y);
    ctx.restore();
  }
  
  function drawRoundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  
  // Draw key labels (Start, current week, and end goal)
  // Start Target
  drawCapsuleText(targetData[0].toFixed(0) + labelSuffix, paddingLeft, paddingTop + height - (height * (targetData[0] / maxVal)) + 12, 'rgba(18, 18, 42, 0.85)', '#a0a0c0', 'left');
  
  // Target Goal (End)
  const endX = paddingLeft + width;
  const endY = paddingTop + height - (height * (targetData[n-1] / maxVal));
  drawCapsuleText('Goal: ' + targetData[n-1].toFixed(0) + labelSuffix, endX, endY - 12, 'rgba(18, 18, 42, 0.85)', color, 'right');
  
  // Actual progress (Last recorded)
  if (currentWeekNum >= 0 && currentWeekNum < n) {
    const actX = paddingLeft + (width / (n - 1)) * currentWeekNum;
    const actVal = actualData[currentWeekNum];
    const actY = paddingTop + height - (height * (actVal / maxVal));
    
    drawCapsuleText('Actual: ' + actVal.toFixed(0) + labelSuffix, actX, actY - 12, 'rgba(108, 92, 231, 0.85)', '#ffffff', 'center');
    
    // Draw corresponding target value for comparison
    const tarVal = targetData[currentWeekNum];
    const tarY = paddingTop + height - (height * (tarVal / maxVal));
    drawCapsuleText('Target: ' + tarVal.toFixed(0) + labelSuffix, actX, tarY + 12, 'rgba(18, 18, 42, 0.85)', '#a0a0c0', 'center');
  }
  
  // 7. Legend
  const legendX = widthCss - paddingRight - 110;
  const legendY = 18;
  
  ctx.font = '500 9px Inter';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  
  // Target Legend
  ctx.strokeStyle = color + '88';
  ctx.lineWidth = 1.5;
  ctx.save();
  ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(legendX, legendY); ctx.lineTo(legendX + 15, legendY); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#a0a0c0';
  ctx.fillText('Target Trajectory', legendX + 20, legendY);
  
  // Actual Legend
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(legendX, legendY + 12); ctx.lineTo(legendX + 15, legendY + 12); ctx.stroke();
  ctx.fillStyle = '#e8e8f0';
  ctx.fillText('Your Progress', legendX + 20, legendY + 12);
  
  // 8. Vertical line for Current Week
  ctx.save();
  ctx.setLineDash([2, 2]);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
  ctx.lineWidth = 1;
  const curX = paddingLeft + (width / (n - 1)) * currentWeekNum;
  ctx.beginPath();
  ctx.moveTo(curX, paddingTop);
  ctx.lineTo(curX, heightCss - paddingBottom);
  ctx.stroke();
  
  ctx.fillText('CURRENT WEEK', curX, paddingTop - 4);
  
  ctx.setLineDash([]);
}

function drawAllCharts(){
  const data = getActualProgressData();
  drawSingleChart('syllabusChart', data.syllabus.target, data.syllabus.actual, '#74b9ff', 100, '%', 'Syllabus Completion (%)');
  drawSingleChart('mocksChart', data.mocks.target, data.mocks.actual, '#00b894', 26, '', 'Full Mocks Completed (Count)');
  drawSingleChart('sectionalsChart', data.sectionals.target, data.sectionals.actual, '#fdcb6e', 30, '', 'Sectionals Completed (Count)');
}

function initTrajectoryCharts(){
  const canvasIds = ['syllabusChart', 'mocksChart', 'sectionalsChart'];
  canvasIds.forEach(id => {
    const canvas = document.getElementById(id);
    if(!canvas) return;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = 220;
  });
  drawAllCharts();
}

window.addEventListener('resize', initTrajectoryCharts);

function showMilestone(id, btn){
  document.querySelectorAll('.milestone-card').forEach(card => card.style.display = 'none');
  document.querySelectorAll('.step-tab-btn').forEach(b => {
    b.style.background = 'transparent';
    b.style.color = 'var(--text3)';
    b.style.borderColor = 'var(--border)';
  });
  
  const activeCard = document.getElementById('milestone_' + id);
  if(activeCard) activeCard.style.display = 'block';
  
  btn.style.background = 'var(--accent)';
  btn.style.color = '#fff';
  btn.style.borderColor = 'var(--accent)';
}

function renderCurrentTab(){
  const el=document.getElementById('content');
  switch(currentTab){
    case 'overview':el.innerHTML=renderOverview();break;
    case 'phase1':case 'phase2':case 'phase3':case 'phase4':
      el.innerHTML=renderPhase(currentTab);break;
    case 'analytics':
      el.innerHTML=renderAnalytics();
      setTimeout(initTrajectoryCharts, 50);
      break;
    case 'notes':el.innerHTML=renderNotes();break;
  }
}

function updateCountdown(){
  const now=new Date();
  const daysLeft=Math.max(0,Math.ceil((EXAM_DATE-now)/(1000*60*60*24)));
  const daysDone=Math.max(0,Math.floor((now-START_DATE)/(1000*60*60*24)));
  const s=getOverallStats();
  
  document.getElementById('cdDays').textContent=daysLeft;
  document.getElementById('cdDone').textContent=s.completedDays;
  document.getElementById('cdPct').textContent=s.pct+'%';
  document.getElementById('cdMocks').textContent=s.mocksDone;
}

document.getElementById('navTabs').addEventListener('click',e=>{
  if(!e.target.classList.contains('nav-tab'))return;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  currentTab=e.target.dataset.tab;
  renderCurrentTab();
  window.scrollTo({top:0,behavior:'smooth'});
});
