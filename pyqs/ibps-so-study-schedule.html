<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBPS SO Prelims 2026 — 74-Day Study Schedule</title>
<meta name="description" content="Interactive 74-day study schedule for IBPS SO Prelims 2026 with daily tasks, progress tracking, and analytics.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a1a;--card:#12122a;--card2:#1a1a3e;--border:#2a2a5a;
--accent:#6c5ce7;--accent2:#a29bfe;--accent3:#fd79a8;
--green:#00b894;--yellow:#fdcb6e;--red:#e17055;--blue:#74b9ff;
--cyan:#81ecec;--orange:#e17055;
--text:#e8e8f0;--text2:#a0a0c0;--text3:#707090;
--radius:12px;--shadow:0 4px 20px rgba(0,0,0,0.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

/* HEADER */
.hero{background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 40%,#2d1b69 100%);padding:40px 20px 30px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(108,92,231,0.08) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(253,121,168,0.06) 0%,transparent 50%);animation:heroGlow 8s ease-in-out infinite alternate}
@keyframes heroGlow{0%{transform:rotate(0deg)}100%{transform:rotate(3deg)}}
.hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;background:linear-gradient(135deg,#a29bfe,#fd79a8,#fdcb6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}
.hero .subtitle{font-size:clamp(.85rem,2vw,1.05rem);color:var(--text2);margin-top:8px;position:relative;z-index:1}
.hero .exam-date{display:inline-block;margin-top:14px;padding:8px 20px;background:rgba(108,92,231,0.2);border:1px solid var(--accent);border-radius:20px;font-weight:600;font-size:.9rem;color:var(--accent2);position:relative;z-index:1}

/* COUNTDOWN */
.countdown-bar{display:flex;justify-content:center;gap:20px;padding:20px;background:var(--card);border-bottom:1px solid var(--border)}
.cd-item{text-align:center}
.cd-num{font-size:1.8rem;font-weight:800;color:var(--accent2)}
.cd-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px}

/* NAV TABS */
.nav-tabs{display:flex;gap:6px;padding:16px 20px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:wrap;justify-content:center}
.nav-tab{padding:8px 18px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .2s;white-space:nowrap}
.nav-tab:hover{border-color:var(--accent);color:var(--accent2)}
.nav-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* OVERVIEW STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;padding:20px;max-width:1200px;margin:0 auto}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-val{font-size:1.6rem;font-weight:800}
.stat-label{font-size:.72rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* PHASE SECTIONS */
.phase-section{max-width:1200px;margin:0 auto;padding:20px}
.phase-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.phase-badge{padding:6px 14px;border-radius:6px;font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:1px}
.phase-title{font-size:1.3rem;font-weight:700}
.phase-dates{font-size:.8rem;color:var(--text3)}
.phase-desc{font-size:.85rem;color:var(--text2);margin-bottom:20px;padding:14px;background:var(--card);border-radius:var(--radius);border-left:3px solid var(--accent)}

/* WEEK BLOCKS */
.week-block{margin-bottom:24px}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card2);border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--border);cursor:pointer;user-select:none}
.week-header:hover{background:rgba(108,92,231,0.1)}
.week-title{font-weight:700;font-size:.95rem}
.week-progress{display:flex;align-items:center;gap:10px}
.week-pct{font-size:.8rem;font-weight:600;color:var(--accent2)}
.week-bar{width:100px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.week-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}
.week-chevron{font-size:1.2rem;color:var(--text3);transition:transform .3s}
.week-header.collapsed .week-chevron{transform:rotate(-90deg)}
.week-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
.week-body.hidden{display:none}

/* DAY CARDS */
.day-card{display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:14px 16px;border-bottom:1px solid rgba(42,42,90,0.5);align-items:start;transition:background .2s}
.day-card:hover{background:rgba(108,92,231,0.04)}
.day-card:last-child{border-bottom:none}
.day-card.revision{background:rgba(253,203,110,0.05)}
.day-card.mock{background:rgba(0,184,148,0.05)}
.day-card.rest{background:rgba(129,236,236,0.05)}
.day-card.completed{opacity:0.6}

.day-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:2px;background:transparent}
.day-check:hover{border-color:var(--accent)}
.day-check.checked{background:var(--green);border-color:var(--green)}
.day-check.checked::after{content:'✓';color:#fff;font-size:.75rem;font-weight:700}

.day-info{min-width:0}
.day-date{font-size:.72rem;color:var(--text3);margin-bottom:2px}
.day-title{font-weight:700;font-size:.88rem;margin-bottom:6px}

.day-tasks{display:flex;flex-direction:column;gap:4px}
.task-item{display:flex;align-items:flex-start;gap:8px;font-size:.78rem;color:var(--text2);line-height:1.4}
.task-tag{padding:1px 6px;border-radius:4px;font-size:.65rem;font-weight:700;flex-shrink:0;margin-top:1px}
.tag-r{background:rgba(108,92,231,0.2);color:var(--accent2)}
.tag-q{background:rgba(0,184,148,0.2);color:var(--green)}
.tag-e{background:rgba(253,121,168,0.2);color:var(--accent3)}
.tag-m{background:rgba(253,203,110,0.2);color:var(--yellow)}
.tag-rev{background:rgba(129,236,236,0.2);color:var(--cyan)}

.day-hours{font-size:.7rem;color:var(--text3);text-align:right;white-space:nowrap;flex-shrink:0}

/* DAILY ROUTINE */
.routine-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:20px 0}
.routine-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.routine-time{font-size:.7rem;color:var(--accent2);font-weight:600;margin-bottom:4px}
.routine-task{font-weight:600;font-size:.85rem}
.routine-desc{font-size:.72rem;color:var(--text3);margin-top:4px}

/* ANALYTICS */
.analytics{max-width:1200px;margin:0 auto;padding:20px}
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.chart-title{font-weight:700;font-size:1rem;margin-bottom:14px}
.hbar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hbar-label{width:80px;font-size:.75rem;color:var(--text2);text-align:right;flex-shrink:0}
.hbar-track{flex:1;height:20px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:4px;transition:width .6s}
.hbar-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.65rem;font-weight:600;color:rgba(255,255,255,0.9)}

/* NOTES */
.notes-section{max-width:1200px;margin:0 auto;padding:20px}
.notes-area{width:100%;min-height:120px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;resize:vertical;outline:none}
.notes-area:focus{border-color:var(--accent)}
.notes-btn{margin-top:10px;padding:8px 20px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:.8rem}
.notes-btn:hover{background:var(--accent2)}

/* BACK LINK */
.back-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;color:var(--accent2);font-size:.85rem;font-weight:500}

/* TAB CONTENT */
.tab-content{display:none}
.tab-content.active{display:block}

/* RESPONSIVE */
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
  .stat-card{padding:12px}
  .stat-val{font-size:1.2rem}
  .day-card{grid-template-columns:auto 1fr;gap:10px;padding:10px 12px}
  .day-hours{display:none}
  .countdown-bar{gap:12px}
  .cd-num{font-size:1.3rem}
  .phase-section,.analytics,.notes-section{padding:12px}
  .routine-grid{grid-template-columns:1fr}
  .week-bar{width:60px}
  .hero{padding:24px 14px 20px}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease forwards}
</style>
</head>

<a href="../index.html" class="back-link">← Back to Practice Hub</a>

<div class="hero">
  <h1>📅 74-Day IBPS SO Prelims Battle Plan</h1>
  <p class="subtitle">16 June → 28 August 2026 • 4-5 Hours/Day • Complete Roadmap</p>
  <div class="exam-date" id="examDate">🎯 Exam: 29 August 2026</div>
</div>

<div class="countdown-bar" id="countdown">
  <div class="cd-item"><div class="cd-num" id="cdDays">--</div><div class="cd-label">Days Left</div></div>

<div class="nav-tabs" id="navTabs">

  <div class="nav-tab" data-tab="phase2">⚡ Phase 2</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA: Complete 74-day schedule
// ═══════════════════════════════════════════════════════════════
const EXAM_DATE = new Date(2026, 7, 29); // Aug 29
const START_DATE = new Date(2026, 5, 16); // Jun 16

const PHASES = [
  {id:'phase1',name:'Phase 1: Foundation Completion',color:'#6c5ce7',dates:'Jun 16 – Jul 6 (21 days)',
   desc:'Complete ALL remaining topics. Goal: 100% syllabus coverage. Focus on learning new concepts from Adda247 videos + practice 15-20 Qs per topic daily.'},
  {id:'phase2',name:'Phase 2: Practice & Speed Building',color:'#00b894',dates:'Jul 7 – Jul 27 (21 days)',
   desc:'Master speed & accuracy via sectional tests and mocks. Goal: Attempt 35+ in Reasoning, 30+ in Quant, 35+ in English within time.'},
  {id:'phase3',name:'Phase 3: Mock Test Mastery',color:'#fdcb6e',dates:'Jul 28 – Aug 17 (21 days)',
   desc:'1 mock per day + deep analysis. Goal: Consistent 100+ score. Build exam temperament, time management, and stamina.'},
  {id:'phase4',name:'Phase 4: Final Sprint & Revision',color:'#fd79a8',dates:'Aug 18 – Aug 28 (11 days)',
   desc:'Revision only. No new topics. Focus on formula sheets, tricks, PYQ revision, and mental preparation. Sleep well.'}
];

const DAILY_ROUTINE = [
  {time:'First 30 min',task:'📖 Grammar + Editorial',desc:'10 grammar rules (Nimisha mam) + 1 Hindu editorial'},
  {time:'Next 1.5 hrs',task:'🎯 Primary Topic',desc:'New topic from Adda247 video + make notes'},
  {time:'Next 1 hr',task:'📝 Secondary Topic',desc:'Practice yesterday\'s topic OR 2nd new topic'},
  {time:'Next 1 hr',task:'⚡ Practice Set',desc:'15-20 Qs on primary topic (timed)'},
  {time:'Last 30 min',task:'🔄 Vocab + Revision',desc:'5 new words + revise yesterday\'s notes'}
];

// Helper to create a day entry
function D(month,date,dayName,title,tasks,type,hours){
  const daysOfWeek = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const computedDayName = daysOfWeek[new Date(2026, month, date).getDay()];
  return {month,date,dayName:computedDayName,title,tasks,type:type||'normal',hours:hours||'4-5h'};
}
// Task: [tag, description]  tag = R/Q/E/M/REV
function T(tag,desc){return {tag,desc};}

const SCHEDULE = {
// ═══════ PHASE 1: FOUNDATION (Jun 16 - Jul 6) ═══════
phase1: [
  // Week 1: Jun 16-22 - Seating Arrangement + Quant Basics + Grammar Sprint
  {name:'Week 1: Seating Arrangement + Quant Basics + Grammar Sprint',days:[
    D(5,16,'Mon','Linear SA + Simplification + Grammar',[T('R','SA Linear: Single row, facing North/South — Learn from Adda247 video'),T('E','Grammar Rules 16-30 (Nimisha mam) — Take notes'),T('Q','Simplification & Approximation — Tricks + 20 speed Qs'),T('R','Practice: 10 SA Linear basic Qs')],'normal','4.5h'),
    D(5,17,'Tue','Linear SA Advanced + Average + RC',[T('R','SA Linear: Double row, facing each other — Video + Practice'),T('Q','Average — Basic concepts + 15 practice Qs'),T('E','RC Strategy: Learn to identify question types — 1 passage'),T('R','Practice: 10 SA Linear advanced Qs')],'normal','4.5h'),
    D(5,18,'Wed','Circular SA + Boats & Streams + Grammar',[T('R','SA Circular: Even positions, facing inside/outside — Video'),T('Q','Boats & Streams — Concepts of upstream, downstream + 15 Qs'),T('E','Grammar Rules 31-45 — Make formula sheet'),T('R','Practice: 10 SA Circular Qs')],'normal','4.5h'),
    D(5,19,'Thu','Complex SA + Number Series & Quadratic',[T('R','SA Square, Triangular & Complex arrangements — Video + Notes'),T('Q','Revision: Number Series & Quadratic Eq patterns — 15 Qs speed drill'),T('E','Grammar Rules 46-60'),T('R','Practice: 10 SA Complex Qs')],'normal','4.5h'),
    D(5,20,'Fri','Floor Puzzle + Time & Work + Grammar',[T('R','Puzzles: Floor-based single variable — Video + technique'),T('Q','Time & Work — Concept of efficiency, alternate days + 15 Qs'),T('E','Grammar Rules 61-75'),T('R','Practice: 4 Floor Puzzle sets')],'normal','5h'),
    D(5,21,'Sat','Floor Puzzle (Multi) + Pipes & Cisterns + Cloze',[T('R','Puzzles: Floor-based multi-variable — Video'),T('Q','Pipes & Cisterns — Concept of inlet/outlet pipes + 10 Qs'),T('E','Grammar Rules 76-90 + Cloze Test basic concept'),T('R','Practice: 4 Multi-variable Floor Puzzles')],'normal','5h'),
    D(5,22,'Sun','🔄 Week 1 Revision Day',[T('REV','Revise SA & Puzzles — Quick concept recap (30 min)'),T('REV','Grammar Rules 91-105 — Note error-prone rules'),T('REV','Quant Revision: Average, Boats & Streams, T&W — 15 mixed Qs'),T('R','Reasoning Sectional: 30 Qs in 25 min — Score yourself')],'revision','4.5h'),
  ]},
  // Week 2: Jun 23-29 - Advanced Puzzles + DI Basics + English Core
  {name:'Week 2: Puzzles + DI Basics + English Core',days:[
    D(5,23,'Mon','Box Puzzle + TSD + RC Deep',[T('R','Puzzles: Box-based & scheduling type — Video + Notes'),T('Q','Time Speed Distance basics — Concept of relative speed + 10 Qs'),T('E','Grammar Rules 106-120 — Complete the set!'),T('R','Practice: 4 Box puzzle sets')],'normal','5h'),
    D(5,24,'Tue','Multi-Parameter Puzzle + Trains + Para Jumbles',[T('R','Puzzles: Multi-parameter complex (3+ variables) — Video'),T('Q','Trains & Speed Math — Concept of poles, bridges, overtaking + 10 Qs'),T('E','Para Jumble: Concept + 10 Qs — Learn link-sentence method'),T('R','Practice: 4 complex puzzle sets')],'normal','5h'),
    D(5,25,'Wed','Machine Input-Output + Table DI Basics + Sentence Imp',[T('R','Machine Input-Output: Pattern identification — Video + Notes'),T('Q','DI Table Basics — How to read charts, ratio & percentage calculation + 2 sets'),T('E','Sentence Improvement/Correction — Concept + 10 Qs'),T('R','Practice: 3 Machine I/O sets')],'normal','5h'),
    D(5,26,'Thu','Data Sufficiency (R) + Pie Chart DI + Word Interchange',[T('R','Data Sufficiency (Reasoning): When data is sufficient — Video'),T('Q','DI Pie Chart Basics — Degree to percentage conversion + 2 sets'),T('E','Word Interchange (new pattern) — Concept + examples'),T('R','Practice: 10 Data Sufficiency Qs')],'normal','4.5h'),
    D(5,27,'Fri','Order & Ranking + Bar DI + Fill in Blanks',[T('R','Order & Ranking — Concept + 15 Qs'),T('Q','DI Bar Graph Basics — Comparison & average calculation + 2 sets'),T('E','Inappropriate Word (passage-based) — Concept + practice'),T('R','Practice: 10 ranking Qs')],'normal','4.5h'),
    D(5,28,'Sat','Logical Reasoning + Line DI + Fillers',[T('R','Logical/Critical Reasoning: Course of action, assumptions — Video'),T('Q','DI Line Graph Basics — Growth rate calculation + 2 sets'),T('E','Double Fillers + Column-based matching — Concept + 10 Qs'),T('R','Practice: 10 logical reasoning Qs')],'normal','5h'),
    D(5,29,'Sun','🔄 Week 2 Revision',[T('REV','Revise all Puzzles & Machine I/O — Quick tricks'),T('REV','English Sectional: 30 Qs in 25 min — Score yourself'),T('REV','Quant Revision: TSD, Trains, DI basics — 15 mixed Qs'),T('REV','Review all mistakes + update formula sheet')],'revision','4h'),
  ]},
  // Week 3: Jun 30 - Jul 6 - Advanced DI + Deep Practice
  {name:'Week 3: Advanced DI + Reasoning & English Practice',days:[
    D(5,30,'Mon','Advanced Table DI + SA Practice + RC',[T('Q','DI Table (Advanced) — Missing values, logical table DI + 3 sets'),T('R','SA Practice: 10 mixed SA Qs (timed 15 min)'),T('E','RC: 2 passages — Focus on vocab-based Qs'),T('Q','Practice: 2 more advanced table DI sets')],'normal','5h'),
    D(6,1,'Tue','Advanced Pie DI + Circular SA + Error Detection',[T('Q','DI Pie Chart (Advanced) — Double pie chart, degree + percentage + 3 sets'),T('R','SA Circular Practice: 10 Qs (timed)'),T('E','Error Detection: 15 Qs timed practice'),T('Q','Practice: 2 more double pie DI sets')],'normal','5h'),
    D(6,2,'Wed','Advanced Bar DI + Puzzle Practice + Cloze',[T('Q','DI Bar Graph (Advanced) — Stacked bar chart, profit/loss charts + 3 sets'),T('R','Puzzle Practice: 10 Qs (2 sets, timed 15 min)'),T('E','Cloze Test: 2 passages practice'),T('Q','Practice: 2 more advanced bar graph sets')],'normal','5h'),
    D(6,3,'Thu','Advanced Line DI + Machine I/O + Para Jumble',[T('Q','DI Line Graph (Advanced) — Multiple line chart, ratio line graphs + 3 sets'),T('R','Machine I/O: 10 Qs timed practice'),T('E','Para Jumble: 10 Qs practice'),T('Q','Practice: Mixed DI — 1 table + 1 pie + 1 bar')],'normal','5h'),
    D(6,4,'Fri','DI Caselet/Missing + Mixed Reasoning + Word Interchange',[T('Q','DI Caselet & Missing DI — Paragraph-based DI, Venn diagram DI + 3 sets'),T('R','Mixed Reasoning: 20 Qs from all topics (timed 25 min)'),T('E','Word Interchange + Fillers: 10 Qs'),T('Q','Practice: 2 caselet sets')],'normal','5h'),
    D(6,5,'Sat','Quant Data Sufficiency + RC Advanced + Logical R',[T('Q','Data Sufficiency (Quant) — Statement sufficiency for arithmetic & DI + 15 Qs'),T('R','Logical Reasoning: 10 Qs — Strengthen weak areas'),T('E','RC Advanced: 2 long passages with all Q types'),T('Q','TSD & Trains Advanced revision — 10 Qs')],'normal','5h'),
    D(6,6,'Sun','🔄 PHASE 1 COMPLETION',[T('REV','Quant Sectional: 50 Qs in 40 min — Full test'),T('REV','Full Syllabus checklist — Mark every topic as ✅ or ⚠️'),T('REV','Make final formula sheet for all 3 subjects'),T('REV','Identify top 5 weak areas for Phase 2 focus')],'revision','4h'),
  ]},
],
// ═══════ PHASE 2: PRACTICE & SPEED (Jul 7 - Jul 27) ═══════
phase2: [
  // Week 4: Jul 7-13 - Topic-wise Intensive
  {name:'Week 4: Topic-wise Intensive Practice',days:[
    D(6,7,'Mon','Puzzle & DI Sprint',[T('R','Puzzle Speed Drill: 5 sets timed (5 min each max)'),T('Q','DI Practice: 3 sets from all types (timed 20 min)'),T('E','RC: 3 passages timed (20 min total)'),T('REV','Analyze: Which puzzle types take longest?')],'normal','5h'),
    D(6,8,'Tue','SA Sprint + Arithmetic Mix',[T('R','SA Sprint: 5 sets timed — Track time per set'),T('Q','Arithmetic Mix: 20 Qs (all done topics) timed 20 min'),T('E','Error Detection + Sentence Improvement: 15 Qs'),T('REV','Speed log: Note time per question type')],'normal','5h'),
    D(6,9,'Wed','Inequality/Syllogism + DI Mix',[T('R','Inequality: 15 Qs (5 min) + Syllogism: 15 Qs (8 min)'),T('Q','DI + Arithmetic mixed set: 25 Qs (25 min)'),T('E','Cloze Test + Para Jumble: 15 Qs (12 min)'),T('REV','Mark topics where accuracy < 80%')],'normal','4.5h'),

// STORAGE: localStorage integration

const STORAGE_KEY = 'ibps_so_schedule_v2';

function loadProgress(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}
  catch(e){return {};}
}
function saveProgress(data){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}
function toggleDay(dayId){
  const p=loadProgress();
  p[dayId]=!p[dayId];
  saveProgress(p);
  renderCurrentTab();
  updateCountdown();
}

function loadNotes(){
  try{return localStorage.getItem('ibps_so_notes')||'';}catch(e){return '';}
}
function saveNotes(text){
  localStorage.setItem('ibps_so_notes',text);
}

// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════
let currentTab='overview';
const collapsedWeeks = {};

function getDayId(phaseId,weekIdx,dayIdx){
  return `${phaseId}_w${weekIdx}_d${dayIdx}`;
}

function getTagClass(tag){
  const map={R:'tag-r',Q:'tag-q',E:'tag-e',M:'tag-m',REV:'tag-rev'};
  return map[tag]||'tag-r';
}
function getTagLabel(tag){
  const map={R:'REAS',Q:'QUANT',E:'ENG',M:'MOCK',REV:'REV'};
  return map[tag]||tag;
}
function getDayTypeClass(type){
  const map={revision:'revision',mock:'mock',rest:'rest'};
  return map[type]||'';
}

function formatDate(m,d){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[m]} ${d}`;
}

function renderDayCard(day,dayId,progress){
  const checked=progress[dayId]||false;
  const typeClass=getDayTypeClass(day.type);
  const tasksHtml=day.tasks.map(t=>`
    <div class="task-item">
      <span class="task-tag ${getTagClass(t.tag)}">${getTagLabel(t.tag)}</span>
      <span>${t.desc}</span>
    </div>`).join('');
  
  return `
    <div class="day-card ${typeClass} ${checked?'completed':''}" id="card_${dayId}">
      <div class="day-check ${checked?'checked':''}" onclick="toggleDay('${dayId}')" title="Mark as done"></div>
      <div class="day-info">
        <div class="day-date">${day.dayName}, ${formatDate(day.month,day.date)}</div>
        <div class="day-title">${day.title}</div>
        <div class="day-tasks">${tasksHtml}</div>
      </div>
      <div class="day-hours">${day.hours}</div>
    </div>`;
}

function calcWeekProgress(phaseId,weekIdx,week,progress){
  let done=0,total=week.days.length;
  week.days.forEach((d,di)=>{
    if(progress[getDayId(phaseId,weekIdx,di)])done++;
  });
  return {done,total,pct:total?Math.round(done/total*100):0};
}

function renderWeek(phaseId,weekIdx,week,progress){
  const wp=calcWeekProgress(phaseId,weekIdx,week,progress);
  const wKey=`${phaseId}_w${weekIdx}`;
  const isCollapsed=collapsedWeeks[wKey]||false;
  
  const daysHtml=week.days.map((day,di)=>
    renderDayCard(day,getDayId(phaseId,weekIdx,di),progress)
  ).join('');
  
  return `
    <div class="week-block fade-in">
      <div class="week-header ${isCollapsed?'collapsed':''}" onclick="toggleWeek('${wKey}')">
        <span class="week-title">${week.name}</span>
        <div class="week-progress">
          <span class="week-pct">${wp.done}/${wp.total}</span>
          <div class="week-bar"><div class="week-bar-fill" style="width:${wp.pct}%"></div></div>
          <span class="week-pct">${wp.pct}%</span>
          <span class="week-chevron">▼</span>
        </div>
      </div>
      <div class="week-body ${isCollapsed?'hidden':''}" id="wb_${wKey}">
        ${daysHtml}
      </div>
    </div>`;
}

function toggleWeek(wKey){
  collapsedWeeks[wKey]=!collapsedWeeks[wKey];
  const el=document.getElementById('wb_'+wKey);
  const hdr=el.previousElementSibling;
  if(collapsedWeeks[wKey]){el.classList.add('hidden');hdr.classList.add('collapsed');}
  else{el.classList.remove('hidden');hdr.classList.remove('collapsed');}
}

function renderPhase(phaseId){
  const phase=PHASES.find(p=>p.id===phaseId);
  const weeks=SCHEDULE[phaseId];
  const progress=loadProgress();
  
  let html=`<div class="phase-section">
    <div class="phase-header">
      <span class="phase-badge" style="background:${phase.color}22;color:${phase.color};border:1px solid ${phase.color}">${phase.name.split(':')[0]}</span>
      <div>
        <div class="phase-title">${phase.name.split(':')[1]||''}</div>
        <div class="phase-dates">${phase.dates}</div>
      </div>
    </div>
    <div class="phase-desc">${phase.desc}</div>`;
  
  if(phaseId==='phase1'){
    html+=`<h3 style="font-size:.95rem;margin-bottom:14px;color:var(--accent2)">📌 Daily Routine Template (Phase 1)</h3>
    <div class="routine-grid">
      ${DAILY_ROUTINE.map(r=>`<div class="routine-item"><div class="routine-time">${r.time}</div><div class="routine-task">${r.task}</div><div class="routine-desc">${r.desc}</div></div>`).join('')}
    </div>`;
  }
  
  weeks.forEach((week,wi)=>{
    html+=renderWeek(phaseId,wi,week,progress);
  });
  
  html+='</div>';
  return html;
}

function getOverallStats(){
  const progress=loadProgress();
  let totalDays=0,completedDays=0,mocksDone=0;
  let phaseStats={};
  let subjectHours={R:0,Q:0,E:0,M:0,REV:0};
  
  Object.keys(SCHEDULE).forEach(phaseId=>{
    let pDone=0,pTotal=0;
    SCHEDULE[phaseId].forEach((week,wi)=>{
      week.days.forEach((day,di)=>{
        totalDays++;
        pTotal++;
        const id=getDayId(phaseId,wi,di);
        if(progress[id]){
          completedDays++;
          pDone++;
          if(day.type==='mock')mocksDone++;
        }
      });
    });
    phaseStats[phaseId]={done:pDone,total:pTotal,pct:pTotal?Math.round(pDone/pTotal*100):0};
  });
  
  return {totalDays,completedDays,mocksDone,phaseStats,
    pct:totalDays?Math.round(completedDays/totalDays*100):0};
}

          <h4 style="color:var(--accent2);font-size:.85rem;margin-bottom:8px">✅ Reasoning (60% Done)</h4>
          <p style="font-size:.78rem;color:var(--text2)">Completed: Alphanumeric, Inequality, Syllogism, Direction & Distance, Coding-Decoding, Blood Relation, Basic Puzzles</p>
          <p style="font-size:.78rem;color:var(--accent3);margin-top:4px">Remaining: Advanced Puzzles, SA (all types), Machine I/O, Data Sufficiency, Order & Ranking, Logical/Critical Reasoning</p>
        </div>
        <div>
          <h4 style="color:var(--green);font-size:.85rem;margin-bottom:8px">⚠️ Quant (50% Done)</h4>
          <p style="font-size:.78rem;color:var(--text2)">Completed: Number Series, Quadratic Eq, Percentage, Ratio, SI/CI, Profit & Loss, Ages, Partnership, Mixture & Alligation</p>
          <p style="font-size:.78rem;color:var(--accent3);margin-top:4px">Remaining: All DI types, Simplification, Boats & Streams, T&W, Pipes, TSD, Trains, Average, Data Sufficiency</p>
        </div>
        <div>
          <h4 style="color:var(--accent3);font-size:.85rem;margin-bottom:8px">⚠️ English (30% Done)</h4>
          <p style="font-size:.78rem;color:var(--text2)">Completed: Daily editorial, Parts of Speech, Connectors & Starters, Some Vocab, I&P, 15/120 Grammar Rules</p>
          <p style="font-size:.78rem;color:var(--accent3);margin-top:4px">Remaining: RC strategy, Cloze Test, Error Detection, Para Jumble, Word Interchange, Double Fillers, 105 Grammar Rules, Vocabulary</p>
        </div>
      </div>
    </div>

    <h3 style="font-size:1.1rem;margin:24px 0 16px">🗺️ Phase Overview</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px">
      ${PHASES.map(p=>`
        <div style="background:var(--card);border:1px solid ${p.color}33;border-radius:var(--radius);padding:16px;border-left:3px solid ${p.color}">
          <h4 style="color:${p.color};font-size:.85rem;margin-bottom:6px">${p.name}</h4>
          <p style="font-size:.72rem;color:var(--text3);margin-bottom:6px">${p.dates}</p>
          <p style="font-size:.78rem;color:var(--text2)">${p.desc}</p>
        </div>`).join('')}
    </div>

    <h3 style="font-size:1.1rem;margin:24px 0 16px">⚡ Key Rules</h3>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
      <ul style="font-size:.82rem;color:var(--text2);list-style:none;display:grid;gap:8px">
        <li>🔴 <strong>Never skip a revision day</strong> — Revision cements what you learn</li>
        <li>🟡 <strong>Analyze every mock for 1+ hour</strong> — A mock without analysis is wasted</li>
        <li>🟢 <strong>Daily editorial + 5 vocab words</strong> — Non-negotiable, every single day</li>
        <li>🔵 <strong>Formula sheets</strong> — Update them weekly, revise them daily in Phase 3-4</li>
        <li>🟣 <strong>Sleep 7+ hours</strong> — Your brain consolidates memory during sleep</li>
        <li>⚪ <strong>No phone during study hours</strong> — Keep it in another room</li>
      </ul>
    </div>
  </div>`;
  
  return html;
}

function renderAnalytics(){
  const s=getOverallStats();
  const progress=loadProgress();
  
  // Count by type
  let typeCounts={mock:{done:0,total:0},revision:{done:0,total:0},normal:{done:0,total:0},rest:{done:0,total:0}};
  Object.keys(SCHEDULE).forEach(phaseId=>{
    SCHEDULE[phaseId].forEach((week,wi)=>{
      week.days.forEach((day,di)=>{
        const t=day.type||'normal';
        if(!typeCounts[t])typeCounts[t]={done:0,total:0};
        typeCounts[t].total++;
        if(progress[getDayId(phaseId,wi,di)])typeCounts[t].done++;
      });
    });
  });
  
  return `<div class="analytics">
    <div class="chart-container">
      <div class="chart-title">📊 Day Type Breakdown</div>
      ${Object.entries({
        'Study Days':typeCounts.normal,
        'Mock Test Days':typeCounts.mock,
        'Revision Days':typeCounts.revision,
        'Rest Days':typeCounts.rest
      }).map(([label,v])=>{
        const pct=v.total?Math.round(v.done/v.total*100):0;
        const colors={
          'Study Days':'var(--accent)',
          'Mock Test Days':'var(--green)',
          'Revision Days':'var(--yellow)',
          'Rest Days':'var(--cyan)'
        };
        return `<div class="hbar">
          <div class="hbar-label">${label}</div>
          <div class="hbar-track">
            <div class="hbar-fill" style="width:${pct}%;background:${colors[label]}"></div>
            <div class="hbar-val">${v.done}/${v.total}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    
    <div class="chart-container">
      <div class="chart-title">📈 Weekly Completion</div>
      ${(()=>{
        let bars='';
        let weekNum=0;
        Object.keys(SCHEDULE).forEach(phaseId=>{
          SCHEDULE[phaseId].forEach((week,wi)=>{
            weekNum++;
            const wp=calcWeekProgress(phaseId,wi,week,progress);
            bars+=`<div class="hbar">
              <div class="hbar-label">Week ${weekNum}</div>
              <div class="hbar-track">
                <div class="hbar-fill" style="width:${wp.pct}%;background:linear-gradient(90deg,var(--accent),var(--green))"></div>
                <div class="hbar-val">${wp.done}/${wp.total} (${wp.pct}%)</div>
              </div>
            </div>`;
          });
        });
        return bars;
      })()}
    </div>

    <div class="chart-container">
      <div class="chart-title">🏆 Achievement Milestones</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">
        ${[
          {name:'First Week Done',req:7,icon:'🌱'},
          {name:'Phase 1 Complete',req:21,icon:'🏗️'},
          {name:'10 Mocks Done',req:'10mocks',icon:'📝'},
          {name:'Halfway There',req:37,icon:'⚡'},
          {name:'Phase 3 Start',req:42,icon:'🎯'},
          {name:'20 Mocks Done',req:'20mocks',icon:'🔥'},
          {name:'Final Sprint',req:63,icon:'🚀'},
          {name:'Battle Ready',req:74,icon:'🏆'},
        ].map(m=>{
          let achieved;
          if(typeof m.req==='string'){
            const mockReq=parseInt(m.req);
            achieved=s.mocksDone>=mockReq;
          }else{
            achieved=s.completedDays>=m.req;
          }
          return `<div style="background:${achieved?'rgba(0,184,148,0.1)':'var(--card)'};border:1px solid ${achieved?'var(--green)':'var(--border)'};border-radius:var(--radius);padding:14px;text-align:center;opacity:${achieved?1:0.5}">
            <div style="font-size:1.5rem">${m.icon}</div>
            <div style="font-size:.78rem;font-weight:600;margin-top:4px;color:${achieved?'var(--green)':'var(--text3)'}">${m.name}</div>
            <div style="font-size:.65rem;color:var(--text3)">${achieved?'✅ Achieved':'🔒 Locked'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function renderNotes(){
  const notes=loadNotes();
  return `<div class="notes-section fade-in">
    <h3 style="font-size:1.1rem;margin-bottom:14px">📝 Personal Notes & Daily Updates</h3>
    <p style="font-size:.82rem;color:var(--text2);margin-bottom:14px">Use this space to track your daily progress, write observations, mock scores, and any changes to your plan. The notes are saved to your local browser storage.</p>
    <textarea class="notes-area" id="notesArea" placeholder="Write your daily updates here...&#10;&#10;Example:&#10;Jun 16: Completed SA Linear, scored 12/15 in practice. Grammar rules 16-30 done.&#10;Jun 17: SA Advanced tough, need more practice. RC passage 1 - 4/5 correct.">${notes}</textarea>
    <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
      <button class="notes-btn" onclick="saveNotes(document.getElementById('notesArea').value);this.textContent='✅ Saved!';setTimeout(()=>this.textContent='💾 Save Notes',1500)">💾 Save Notes</button>
      <button class="notes-btn" style="background:var(--green)" onclick="showAIPrompt()">🤖 Generate AI Sync Prompt</button>
    </div>
    
    <div id="aiPromptContainer" style="display:none;margin-top:24px;padding:16px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);animation:fadeIn .3s ease">
      <h4 style="font-size:.95rem;color:var(--accent2);margin-bottom:8px;display:flex;align-items:center;gap:6px">🤖 AI Progress Sync Prompt</h4>
      <p style="font-size:.75rem;color:var(--text2);margin-bottom:10px">Copy this generated text and paste it in your chat with Antigravity (your AI mentor) to sync your progress, get a personalized summary, and receive study tips for tomorrow.</p>
      <textarea id="aiPromptText" readonly style="width:100%;min-height:180px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;color:var(--text2);font-family:'Courier New',Courier,monospace;font-size:.78rem;resize:vertical;outline:none"></textarea>
      <button class="notes-btn" style="background:var(--accent);margin-top:10px" onclick="copyAIPrompt()">📋 Copy to Clipboard</button>
    </div>
  </div>`;
}

function generateAIPrompt(){
  const s=getOverallStats();
  const progress=loadProgress();
  const notes=loadNotes();
  
  let completedDaysList=[];
  let nextPendingDay=null;
  
  Object.keys(SCHEDULE).forEach(phaseId=>{
    SCHEDULE[phaseId].forEach((week,wi)=>{
      week.days.forEach((day,di)=>{
        const id=getDayId(phaseId,wi,di);
        const dateStr=formatDate(day.month,day.date);
        const label=`${dateStr} (${day.dayName}): ${day.title}`;
        if(progress[id]){
          completedDaysList.push(`- [x] ${label}`);
        }else{
          completedDaysList.push(`- [ ] ${label}`);
          if(!nextPendingDay)nextPendingDay=day;
        }
      });
    });
  });

  const recentCompleted=completedDaysList.filter(d=>d.startsWith('- [x]')).slice(-3);
  
  const promptText=`Hi! Here is my daily progress update for IBPS SO Prelims 2026 prep (Current local time: ${new Date().toLocaleDateString()}):

📊 PREPARATION STATUS:
- Overall Progress: ${s.pct}% (${s.completedDays}/${s.totalDays} Days Completed)
- Mock Tests Done: ${s.mocksDone}/26
- Remaining Days: ${s.totalDays-s.completedDays} days

✅ RECENT COMPLETED DAYS:
${recentCompleted.length>0?recentCompleted.join('\n'):'(No days marked as completed yet)'}

🎯 NEXT IN LINE:
${nextPendingDay?`- ${formatDate(nextPendingDay.month,nextPendingDay.date)} (${nextPendingDay.dayName}): ${nextPendingDay.title} (${nextPendingDay.hours})` : 'All scheduled days completed!'}

📝 PERSONAL NOTES & LOG:
${notes?notes:'(No personal notes added yet)'}

Please analyze this progress, provide a summary, and give me a clear action plan and focus tips for my next upcoming topic.`;

  return promptText;
}

function showAIPrompt(){
  const currentNotes=document.getElementById('notesArea').value;
  saveNotes(currentNotes);
  const prompt=generateAIPrompt();
  document.getElementById('aiPromptText').value=prompt;
  document.getElementById('aiPromptContainer').style.display='block';
}

function copyAIPrompt(){
  const copyText=document.getElementById('aiPromptText');
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  try{
    navigator.clipboard.writeText(copyText.value);
    const btn=event.target;
    btn.textContent='✅ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy to Clipboard',1500);
  }catch(err){
    alert('Failed to copy. Please manually select and copy the text.');
  }
}

function renderCurrentTab(){
  const el=document.getElementById('content');
  switch(currentTab){
    case 'overview':el.innerHTML=renderOverview();break;
    case 'phase1':case 'phase2':case 'phase3':case 'phase4':
      el.innerHTML=renderPhase(currentTab);break;
    case 'analytics':el.innerHTML=renderAnalytics();break;
    case 'notes':el.innerHTML=renderNotes();break;
  }
}

// ═══════════════════════════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════════════════════════
function updateCountdown(){
  const now=new Date();
  const daysLeft=Math.max(0,Math.ceil((EXAM_DATE-now)/(1000*60*60*24)));
  const daysDone=Math.max(0,Math.floor((now-START_DATE)/(1000*60*60*24)));
  const s=getOverallStats();
  
  document.getElementById('cdDays').textContent=daysLeft;
  document.getElementById('cdDone').textContent=s.completedDays;
  document.getElementById('cdPct').textContent=s.pct+'%';
  document.getElementById('cdMocks').textContent=s.mocksDone;
}

// ═══════════════════════════════════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════════════════════════════════
document.getElementById('navTabs').addEventListener('click',e=>{
  if(!e.target.classList.contains('nav-tab'))return;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  currentTab=e.target.dataset.tab;
  renderCurrentTab();
  window.scrollTo({top:0,behavior:'smooth'});
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
updateCountdown();
renderCurrentTab();
setInterval(updateCountdown,60000);
</script>
