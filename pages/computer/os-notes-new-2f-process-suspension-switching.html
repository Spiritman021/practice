# Operating System – Process Suspension and Process Switching (IBPS SO IT)

This is one of the most **conceptual topics** in Operating Systems.

Students often confuse:

* **Process Suspension**
* **Process Switching (Context Switching)**

The easiest way to remember is:

> **Process Suspension = Memory (RAM ↔ Disk)**
> **Process Switching = CPU (One process ↔ Another process)**

This one line alone can solve many IBPS questions.

---

# First Understand the Big Picture

Suppose you have opened:

* Chrome
* MS Word
* Spotify
* VLC
* VS Code
* WhatsApp

It looks like all are running together.

But can a **single CPU core** execute all of them simultaneously?

**No.**

The CPU executes **only one process at a time**.

Then why does it feel like everything runs together?

Because the Operating System switches between them **very quickly**.

Example

```text
0 ms     Chrome

5 ms     Word

10 ms    Spotify

15 ms    Chrome

20 ms    VS Code

25 ms    Chrome
```

This happens so fast (millions of times per second) that it looks like all applications are running together.

This is called

> **Multitasking**

---

# Two Important Concepts

There are two different things happening inside the OS.

```text
RAM Problem
↓

Process Suspension


CPU Problem
↓

Process Switching
```

Never confuse these.

---

# What is Process Suspension?

## Definition

Process Suspension means

> **Temporarily moving a process from RAM to Disk.**

Diagram

```text
        RAM
         │
         │
         ▼
Suspended Process
         │
         ▼
        Disk
```

Notice

CPU is **not** the focus.

Memory is.

---

# Why Does Suspension Happen?

Imagine

RAM size = 8 GB

Currently

```text
Chrome

Word

Photoshop

Android Studio

Spotify
```

RAM becomes full.

Now

User opens

```text
VLC
```

No space.

What should OS do?

It finds a process that is not currently useful.

Suppose

Spotify is waiting for internet.

OS says

```text
Move Spotify to Disk.
```

Diagram

```text
Before

RAM

Chrome

Word

Spotify

Photoshop

Android Studio

↓

Suspend Spotify

↓

Disk

Spotify
```

Now RAM has space.

VLC enters RAM.

---

# Important Point

The process is

❌ NOT terminated

It is only

```text
Paused
```

Later,

it can come back exactly where it stopped.

---

# Why Suspend Blocked Processes?

Tutorial says

Suppose a process is waiting for

* Keyboard
* Printer
* Network
* File

It cannot do anything.

Keeping it inside RAM wastes memory.

So

OS suspends it.

Example

```text
Running

↓

Needs Internet

↓

Waiting

↓

Suspended

↓

Moved to Disk
```

---

# Real-Life Example

Imagine your study table.

Currently

```text
Math Book

Physics Book

Chemistry Book

Laptop
```

Table becomes full.

History book is not needed now.

You move it to the shelf.

Diagram

```text
Study Table

↓

Shelf
```

Later

You need History.

Bring it back.

Exactly how suspension works.

---

# Normal Process States

Basic OS

```text
Ready

Running

Waiting
```

---

# Real Operating Systems

Real OS adds

```text
Ready Suspend

Blocked Suspend
```

Diagram

```text
               Ready
                 |
                 |
             Running
                 |
                 |
             Waiting
                 |
                 |
         Blocked Suspend
                 |
                 |
         Ready Suspend
```

---

# Blocked Suspend State

Definition

Process is

```text
Waiting

+

Removed from RAM
```

Diagram

```text
Waiting

↓

OS Suspends

↓

Disk

↓

Blocked Suspend
```

Example

Chrome downloading file.

Internet disconnected.

Chrome waits.

RAM becomes full.

OS moves Chrome to disk.

Chrome is now

```text
Blocked Suspend
```

---

# Ready Suspend State

Now suppose

Internet returns.

Chrome is no longer waiting.

But

RAM is still full.

So

Chrome cannot enter RAM.

State becomes

```text
Ready Suspend
```

Diagram

```text
Blocked Suspend

↓

Event Completed

↓

Ready Suspend

↓

RAM Available

↓

Ready

↓

Running
```

Notice

It is ready,

but

still outside RAM.

---

# Complete Suspension Flow

```text
Running

↓

Waiting

↓

Blocked Suspend

↓

Ready Suspend

↓

Ready

↓

Running
```

---

# Why Do We Need Process Suspension?

Tutorial gives several reasons.

Let's understand one by one.

---

# 1. Swapping (Most Important)

Suppose

RAM

```text
P1

P2

P3

P4
```

No space.

Need

```text
P5
```

OS moves

```text
P2
```

to Disk.

Diagram

```text
RAM

↓

Disk

↓

RAM
```

This is called

> **Swapping**

---

# 2. Timing

Sometimes

OS delays a process intentionally.

Example

Low-priority process.

Higher-priority processes must finish first.

Instead of wasting RAM,

OS suspends it.

---

# 3. Interactive User Request

Suppose

You pause

* Video Editing
* Download
* Game

OS suspends that process.

Later

Resume.

---

# 4. Parent Process Request

Parent process can ask

Child process

to wait.

Diagram

```text
Parent

↓

Suspend Child

↓

Child Waits

↓

Resume Later
```

---

# Easy Memory Trick

Remember

> **Suspension is always related to Memory Management.**

---

# What is Process Switching?

Now forget RAM.

Think only about

CPU.

---

## Definition

Process Switching means

> **Stopping one running process and giving the CPU to another process.**

Another name

> **Context Switching**

---

Diagram

```text
CPU

P1 Running

↓

Save P1

↓

Load P2

↓

P2 Running
```

CPU changes.

Memory doesn't necessarily change.

---

# Why is Process Switching Needed?

Because

CPU can execute

only one process at a time.

Without switching

Chrome would run forever.

Word would never open.

Spotify would never play.

Switching creates

illusion of multitasking.

---

# Real-Life Example

Teacher

```text
Student A Answering

↓

Teacher Stops

↓

Student B Answers

↓

Teacher Stops

↓

Student C Answers
```

Teacher is CPU.

Students are Processes.

---

# Interrupts

Tutorial says

Most switching happens because of

Interrupts.

Think

Interrupt

=

Somebody tapping your shoulder.

Example

You are studying.

Someone says

```text
Phone Call
```

You stop studying.

Answer phone.

Return.

Exactly what CPU does.

---

# Types Mentioned

Tutorial mentions

```text
Interrupt

Trap
```

We'll understand later,

but basic meaning:

Interrupt

↓

External event

Trap

↓

Internal error

---

# When Does Process Switching Occur?

Tutorial gives

3 situations.

---

# 1. Supervisor Call (System Call)

Example

Program wants

```text
Read File
```

It cannot directly access disk.

It asks OS.

Diagram

```text
Program

↓

System Call

↓

Operating System

↓

Read File
```

During this,

CPU may switch to another process.

---

# 2. Trap

Trap means

Unexpected problem.

Examples

```text
Divide by Zero

Illegal Instruction

Invalid Memory Access
```

Diagram

```text
Running

↓

Error

↓

Trap

↓

OS Takes Control
```

---

# 3. Interrupt

External events.

Examples

Keyboard

Mouse

Network

Timer

Printer

Diagram

```text
CPU Running

↓

Keyboard Interrupt

↓

OS Handles It

↓

May Switch Process
```

---

# Steps of Process Switching

Tutorial gives

7 steps.

Let's simplify.

---

## Step 1

Save CPU Context

Diagram

```text
CPU

↓

Save Registers
```

---

## Step 2

Update PCB

Store

Registers

Program Counter

State

inside PCB.

---

## Step 3

Move PCB

Example

```text
Running

↓

Ready Queue
```

---

## Step 4

Scheduler Chooses Next Process

```text
Ready Queue

↓

P2 Selected
```

---

## Step 5

Update Selected Process

Load

PCB

Registers

Program Counter.

---

## Step 6

Update Memory Structures

Prepare memory mappings

(Page Table etc.)

No need to memorize details.

---

## Step 7

Restore CPU Context

CPU starts executing new process.

Diagram

```text
Save P1

↓

PCB

↓

Load P2

↓

CPU Running P2
```

---

# Complete Context Switching Diagram

```text
Running P1
      │
      ▼
Save Registers
      │
      ▼
Save PCB
      │
      ▼
Scheduler Chooses P2
      │
      ▼
Load PCB of P2
      │
      ▼
Restore Registers
      │
      ▼
Running P2
```

---

# Context Switching Cost

Tutorial says

Context Switching has

Cost.

Why?

Because

OS must

* Save Registers
* Save PCB
* Load PCB
* Load Registers

All take time.

During this time

CPU is not doing useful work.

So

Too many context switches

↓

Lower performance.

---

# Suspension vs Switching

This is the **most important comparison**.

| Feature       | Process Suspension                                | Process Switching                                    |
| ------------- | ------------------------------------------------- | ---------------------------------------------------- |
| Main Focus    | Memory (RAM)                                      | CPU                                                  |
| Process Moved | RAM → Disk                                        | CPU changes from one process to another              |
| Another Name  | Swapping (when moved to disk)                     | Context Switching                                    |
| Why?          | Free memory                                       | Share CPU fairly                                     |
| Involves PCB? | Process state is preserved so it can resume later | Yes, PCB is used to save and restore process context |
| Trigger       | Low memory, user pause, waiting process           | Time quantum, interrupt, trap, system call           |
| Result        | Process cannot run until reloaded into RAM        | Another process immediately gets the CPU             |

---

Disk

**Memory**

# IBPS SO IT Important Points

### Process Suspension

* Process is **temporarily moved from RAM to Disk**.
* Used to **free memory**.
* Related to **Swapping**.
* Two suspended states:

  * **Blocked Suspend**
  * **Ready Suspend**
* Focuses on **memory management**, not CPU allocation.

### Process Switching (Context Switching)

* CPU changes from one process to another.
* Saves current process state in the **PCB**.
* Restores the next process's state from its **PCB**.
* Triggered by:

  * **Interrupts**
  * **System (Supervisor) Calls**
  * **Traps**
  * **Time quantum expiry**
  * **Higher-priority process becoming ready**

### Interrupt vs Trap

* **Interrupt** → External event (keyboard, mouse, timer, network).
* **Trap** → Internal event caused by the running process (divide by zero, invalid memory access, illegal instruction).

---

# Final One-Line Revision (High Probability for IBPS)

```text
Process Suspension = RAM ⇄ Disk = Memory Management

Process Switching = CPU changes from one process to another = Context Switching
```

If you remember this distinction, you'll be able to answer most IBPS SO IT questions on this topic correctly.
