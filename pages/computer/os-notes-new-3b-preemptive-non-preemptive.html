# Preemptive and Non-Preemptive Scheduling (IBPS SO IT)

This is **one of the most important scheduling topics** for **IBPS SO IT**. Questions are frequently asked like:

* Which algorithms are preemptive?
* Which are non-preemptive?
* Difference between preemptive and non-preemptive scheduling.
* Advantages & disadvantages.
* Which scheduling algorithm is best for interactive systems?

Let's understand everything in a very simple way.

---

# First Understand the Big Picture

Imagine there are **5 students waiting to use a computer.**

Only **one student can use it at a time.**

Now the teacher (Operating System) decides:

* Who gets the computer?
* For how long?
* Can someone interrupt another student?

This decision is called

> **CPU Scheduling**

There are only **2 ways** to do it.

```
CPU Scheduling
       │
 ┌─────┴─────┐
 │           │
Preemptive   Non-Preemptive
```

The whole topic revolves around these two.

---

# What is Non-Preemptive Scheduling?

## Simple Definition

Once a process gets the CPU,

👉 **Nobody can take the CPU away from it.**

It keeps running until

* it finishes, OR
* it voluntarily waits for I/O.

The OS cannot forcefully stop it.

---

## Real-Life Example

Imagine you're writing an exam.

Teacher says

> "Once you start, nobody will disturb you until you finish."

Exactly like Non-Preemptive Scheduling.

---

## Example

Suppose

| Process | Burst Time |
| ------- | ---------- |
| P1      | 8 sec      |
| P2      | 3 sec      |
| P3      | 2 sec      |

Execution

```
Time

0---------8------11-----13

P1          P2      P3
```

Even if P3 only needs 2 seconds,

it must wait.

Why?

Because CPU cannot take the CPU from P1.

---

# Rule to Remember

```
CPU Given

↓

No interruption

↓

Finish execution

↓

Next Process
```

---

# Non-Preemptive Algorithms

According to your diagram,

there are **4 Non-Preemptive Scheduling Algorithms.**

```
Non-Preemptive

│

├── FCFS

├── SJF

├── Priority (Non-Preemptive)

└── HRRN
```

Let's understand each.

---

# 1. FCFS (First Come First Serve)

Exactly like

```
Railway Ticket Counter
```

Whoever comes first,

gets served first.

Example

```
Arrival

P1
P2
P3
P4
```

Execution

```
P1 → P2 → P3 → P4
```

No interruption.

---

# 2. SJF (Shortest Job First)

CPU chooses

the process having

**smallest burst time.**

Example

| Process | Burst |
| ------- | ----- |
| P1      | 10    |
| P2      | 2     |
| P3      | 5     |

Execution

```
P2

↓

P3

↓

P1
```

Shortest job first.

No interruption after execution starts.

---

# 3. Priority Non-Preemptive

Each process has a priority.

Example

| Process | Priority |
| ------- | -------- |
| P1      | 2        |
| P2      | 10       |
| P3      | 7        |

CPU starts

```
P2

↓

P3

↓

P1
```

Highest priority executes first.

But once CPU is given,

it cannot be interrupted.

---

# 4. HRRN (Highest Response Ratio Next)

Full Form

> Highest Response Ratio Next

Formula

```
Response Ratio

=

(Waiting Time + Burst Time)

----------------------------

Burst Time
```

Don't worry.

For IBPS,

usually only

* Full form
* Basic idea

are asked.

Idea:

Process with highest response ratio gets CPU.

This reduces starvation.

---

# Advantages of Non-Preemptive Scheduling

---

## 1. Easy to Design

No complicated interruption.

Simple logic.

---

## 2. Less CPU Overhead

CPU does not repeatedly save and restore processes.

Hence

Less overhead.

---

## 3. Fewer Context Switches

Remember

Context Switch means

```
Stop P1

↓

Save State

↓

Load P2

↓

Run P2
```

This takes time.

Non-preemptive scheduling rarely performs context switching.

Hence faster.

---

## 4. Predictable

Execution order is easy to know.

Example

```
P1

↓

P2

↓

P3
```

Very easy.

---

# Disadvantages of Non-Preemptive Scheduling

---

## 1. Cannot React Quickly

Suppose

```
P1 = 30 sec
```

Suddenly

```
P2 = 1 sec
```

Even then

P2 must wait.

Poor response time.

---

## 2. Deadlock May Occur

Suppose

P1 has Printer

Waiting for Scanner

P2 has Scanner

Waiting for Printer

Neither can continue.

Deadlock occurs.

(Deadlock is **not caused only because scheduling is non-preemptive**, but non-preemptive resource holding can contribute to it.)

---

## 3. Infinite Loop Problem

Suppose

P1 enters

```
while(true)
```

It never finishes.

CPU remains occupied forever.

Other processes never execute.

---

# Now Let's Learn Preemptive Scheduling

## Simple Definition

OS can interrupt a running process

and give CPU to another process.

The interrupted process goes back

to Ready Queue.

---

## Real-Life Example

Teacher is checking papers.

Suddenly

Principal says

```
Check this urgent file first.
```

Teacher immediately stops current work

and starts urgent file.

That is

Preemptive Scheduling.

---

# Rule

```
CPU Given

↓

OS Can Interrupt Anytime

↓

Another Process Runs
```

---

# When Can Preemption Happen?

The tutorial mentions **3 situations**.

These are important.

---

# Situation 1

## Time Quantum Ends

Suppose

Time Quantum = 4 ms

Process needs

12 ms.

Execution

```
P1

4 ms

↓

Stopped

↓

Back to Ready Queue
```

Later

P1 continues.

This is used in

Round Robin Scheduling.

---

# Situation 2

Higher Priority Process Arrives

Suppose

```
Running

P1

Priority = 4
```

Suddenly

```
P2

Priority = 10
```

OS immediately stops

P1

and runs

P2.

---

# Situation 3

Shorter Job Arrives

Suppose

Running

```
P1 = 20 sec
```

Suddenly

```
P2 = 2 sec
```

Using

Shortest Remaining Time First

OS immediately switches

to P2.

---

# Preemptive Algorithms

According to the diagram,

there are only 3.

```
Preemptive

│

├── Round Robin

├── Shortest Remaining Time First

└── Priority Preemptive
```

---

# 1. Round Robin (RR)

Every process gets

equal CPU time.

Suppose

Time Quantum = 2 sec

Execution

```
P1

↓

P2

↓

P3

↓

P1

↓

P2

↓

P3
```

Everyone gets equal chance.

---

# 2. Shortest Remaining Time First (SRTF)

This is

Preemptive version of SJF.

CPU always executes

the process having

smallest remaining burst time.

Suppose

```
Running

P1 = 10 sec
```

After 3 seconds

Remaining = 7 sec

Suddenly

```
P2 = 2 sec
```

CPU immediately switches.

---

# 3. Priority Preemptive

Highest priority always gets CPU.

Suppose

```
Running

P1

Priority = 2
```

Suddenly

```
P2

Priority = 10
```

CPU immediately switches to

P2.

---

# Advantages of Preemptive Scheduling

---

## 1. No Process Can Capture CPU Forever

Every process eventually gets a chance (depending on the algorithm).

---

## 2. Fair Scheduling

Everyone gets CPU.

Especially in

Round Robin.

---

## 3. Better Response Time

Very important.

Interactive systems

like

Windows

Android

Linux Desktop

use Preemptive Scheduling.

Because user actions respond quickly.

---

## 4. Adaptive

Scheduler can reconsider its decision whenever a process is preempted.

If a more suitable process arrives, it can switch immediately.

---

## 5. Can Help Prevent Certain Deadlock Situations

If the OS can preempt resources or CPU under appropriate designs, it may avoid some deadlock scenarios. (This depends on the system and resources; preemption alone does **not** eliminate all deadlocks.)

---

# Disadvantages

---

## 1. More Context Switching

Every interruption means

Save

Load

Restore

Again Save

Again Restore

This consumes CPU time.

---

## 2. More Memory

Need PCB

Registers

Program Counter

Memory Information

for every interrupted process.

---

## 3. Starvation

Suppose

High priority jobs keep arriving.

```
High

High

High

High

High
```

Low priority process

keeps waiting forever.

This is called

Starvation.

---

## 4. Complex

Need careful programming.

Otherwise

switching may lose data.

---

# Difference Between Preemptive and Non-Preemptive Scheduling

| Feature             | Preemptive Scheduling                                                                                  | Non-Preemptive Scheduling                                              |
| ------------------- | ------------------------------------------------------------------------------------------------------ | ---------------------------------------------------------------------- |
| CPU Interruption    | Running process **can** be interrupted.                                                                | Running process **cannot** be interrupted until it finishes or blocks. |
| CPU Allocation      | CPU is allocated for a limited time or until a higher-priority event occurs.                           | CPU remains with the process until it completes or voluntarily waits.  |
| Context Switching   | Frequent                                                                                               | Less frequent                                                          |
| Overhead            | High                                                                                                   | Low                                                                    |
| Response Time       | Better                                                                                                 | Poorer                                                                 |
| Fairness            | Better (e.g., Round Robin)                                                                             | Lower; a long process may monopolize the CPU.                          |
| Complexity          | More complex                                                                                           | Simpler                                                                |
| Interactive Systems | Best suited                                                                                            | Not suitable                                                           |
| Starvation          | Possible (e.g., low-priority processes).                                                               | Also possible in some algorithms (e.g., SJF can starve long jobs).     |
| Deadlock            | CPU preemption alone does not prevent all deadlocks, but resource preemption may help in some systems. | Non-preemptive resource holding can contribute to deadlocks.           |
| Examples            | Round Robin, SRTF, Priority Preemptive                                                                 | FCFS, SJF, Priority Non-Preemptive, HRRN                               |

> **Important correction for IBPS:** The table in many tutorials oversimplifies starvation and deadlocks. Starvation is **not exclusive** to preemptive scheduling. For example, **Non-preemptive SJF** can also starve long processes. Likewise, deadlocks depend mainly on **resource allocation**, not just CPU scheduling.

---

# Easy Memory Trick (IBPS)

### Non-Preemptive

**"Finish First, Then Leave"**

```
CPU

↓

Run Completely

↓

Next Process
```

Algorithms:

* FCFS
* SJF
* Priority (Non-Preemptive)
* HRRN

---

### Preemptive

**"Stop Anytime"**

```
CPU

↓

Interrupt Possible

↓

Ready Queue

↓

Resume Later
```

Algorithms:

* Round Robin (RR)
* Shortest Remaining Time First (SRTF)
* Priority Preemptive

---

# IBPS SO IT One-Liners (Very Important)

* **Preemption** means forcibly taking the CPU away from a running process.
* **Non-preemptive scheduling** never interrupts a running process.
* **Round Robin** is the most common preemptive scheduling algorithm and uses a **time quantum**.
* **SRTF** is the preemptive version of **SJF**.
* **Priority Scheduling** can be implemented in both **preemptive** and **non-preemptive** forms.
* **FCFS** is the simplest non-preemptive scheduling algorithm.
* **HRRN** improves fairness by considering both waiting time and burst time, helping reduce starvation.
