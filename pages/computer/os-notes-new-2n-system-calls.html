# Operating System – System Calls (IBPS SO IT)

*Based on your uploaded notes.* 

This is one of the **most important Operating System topics** for **IBPS SO IT**.

Questions are commonly asked on:

* What is a System Call?
* User Mode vs Kernel Mode ⭐⭐⭐⭐⭐
* How a System Call Works ⭐⭐⭐⭐⭐
* Types of System Calls ⭐⭐⭐⭐⭐
* Common System Calls (fork(), exec(), read(), write(), wait(), exit()) ⭐⭐⭐⭐⭐

Let's understand everything from scratch.

---

# First Understand the Problem

Suppose you write a program:

```c
printf("Hello");
```

or

```c
read(file);
```

Question:

Can your program directly read the hard disk?

**No.**

Can it directly use RAM?

**No.**

Can it directly access the printer?

**No.**

Why?

Because that would be dangerous.

Every application would be able to damage the operating system.

So who accesses hardware?

👉 **Operating System (Kernel).**

---

# What is a System Call?

## Definition

A **System Call** is a mechanism through which a user program requests a service from the Operating System (Kernel).

Easy Definition

> **System Call = Interface between User Program and Operating System.**

Remember this definition.

---

# Real-Life Example

Imagine

You want money from the bank.

Can you directly enter the locker room?

❌ No.

You tell the cashier.

Cashier talks to the bank system.

Gets your money.

Diagram

```text
You

↓

Cashier

↓

Bank Locker

↓

Money
```

Here,

Cashier

=

System Call.

---

# Another Computer Example

Suppose

Program wants to

Read File.

Diagram

```text
Program

↓

System Call

↓

Operating System

↓

Hard Disk

↓

Data Returned
```

Program never touches hardware directly.

---

# Why Can't User Programs Access Hardware Directly?

Suppose a virus executes

```c
formatDisk();
```

If direct hardware access were allowed,

the entire disk could be erased.

Therefore,

Operating Systems protect hardware.

---

# User Mode and Kernel Mode ⭐⭐⭐⭐⭐

This is the most important concept.

A computer works in **two modes**.

```text
CPU

│
├── User Mode
└── Kernel Mode
```

---

# User Mode

This is where normal applications execute.

Examples

* Chrome
* MS Word
* VLC
* Calculator

Characteristics

* Limited privileges
* Cannot access hardware directly
* Cannot modify OS memory

Diagram

```text
User Mode

Chrome

Word

Calculator
```

---

# Kernel Mode

This is where

Operating System runs.

Kernel has

✔ Full hardware access

✔ Full memory access

✔ Device control

Diagram

```text
Kernel Mode

Operating System

↓

CPU

↓

RAM

↓

Disk

↓

Printer
```

---

# User Mode vs Kernel Mode

| User Mode              | Kernel Mode           |
| ---------------------- | --------------------- |
| Applications run       | Operating System runs |
| Limited privileges     | Full privileges       |
| Cannot access hardware | Can access hardware   |
| Safe                   | Powerful              |

---

# Memory Trick

Think

User Mode

=

Guest

Kernel Mode

=

Owner

Guest

cannot enter

every room.

Owner

can.

# How Does System Call Work? ⭐⭐⭐⭐⭐

This is the most important topic.

Let's understand step-by-step.

---

# Complete Diagram

```text
User Program

↓

System Call

↓

Kernel

↓

Hardware

↓

Result

↓

User Program
```

---

## Step 1 – Preparation

Program prepares

arguments.

Example

```c
read(fd, buffer, 100);
```

Arguments

```text
File Descriptor

Buffer

100 Bytes
```

---

## Step 2 – Trap Instruction ⭐⭐⭐

Very Important.

Program executes

TRAP.

Question

What is Trap?

Trap is

an instruction

that tells CPU

> "Please switch to Kernel Mode."

---

Diagram

```text
User Mode

↓

TRAP

↓

Kernel Mode
```

---

## Step 3 – Mode Switch ⭐⭐⭐⭐⭐

CPU changes

```text
User Mode

↓

Kernel Mode
```

CPU also saves

* Registers
* Program Counter

so it can return later.

---

## Step 4 – System Call Dispatch

Kernel checks

System Call Number.

Suppose

```text
System Call = read()
```

Kernel searches

System Call Table.

Diagram

```text
Call Number

↓

System Call Table

↓

read()
```

Think of it like a menu in a restaurant. The waiter (kernel) looks up the order number and calls the correct kitchen function.

---

## Step 5 – Execution

Kernel performs

requested task.

Example

Read File.

Diagram

```text
Kernel

↓

Disk

↓

Reads File
```

---

## Step 6 – Return

Kernel finishes.

CPU changes

```text
Kernel Mode

↓

User Mode
```

Program continues.

---

# Complete Flow

```text
Program

↓

Prepare Arguments

↓

TRAP

↓

Kernel Mode

↓

System Call Table

↓

Kernel Function

↓

Hardware

↓

Return Value

↓

```

Remember this flow.

Suppose program executes

Step 1

---

Step 2

```text

buffer

```

---

# IBPS SO IT Important Points

### System Call

* Interface between **User Program** and **Operating System Kernel**.
* Used whenever a program needs OS services such as file access, process creation, or device I/O.

### User Mode vs Kernel Mode

* **User Mode** → Limited privileges, no direct hardware access.
* **Kernel Mode** → Full access to hardware and system resources.

### Working of a System Call

1. Prepare arguments.
2. Execute **TRAP** instruction.
3. CPU switches from User Mode to Kernel Mode.
4. Kernel identifies the required service using the **System Call Table**.
5. Kernel performs the requested operation.
6. CPU switches back to User Mode and returns the result.

### Types of System Calls

* Process Control
* File Management
* Device Management
* Information Management
* Communication
* Protection

### Important System Calls

| System Call | Purpose                                      |
| ----------- | -------------------------------------------- |
| **fork()**  | Create a child process                       |
| **exec()**  | Load and execute a new program               |
| **wait()**  | Parent waits for child process               |
| **exit()**  | Terminate a process                          |
| **open()**  | Open a file                                  |
| **read()**  | Read data from a file                        |
| **write()** | Write data to a file                         |
| **close()** | Close a file                                 |
| **kill()**  | Send a signal to terminate/control a process |

---

# Final One-Line Revision (Most Important)

```text
System Call = Interface between User Program and Operating System.

User Mode → TRAP → Kernel Mode → OS performs work → Return to User Mode.

Most important system calls:
fork(), exec(), wait(), exit(), open(), read(), write(), close(), kill().
```

---

# IBPS SO IT Exam Tips (Highest Probability Questions)

1. **What is a System Call?**

   * A programmatic interface through which a user program requests services from the OS kernel.

2. **Why are System Calls required?**

   * Because user programs **cannot directly access hardware or protected kernel resources**.

3. **What is the difference between User Mode and Kernel Mode?**

   * User Mode has restricted privileges; Kernel Mode has full access to hardware and system resources.

4. **What is the purpose of the TRAP instruction?**

   * To transfer control from **User Mode to Kernel Mode** so the operating system can execute the requested service.

5. **Which system call creates a new process?**

   * **fork()**

6. **Which system call makes the parent process wait for the child?**

   * **wait()**

7. **Which system call loads a new program into a process?**

   * **exec()**

8. **Which system call terminates a process?**

   * **exit()**
