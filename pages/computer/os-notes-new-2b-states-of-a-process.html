# Operating System – States of a Process (IBPS SO IT)

This topic is an extension of **Process Life Cycle**. For **IBPS SO IT**, you should know:

* Two-State Model
* Five-State Model ⭐⭐⭐ (Most Important)
* Seven-State Model ⭐⭐
* Dispatcher
* Suspended States

Let's understand everything in a very easy way.

---

# First, What is a Process State?

A **process state** tells us **what a process is doing at a particular moment**.

Think of it like the status of a food delivery order.

```
Order Placed
↓

Preparing

↓

Out for Delivery

↓

Delivered
```

Similarly, a process also has different statuses.

Example:

```
Chrome opened

↓

Waiting for CPU

↓

Running

↓

Waiting for Internet

↓

Running Again

↓

Closed
```

These statuses are called **Process States**.

---

# Why Do We Need Process States?

Imagine your computer has:

* Chrome
* VS Code
* Spotify
* MS Word
* VLC

Can all of them use the CPU at exactly the same time?

**No.**

The Operating System decides:

* Which process should run?
* Which process should wait?
* Which process has finished?

To manage this, the OS keeps every process in a particular state.

---

# There are Three Models

The tutorial talks about three models.

```
1. Two-State Model
2. Five-State Model
3. Seven-State Model
```

The difference is simply **how much detail** each model gives.

Think like this:

```
Class 5 Science
↓

Class 10 Science
↓

Engineering Science
```

Same concept, but more detailed.

---

# 1. Two-State Model (Simplest)

This is the easiest model.

There are only **2 states**.

```
Running
Not Running
```

That's all.

---

## Running State

Means

```
CPU is executing the process.
```

Example

You open Calculator.

CPU starts executing it.

State:

```
Running
```

---

## Not Running State

Means

```
The process is NOT using the CPU.
```

It may be

* waiting for CPU
* waiting for keyboard input
* waiting for printer
* waiting for network

But the model doesn't distinguish between them.

Everything is simply called

```
Not Running
```

---

## Diagram

```
        New Process
             |
             v
      +---------------+
      | Not Running   |
      +---------------+
             |
      CPU Allocated
             |
             v
      +---------------+
      |   Running     |
      +---------------+
             |
      Needs I/O or CPU Taken Away
             |
             v
      +---------------+
      | Not Running   |
      +---------------+
```

---

## Real-Life Example

Imagine there is only one doctor.

Patients are:

* Rahul
* Amit
* Neha

Only one patient can meet the doctor.

```
Doctor Checking Rahul
↓

Rahul = Running

Others = Not Running
```

Very simple.

---

# Limitation of Two-State Model

Suppose Chrome is waiting because:

* CPU is busy

OR

* Internet is slow

Both become

```
Not Running
```

The OS cannot tell the difference.

Therefore,

A more detailed model was introduced.

---

# Dispatcher (Very Important)

The tutorial mentions the **Dispatcher**.

### What is Dispatcher?

A **Dispatcher** is the part of the Operating System that **gives the CPU to a selected process**.

Think of it like a traffic police officer.

```
Cars Waiting

↓

Traffic Police Chooses One

↓

Allows It to Move
```

Similarly,

```
Ready Processes

↓

Dispatcher Chooses One

↓

CPU Assigned

↓

Running
```

---

## Dispatching

The process of giving the CPU to a process is called

> **Dispatching**

Remember this definition.

### Exam Question

**Who allocates CPU to a process?**

Answer:

**Dispatcher**

---

# Five-State Model (Most Important)

This is the **most important model** for IBPS SO IT.

There are **5 states**.

```
Start

↓

Ready

↓

Running

↓

Waiting

↓

Terminated
```

---

# 1. Start (New)

When a program is first executed,

the OS creates the process.

Example

Double-click Chrome.

State

```
Start
```

The process is being created.

It is **not ready to run yet**.

---

# 2. Ready State

The process has everything except the CPU.

It is ready.

It is only waiting for CPU allocation.

Example

Suppose three apps are opened.

```
Chrome

Word

VLC
```

CPU can execute only one.

Suppose

```
Chrome
```

gets CPU.

Then

```
Word

VLC
```

are in

```
Ready
```

state.

---

## Important

Ready means

```
Waiting for CPU
```

NOT

waiting for keyboard.

---

# 3. Running State

CPU is executing instructions.

Example

```
Chrome
```

is opening a webpage.

State

```
Running
```

---

# 4. Waiting State (Blocked State)

Sometimes,

the process cannot continue because it needs something.

Examples

Waiting for

* Keyboard input
* Mouse click
* Printer
* Disk
* Internet
* File
* Database response

Then

the process enters

```
Waiting
```

---

### Example

```
Enter Password:
```

Until user types,

the process cannot continue.

State:

```
Waiting
```

---

## Important

Waiting means

```
Waiting for Resource
```

Examples:

* Printer
* Keyboard
* Internet
* Disk

---

# 5. End (Terminated)

Process finishes.

Example

```
Hello World
```

Printed.

Program exits.

State

```
Terminated
```

OS removes it from memory.

---

# Complete Five-State Diagram

```
              +-------+
              | Start |
              +-------+
                  |
                  v
             +---------+
             | Ready   |
             +---------+
                  |
          CPU Assigned
                  |
                  v
            +-----------+
            | Running   |
            +-----------+
            /         \
     Needs I/O       Finishes
         |              |
         v              v
   +-----------+   +-----------+
   | Waiting   |   |Terminated |
   +-----------+   +-----------+
         |
Resource Available
         |
         v
      Ready
```

---

# Real-Life Example

Imagine you're giving an exam.

```
Exam Hall Entry

↓

Sit on Chair

↓

Writing Exam

↓

Need Extra Sheet

↓

Writing Again

↓

Submit Paper
```

Equivalent Process States:

```
Entry = Start

Sit = Ready

Writing = Running

Need Sheet = Waiting

Submit = Terminated
```

---

# Seven-State Model

Now we add **2 extra states**.

Earlier we had

```
Start

Ready

Running

Waiting

Terminated
```

Now add

```
Suspended Ready

Suspended Blocked
```

Total = **7 states**

---

# Why Suspended States?

Imagine RAM is almost full.

Many programs are open.

OS says:

```
I don't have enough memory.
```

So,

the OS temporarily removes some processes from RAM (usually storing their state on disk) to free memory.

This is called

```
Suspension
```

The process is **not terminated**.

It is simply paused.

---

# Suspended Ready State

The process

* is ready to run,
* but the OS has suspended it.

Meaning

```
It doesn't need any resource.

It only needs CPU.

But it has been temporarily removed from active memory to free resources.
```

---

### Example

Suppose

You open

* Chrome
* Word
* Photoshop
* Android Studio
* VLC

RAM becomes full.

OS suspends VLC.

It was ready.

Now it becomes

```
Suspended Ready
```

---

# Suspended Blocked State

This process

* was already waiting for some resource,
* and the OS also suspends it.

So now,

it is

```
Waiting

+

Suspended
```

---

### Example

Suppose

Chrome is downloading a file.

Internet disconnects.

Chrome waits.

Meanwhile,

RAM becomes full.

OS suspends Chrome.

Now state becomes

```
Suspended Blocked
```

---

# Difference Between Waiting and Suspended Blocked

### Waiting

```
Still in memory.

Waiting for resource.
```

### Suspended Blocked

```
Waiting for resource

+

Temporarily removed from active memory by OS.
```

---

# Difference Between Ready and Suspended Ready

### Ready

```
Ready to execute.

Waiting for CPU.

Still in RAM.
```

### Suspended Ready

```
Ready to execute.

Waiting for CPU.

But suspended by OS (not currently in active memory).
```

---

# Why Does OS Suspend Processes?

Main reasons:

* RAM is full
* To free resources
* To improve performance
* To avoid deadlock (as mentioned in the tutorial)
* To give higher-priority processes a chance to run

---

# Comparison of All Three Models

| Feature          | Two-State            | Five-State                                 | Seven-State                                                                    |
| ---------------- | -------------------- | ------------------------------------------ | ------------------------------------------------------------------------------ |
| Number of States | 2                    | 5                                          | 7                                                                              |
| States           | Running, Not Running | Start, Ready, Running, Waiting, Terminated | Start, Ready, Running, Waiting, Terminated, Suspended Ready, Suspended Blocked |
| Detail Level     | Lowest               | Medium (most commonly taught)              | Highest                                                                        |
| Used in Exams    | Less                 | ⭐⭐⭐ Most Important                         | ⭐⭐ Sometimes                                                                   |

---

# Easy Way to Remember

## Two-State Model

```
Running

Not Running
```

Think:

**Working / Not Working**

---

## Five-State Model

Remember this sequence:

```
Start

↓

Ready

↓

Running

↓

Waiting

↓

Terminated
```

Shortcut:

**S → R → R → W → T**

(Start → Ready → Running → Waiting → Terminated)

---

## Seven-State Model

Just add two more states to the Five-State Model:

```
Suspended Ready

Suspended Blocked
```

Easy trick:

> **Suspended = Temporarily paused by the Operating System to free resources.**

---

# Dispatcher vs Scheduler (Very Important)

Many students confuse these two.

| Scheduler                                 | Dispatcher                                        |
| ----------------------------------------- | ------------------------------------------------- |
| Decides **which process should run next** | Actually **gives the CPU** to that chosen process |
| Makes the selection                       | Performs the CPU handover (dispatching)           |
| Decision-making component                 | Execution component                               |

### Simple Analogy

Imagine a cricket team:

* **Scheduler = Coach** (decides who will bat next)
* **Dispatcher = Umpire** (signals "you may enter the field")

---

# IBPS SO IT Exam Points

### Must Remember

* **Two-State Model:** Running and Not Running
* **Five-State Model:** Start → Ready → Running → Waiting → Terminated (**most important**)
* **Seven-State Model:** Five-State Model + Suspended Ready + Suspended Blocked
* **Ready = Waiting for CPU**
* **Waiting (Blocked) = Waiting for I/O or another resource**
* **Dispatcher allocates the CPU to a process**
* **Dispatching = The act of assigning the CPU to a selected process**
* **Suspended Ready = Ready but temporarily suspended by the OS**
* **Suspended Blocked = Waiting for a resource and also suspended by the OS**

> **Exam Tip:** If a question asks, *"A process is ready to execute but is waiting only for the CPU,"* the correct answer is **Ready State**. If it asks, *"A process is waiting for keyboard input, disk I/O, printer, or network,"* the correct answer is **Waiting (Blocked) State**.
