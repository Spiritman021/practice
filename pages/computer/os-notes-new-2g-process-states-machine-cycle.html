# Operating System – Process States and the Machine Cycle (IBPS SO IT)

This chapter combines **two different subjects**:

1. **Process States** → Operating System concept
2. **Machine Cycle** → CPU Architecture concept

Many students get confused because both deal with **program execution**, but they work at **different levels**.

* **Operating System** = Manager
* **CPU** = Worker

The **OS decides who should work**, and the **CPU actually does the work**.

---

# Big Picture

```text
Operating System
      ↓
Decides Which Process Runs
      ↓
Process States
      ↓
Running Process
      ↓
CPU
      ↓
Machine Cycle
Fetch → Decode → Execute → Store
```

# First Understand the Difference

| Process States | Machine Cycle |
| --- | --- |
| OS Concept | CPU Concept |
| Tells what the process is doing | Tells how CPU executes instructions |
| Managed by Operating System | Performed by CPU |
| New, Ready, Running, Waiting, Terminated | Fetch, Decode, Execute, Store |

> **Process States = What the process is doing.**
> **Machine Cycle = How the CPU executes instructions.**

---

# Part 1 – Process States

## New State

The program exists on disk, the user starts it, and the OS checks memory, permissions, and validity before creating the process.

## Ready State

The process is in RAM and has everything except the CPU. It waits in the Ready Queue.

## Running State

The CPU executes the process instructions. This is where the **Machine Cycle begins**.

## Waiting State

The process waits for keyboard input, disk data, a network response, or another event.

## Terminated State

The program finishes. The OS frees memory, deletes the PCB, and releases resources.

---

# What is the Machine Cycle?

The CPU follows four steps for every instruction:

```text
Fetch
  ↓
Decode
  ↓
Execute
  ↓
Store
  ↓
Repeat
```

# Step 1 – Fetch

The CPU fetches the next instruction from RAM.

## Program Counter (PC)

The Program Counter stores the **address of the next instruction**. It works like a bookmark.

# Step 2 – Decode

The CPU interprets what the instruction means.

# Step 3 – Execute

The CPU performs the operation. If calculation is required, the **ALU** performs it.

# Step 4 – Store

The CPU saves the result in a register or RAM. The Program Counter advances and the cycle repeats.

---

# Relationship Between Process States and Machine Cycle

## 1. Running Process Uses Machine Cycle

Only the **Running** process uses Fetch, Decode, Execute, and Store. Ready and Waiting processes do not.

## 2. Machine Cycle Moves Process Forward

The CPU executes each instruction until the final instruction completes and the process terminates.

## 3. Waiting Can Begin During Execution

If an instruction needs slow I/O, the process moves from Running to Waiting and the OS gives the CPU to another process.

## 4. Context Switch Interrupts the Cycle

The OS saves the current process PCB, loads another process PCB, and the CPU begins executing that process.

## 5. Ready Waits for CPU

A Ready process cannot begin its Machine Cycle until the scheduler allocates the CPU.

## 6. Termination Follows the Final Cycle

After the last instruction completes its Fetch–Decode–Execute–Store cycle, the process enters Terminated.

---

# Difference Between Process States and Machine Cycle

| Process States | Machine Cycle |
| --- | --- |
| Managed by Operating System | Performed by CPU |
| Describes process status | Describes instruction execution |
| New, Ready, Running, Waiting, Terminated | Fetch, Decode, Execute, Store |
| Decides which process gets CPU | Executes the running process |
| Many processes can be Ready or Waiting | Only the Running process uses it |

# Memory Tricks

## Process States

```text
N → R → R → W → T
```

New, Ready, Running, Waiting, Terminated.

## Machine Cycle

```text
FDES
```

Fetch, Decode, Execute, Store.

---

# IBPS SO IT Important Points

* **New** → Process is being created.
* **Ready** → Process is in RAM, waiting for CPU.
* **Running** → CPU is executing instructions.
* **Waiting** → Process is waiting for I/O or another event.
* **Terminated** → Process completed and resources are released.
* **Fetch** → CPU fetches the next instruction.
* **Decode** → CPU interprets the instruction.
* **Execute** → CPU or ALU performs the operation.
* **Store** → Result is stored in a register or memory.
* Only the Running process uses the Machine Cycle.
* Context Switching pauses one process cycle and begins another using saved PCB context.

# Final One-Line Revision

> **Process States tell the Operating System which process should run. Machine Cycle tells the CPU how to execute that running process: Fetch → Decode → Execute → Store.**
