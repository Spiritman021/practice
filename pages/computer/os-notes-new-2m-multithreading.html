# Operating System – Multithreading (IBPS SO IT)

This chapter is actually a **combination of all previous thread topics**.

It mainly explains:

* What is Multithreading?
* Single Thread vs Multithread
* Multithreading Models ⭐⭐⭐⭐⭐
* Many-to-One
* One-to-One
* Many-to-Many

👉 **For IBPS SO IT, the most important topic in this chapter is the Threading Models.**

---

# First Revise Thread

We already learned

A **Thread** is

> The **smallest unit of execution** inside a process.

Example

Chrome Browser

```text
Chrome Process

│
├── Tab 1
├── Tab 2
├── Download
└── Music
```

Each tab can execute independently.

---

# What is Multithreading?

## Definition

Multithreading means

> **Executing multiple threads within the same process simultaneously (or concurrently).**

Easy Definition

> **One Process → Multiple Threads**

---

# Example

Suppose you open Chrome.

At the same time

* Watching YouTube
* Downloading PDF
* Opening Gmail
* Playing Music

Diagram

```text
              Chrome Process

        ┌────────┬────────┬────────┐
        ▼        ▼        ▼        ▼
     Thread1  Thread2  Thread3  Thread4

     Video    Download Gmail    Music
```

One process.

Multiple threads.

This is **Multithreading**.

---

# Why Do We Need Multithreading?

Suppose Chrome has only one thread.

Diagram

```text
Chrome

↓

Download File

↓

Only After Download Ends

↓

Open Gmail
```

Very slow.

Now with multiple threads.

```text
Chrome

│
├── Download
├── Gmail
├── Music
└── Video
```

Everything happens together.

# Process vs Thread (Quick Revision)

The tutorial repeats this, so let's revise.

| Process                      | Thread                                  |
| ---------------------------- | --------------------------------------- |
| Heavyweight                  | Lightweight                             |
| Separate memory              | Shared memory                           |
| Slower switching             | Faster switching                        |
| More resources               | Fewer resources                         |
| IPC needed for communication | Shared memory allows easy communication |
| Independent                  | Belongs to a process                    |

Remember:

> **Process = Heavyweight**
> **Thread = Lightweight**

---

# Advantages of Multithreading

The tutorial lists several.

---

## 1. Faster Context Switching

Switching

Thread1

↓

Thread2

is faster than

Process1

↓

Process2.

---

## 2. Concurrency

Many tasks appear to execute together.

Example

```text
Music

↓

Download

↓

Typing

↓

Printing
```

---

## 3. Efficient Communication

Threads share

* Code
* Data
* Files

No IPC needed.

---

## 4. Economical

Creating threads

↓

Cheap.

Creating processes

↓

Expensive.

---

## 5. Better CPU Utilization

Suppose

Thread1

waiting.

CPU executes

Thread2.

CPU remains busy.

We already covered these.

## User-Level Thread

Managed by

Thread Library.

Kernel

doesn't know.

## Kernel-Level Thread

Managed by

Operating System.

Kernel

Supports multiprocessing.

# Multithreading Models ⭐⭐⭐⭐⭐

This is the **new and most important topic**.

Operating Systems use

```text
           User Threads

                │

        Mapping Model

                │

        Kernel Threads
```

How are

User Threads

connected

to

Kernel Threads?

Three answers.

# Complete Comparison

| Model        | Mapping             | Multiprocessing | Blocking               |
| ------------ | ------------------- | --------------- | ---------------------- |
| Many-to-One  | Many ULT → One KLT  | ❌ No            | Whole process blocks   |
| One-to-One   | One ULT → One KLT   | ✅ Yes           | Other threads continue |
| Many-to-Many | Many ULT → Many KLT | ✅ Yes           | Other threads continue |

This table is very important.

# Which Model is Best?

For modern Operating Systems

Generally

> **Many-to-Many** provides the greatest flexibility.

However,

many modern systems (like **Windows** and **Linux**) effectively use a **One-to-One** threading model internally because it is simpler to implement while still supporting true parallelism.

For **IBPS SO IT**, remember the conceptual advantages:

* **Many-to-One** → Simple but poor for blocking and multiprocessing.
* **One-to-One** → Good concurrency, but higher overhead.
* **Many-to-Many** → Flexible and scalable.

# IBPS SO IT Important Points

### Multithreading

* **Multithreading = Multiple threads executing within the same process.**
* Threads share:

  * Code
  * Data
  * Open Files
* Each thread has its own:

  * Program Counter
  * Registers
  * Stack

### Threading Models

#### Many-to-One

* Many User-Level Threads → One Kernel-Level Thread.
* Does **not** support true multiprocessing.
* If one thread blocks, the **entire process blocks**.

#### One-to-One

* One User-Level Thread → One Kernel-Level Thread.
* Supports multiprocessing.
* Blocking one thread does not stop other threads.
* Higher overhead because each user thread needs a kernel thread.

#### Many-to-Many

* Many User-Level Threads → Many Kernel-Level Threads.
* High concurrency and flexibility.
* Supports parallel execution on multiprocessor systems.

---

# Final One-Line Revision (Most Important)

```text
Multithreading = One Process → Multiple Threads

Many-to-One → Many ULT → One KLT → Whole Process Blocks

One-to-One → One ULT → One KLT → Parallel Execution

Many-to-Many → Many ULT → Many KLT → Best Concurrency and Flexibility
```

---

# IBPS SO IT Exam Tips (Highest Probability Questions)

1. **What is Multithreading?**

   * Executing multiple threads within a single process.

2. **Which threading model maps many user threads to one kernel thread?**

   * **Many-to-One Model.**

3. **Which model supports multiprocessing and maps one user thread to one kernel thread?**

   * **One-to-One Model.**

4. **Which threading model provides the highest flexibility?**

   * **Many-to-Many Model.**

5. **In which threading model does blocking one user thread block the entire process?**

   * **Many-to-One Model.**

6. **Which threading model has the highest overhead?**

   * **One-to-One**, because every user thread requires a corresponding kernel thread.
