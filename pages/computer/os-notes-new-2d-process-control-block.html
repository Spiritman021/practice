# Operating System – Process Control Block (PCB) (IBPS SO IT)

**PCB (Process Control Block)** is one of the **most important Operating System topics** for **IBPS SO IT**.

Questions are frequently asked on:

* What is PCB?
* Contents of PCB
* PCB and Context Switching
* PCB and Process Scheduling
* PCB location
* Process Table

Let's understand it in a very easy way.

---

# What is a PCB?

### Definition

A **Process Control Block (PCB)** is a **data structure maintained by the Operating System** that stores **all the information about a process**.

### Easy Definition for IBPS

> **PCB is the identity card (or file/record) of a process.**

Without PCB,

the Operating System **cannot manage a process**.

---

# Real-Life Example

Suppose a school has 100 students.

Each student has a file containing

* Roll Number
* Name
* Class
* Attendance
* Marks
* Address

The school uses this file to manage the student.

Similarly,

Operating System maintains one PCB for every process.

Example

```text
Chrome

↓

PCB
```

```text
Contains

PID

State

Priority

Memory

Registers

Files

CPU Information
```

---

# Another Easy Analogy

Imagine a hospital.

Every patient has a file.

```text
Patient Name

Age

Disease

Room Number

Doctor

Medicines
```

The hospital can manage the patient using this file.

PCB is exactly that file for a process.

---

# Other Names of PCB

The tutorial mentions two other names.

PCB is also called

* **Process Descriptor**
* **Task Control Block (TCB)**

### Exam Point

All three mean the same thing.

```text
PCB

=

Process Descriptor

=

Task Control Block (TCB)
```

---

# Where are PCBs Stored?

The tutorial says

> PCBs are stored in the **Process Table** inside the **Kernel**.

Let's understand this.

---

# What is Process Table?

Suppose

There are four processes.

```text
Chrome

Word

Spotify

VLC
```

Operating System creates

4 PCBs.

These are stored together in one table.

Diagram

```text
Kernel Memory

+----------------------------------+
|         Process Table            |
|----------------------------------|
| PCB of Chrome                    |
| PCB of Word                      |
| PCB of Spotify                   |
| PCB of VLC                       |
+----------------------------------+
```

Every running process has its own PCB.

---

# What is Kernel?

Kernel is the **core part of the Operating System**.

It manages

* CPU
* Memory
* Files
* Devices
* Processes

Since PCB contains very important information,

it is stored inside the **Kernel**, not in user memory.

---

# When is PCB Created?

The tutorial says

When a new process is created,

the OS also creates a PCB.

Diagram

```text
Program Starts

↓

Process Created

↓

Operating System

↓

Creates PCB

↓

Stores Process Information
```

---

# When is PCB Deleted?

When process terminates

```text
Process Ends

↓

PCB Removed

↓

Memory Released
```

Simple.

---

# Why is PCB Needed?

Imagine

100 processes are running.

Operating System must know

* Which process is running?
* Which process is waiting?
* Which process owns printer?
* Which process has higher priority?
* Which process should run next?

Without PCB,

OS cannot answer these questions.

---

# Structure of PCB

The tutorial shows many fields.

Let's understand each one.

---

# PCB Structure Diagram

```text
+--------------------------------------+
|        Process Control Block         |
+--------------------------------------+
| Process ID (PID)                     |
| Process State                        |
| Program Counter                      |
| CPU Registers                        |
| Open Files                           |
| CPU Scheduling Information           |
| Memory Management Information        |
| I/O Status Information               |
| Accounting Information               |
+--------------------------------------+
```

These are the most important fields.

---

# 1. Process ID (PID)

Every process gets a unique number.

Example

```text
Chrome

PID = 1200
```

Word

```text
PID = 1201
```

Spotify

```text
PID = 1202
```

Operating System uses PID to identify the process.

---

# 2. Process State

PCB stores the current state.

Possible states

```text
New

Ready

Running

Waiting

Terminated
```

Example

Chrome

```text
State

Running
```

Word

```text
State

Waiting
```

---

# 3. Program Counter (PC)

Very Important.

Program Counter stores

> Address of the **next instruction** to execute.

Example

```text
Instruction 1

Instruction 2

Instruction 3

Instruction 4
```

CPU finished

Instruction 2.

Program Counter points to

```text
Instruction 3
```

---

### Easy Trick

Program Counter

=

Bookmark in a book.

It tells CPU

"Continue reading from here."

---

# 4. Registers

CPU contains many registers.

Examples

* Accumulator
* Stack Pointer
* Index Register
* General Purpose Registers

PCB stores their values.

---

## Why?

Suppose

Chrome is running.

Suddenly

Word gets CPU.

Chrome stops.

Later

Chrome resumes.

How does it remember where it stopped?

Because its register values were saved in PCB.

---

Diagram

```text
CPU Running Chrome

↓

Save Registers

↓

PCB

↓

Later

↓

Restore Registers

↓

Chrome Continues
```

---

# 5. List of Open Files

Suppose Chrome opened

```text
notes.pdf

music.mp3

resume.docx
```

PCB stores

```text
Open Files

notes.pdf

music.mp3

resume.docx
```

Operating System knows which files belong to which process.

---

# 6. CPU Scheduling Information

Scheduler needs information like

* Priority
* Queue
* Scheduling parameters

Example

```text
Priority

High
```

Scheduler will probably execute it before lower-priority processes.

---

# 7. Memory Management Information

Operating System must know

Where process memory is located.

PCB stores

* Page Table
* Segment Table
* Base Register
* Limit Register

You don't need deep details now.

Just remember

> PCB stores all memory-related information.

---

# 8. I/O Status Information

Suppose process is using

* Printer
* Scanner
* Keyboard
* Disk

PCB stores all these details.

Example

```text
Printer

Allocated

Disk

Allocated
```

---

# 9. Accounting Information

Stores statistics like

* CPU time used
* Time limit
* Process number
* Account information

Example

```text
CPU Time Used

15 seconds
```

Operating System uses this for monitoring and accounting.

---

# Where is PCB Located?

The tutorial says

PCB is stored in

> **Protected Kernel Memory**

Why?

Because

PCB contains

* Memory addresses
* CPU registers
* Process state

If users could modify PCB,

they could crash or take control of the system.

So,

Only the **Kernel** can access it.

---

Diagram

```text
+------------------------+
|      User Space        |
|                        |
|  Cannot Access PCB ❌   |
+------------------------+

+------------------------+
|      Kernel Space      |
|                        |
|        PCB ✔           |
+------------------------+
```

---

# PCB in Context Switching

This is one of the most important concepts.

---

## What is Context Switching?

Suppose

CPU is running

```text
Chrome
```

Suddenly

Word gets CPU.

CPU must

1. Save Chrome information.

2. Load Word information.

PCB makes this possible.

---

Diagram

```text
CPU Running Chrome

↓

Save Chrome Registers

↓

Chrome PCB

↓

Load Word Registers

↓

Word PCB

↓

CPU Running Word
```

Without PCB,

CPU wouldn't know where Chrome stopped.

---

# Example

Suppose

Chrome executed

```text
Instruction 50
```

Then

CPU switches to Word.

Later

CPU returns.

How does Chrome continue from

Instruction 51?

Answer

PCB stores

Program Counter

Registers

Stack Pointer

Everything.

---

# PCB in Process Scheduling

Scheduler decides

Which process should run.

But how?

It checks PCB.

Diagram

```text
PCB

↓

Priority

↓

Ready State

↓

CPU Time Used

↓

Scheduler Decision
```

Without PCB,

Scheduler cannot work.

---

# PCB in Multitasking

Suppose

Running

```text
Chrome

Spotify

Word

VS Code
```

CPU switches rapidly.

PCB stores each process's information separately.

Diagram

```text
Chrome PCB

Word PCB

Spotify PCB

VS Code PCB
```

Because every process has its own PCB,

OS can run many processes together.

This is called

**Multitasking**.

---

# PCB in Resource Sharing

Suppose

Chrome already opened

```text
file.txt
```

Word requests

```text
file.txt
```

Operating System checks

Chrome PCB

↓

Can this file be shared?

↓

Yes

↓

Allow

OR

No

↓

Reject

PCB helps manage resources.

---

# Complete Working of PCB

```text
Program Starts

↓

Process Created

↓

PCB Created

↓

Process Runs

↓

PCB Continuously Updated

↓

Context Switching

↓

PCB Saves Process Information

↓

Process Continues Later

↓

Process Ends

↓

PCB Deleted
```

---

# Summary of PCB Fields

| PCB Field                     | Purpose                                                  |
| ----------------------------- | -------------------------------------------------------- |
| Process ID (PID)              | Unique identification of the process                     |
| Process State                 | Current state (New, Ready, Running, Waiting, Terminated) |
| Program Counter               | Address of the next instruction to execute               |
| CPU Registers                 | Saves CPU register values for resuming execution         |
| Open Files                    | Files currently opened by the process                    |
| CPU Scheduling Information    | Priority, scheduling queue, scheduling parameters        |
| Memory Management Information | Page table, segment table, base/limit registers          |
| I/O Status Information        | Allocated I/O devices and files                          |
| Accounting Information        | CPU usage, execution time, process statistics            |

---

# Easy Memory Trick

Remember:

**"PCB is the Report Card of a Process."**

It stores everything about the process.

Or remember the sentence:

> **"Every process has one PCB, and every PCB stores everything the OS needs to manage that process."**

---

# Complete PCB Mind Map

```text
                  PROCESS
                     │
                     ▼
          Process Control Block (PCB)
                     │
     ┌───────────────┼────────────────┐
     │               │                │
     ▼               ▼                ▼
   PID          Process State    Program Counter
     │               │                │
     ├───────────────┼────────────────┤
     ▼               ▼                ▼
 CPU Registers   Open Files    Scheduling Info
     │               │                │
     ├───────────────┼────────────────┤
     ▼               ▼                ▼
 Memory Info     I/O Status     Accounting Info
```

---

# IBPS SO IT Exam Points (Must Remember)

### Very Important

* **PCB = Process Control Block**
* **Other names:** Process Descriptor, Task Control Block (TCB)
* **One PCB is created for every process**
* **PCB is stored in the Process Table inside the Kernel**
* **PCB is created when the process is created and deleted when the process terminates**
* **PCB stores PID, Process State, Program Counter, CPU Registers, Memory Information, Scheduling Information, I/O Information, Open Files, and Accounting Information**
* **PCB is essential for Context Switching**
* **Scheduler uses PCB to select the next process**
* **Kernel protects PCB from direct user access**

---

# IBPS SO IT One-Liner Revision

* **PCB = Identity card/report card of a process.**
* **Process Table = Collection of all PCBs.**
* **Kernel = Stores and protects PCBs.**
* **Program Counter = Address of the next instruction.**
* **Context Switching = Save current process state in its PCB → Load next process state from its PCB.**
* **Without PCB, the Operating System cannot perform process management, scheduling, multitasking, or context switching.**
