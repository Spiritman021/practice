# Operating System (OS)

## What is an Operating System?

### Simple Definition (IBPS Exam)

An **Operating System (OS)** is **system software** that acts as an **interface between the user and the computer hardware**.

In simple words,

> **User → Operating System → Hardware**

The user never directly talks to the hardware.

Instead,

* You click on Chrome.
* Chrome asks the Operating System.
* The Operating System tells the CPU, RAM, Disk, etc. what to do.

Without an Operating System, the computer is almost useless.

---

# Real Life Example

Imagine a restaurant.

* **Customer = User**
* **Waiter = Operating System**
* **Kitchen = Hardware**

Customer never enters the kitchen.

The waiter receives the order and tells the kitchen what to cook.

Similarly,

You never directly communicate with CPU, RAM or Hard Disk.

The Operating System does it for you.

---

# Another Easy Analogy

Imagine your computer is a human body.

* Hardware = Body
* Operating System = Soul

Without the soul,

the body cannot function.

Similarly,

without the Operating System,

computer hardware cannot work properly.

---

# Definition (Exam Ready)

> Operating System is a collection of system software that manages computer hardware resources and provides services to application programs.

Remember these two keywords:

* **Manages Hardware**
* **Provides Services**

---

# Components of a Computer System

A computer system consists of four major parts.

```
User
   ↓
Application Software
   ↓
Operating System
   ↓
Hardware
```

Let's understand each.

---

## 1. Computer Users

These are the people using the computer.

Examples

* You
* Me
* Bank employee
* Student

---

## 2. Application Software

These are programs that users use directly.

Examples

* Chrome
* MS Word
* Excel
* Games
* VLC
* Photoshop

These are usually written in

* Java
* Python
* C++
* etc.

Application software cannot directly control hardware.

It needs the Operating System.

---

## 3. System Software

This software controls the computer itself.

Examples

* Windows
* Linux
* macOS
* Compiler
* Assembler

Operating System belongs to this category.

System software is generally written using

* Assembly Language
* C
* Low-level programming

---

## 4. Computer Hardware

Physical parts of the computer.

Examples

* CPU
* RAM
* Keyboard
* Mouse
* Monitor
* Hard Disk
* SSD
* Printer

---

# Diagram

```
User
   │
Application Software
   │
Operating System
   │
Hardware
```

This is one of the most asked diagrams in exams.

---

# Why Do We Need an Operating System?

Suppose there is no Operating System.

You want to print a document.

Without OS,

you would have to manually tell

* printer
* RAM
* CPU
* disk

what to do.

Impossible.

The Operating System does all this automatically.

---

# Functions of Operating System

This is extremely important.

The Operating System performs many functions.

---

## 1. Process Management ⭐⭐⭐⭐⭐

The Operating System

* Creates processes
* Schedules processes
* Executes processes
* Terminates processes

Example

Open Chrome and Spotify together.

OS decides

who gets CPU first.

---

## 2. Memory Management ⭐⭐⭐⭐⭐

Manages RAM.

It decides

* which program gets memory
* how much memory
* when memory is released

Example

Chrome

2 GB

VS Code

500 MB

Windows allocates RAM.

---

## 3. File Management ⭐⭐⭐⭐

Controls files.

Functions

* Create file
* Delete file
* Rename file
* Copy file
* Move file

Example

Creating a PDF.

Deleting a photo.

---

## 4. I/O Device Management ⭐⭐⭐⭐

Handles

Input

* Keyboard
* Mouse

Output

* Printer
* Monitor

OS communicates with device drivers.

---

## 5. Secondary Storage Management ⭐⭐⭐⭐

Manages

* Hard Disk
* SSD

Tasks

* Disk allocation
* Free space management
* Scheduling

---

## 6. Network Management

Controls

* Internet
* Wi-Fi
* LAN
* Sharing

---

## 7. Security Management ⭐⭐⭐⭐

Provides

* Login
* Password
* Permissions
* Encryption

Prevents unauthorized access.

---

## 8. Command Interpreter

Accepts commands from users.

Examples

Windows

```
cmd
```

Linux

```
bash
```

---

## 9. Job Accounting

Maintains records.

Example

Server tracks

* CPU usage
* Memory usage
* User usage

---

## 10. Error Detection

Detects

* Disk errors
* Memory errors
* Device failures

---

## 11. Coordination

Coordinates between

* Users
* Applications
* Hardware

# History of Operating Systems

Important timeline.

---

### 1950s

Computers ran only one program.

No multitasking.

---

### 1956

First Operating System

Developed by

General Motors

For

IBM 704 Mainframe

Remember

**First OS = GM for IBM 704**

---

### 1960s

IBM started distributing Operating Systems.

---

### Late 1960s

Stanford Research Institute developed

NLS

One of the earliest systems resembling modern desktop operating systems.

---

### Mid-1960s

MULTICS

Developed jointly by:

* MIT
* AT&T Bell Labs
* General Electric

MULTICS stands for:

**Multiplexed Information and Computing System**

Very important.

---

### Unix

Developed at

AT&T Bell Labs

Unix later influenced many modern operating systems.

---

### 1981

Microsoft bought

QDOS

Renamed it

MS-DOS

---

### 1995

Windows 95 released.

Based on

MS-DOS

Released

24 August 1995

---

### 1991

Solaris developed by

Sun Microsystems

Later renamed

Oracle Solaris

# Frequently Asked Questions

## What is Deadlock?

Deadlock occurs when

two or more processes keep waiting for each other forever.

Example

Person A has Key 1.

Person B has Key 2.

A needs Key 2.

B needs Key 1.

Neither releases their key.

Both wait forever.

This is Deadlock.

Very important topic.

---

## What is Spooling?

Full Form

**Simultaneous Peripheral Operations On-Line**

Suppose

Five people print documents.

Instead of printing immediately,

Operating System stores them in a queue.

Printer prints one by one.

This queue is called

Spooling.

Example

```
Print Queue

Document A
Document B
Document C
Document D
```

Very important.

---

## What is Virtual Memory?

Suppose

RAM = 8 GB

Application needs

12 GB

How can it run?

Operating System uses Hard Disk as extra memory.

This temporary extension of RAM is called

Virtual Memory.

Remember

```
RAM + Hard Disk = Virtual Memory
```

Actually,

Hard Disk is much slower than RAM, but it allows larger programs to run when RAM is insufficient.

---

# Four Types of Operating Systems (Very Important)

### 1. Single User Single Task

One user

One task

Example

MS-DOS

---

### 2. Single User Multi Task

One user

Many programs

Example

Windows

Linux Desktop

macOS

---

### 3. Multi User

Many users simultaneously.

Example

Linux Servers

UNIX

Windows Server

---

### 4. Real Time Operating System (RTOS)

Works under strict time limits.

Used in

* Robots
* Cars
* Medical devices
* Aircraft
* Industrial machines

Examples

* QNX
* VxWorks

### IBPS SO Focus

From this chapter, the highest-priority topics are:

1. Definition and purpose of an Operating System.
2. Difference between **Application Software** and **System Software**.
3. Functions of an Operating System (especially Process, Memory, File, I/O, and Security Management).
4. Types of Operating Systems.
5. Important examples (Windows, Linux, macOS, Android, iOS).
6. Basic concepts of **Deadlock**, **Spooling**, and **Virtual Memory**.

These areas are asked repeatedly in IBPS SO IT Officer exams and also form the foundation for later OS topics.
