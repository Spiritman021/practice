# Operating System – Inter-Process Communication (IPC) (IBPS SO IT)

**Inter-Process Communication (IPC)** is one of the **most important Operating System topics** for **IBPS SO IT**.

Questions are commonly asked on:

* What is IPC?
* Why is IPC needed?
* Independent vs Cooperating Processes
* Shared Memory vs Message Passing ⭐⭐⭐
* Pipes
* Message Queue
* Socket
* Signals
* Semaphore
* Mutual Exclusion

Let's understand everything in a very simple way.

---

# First, Why Do Processes Need to Communicate?

Imagine two employees in a company.

Employee A

```text
Prepares Salary
```

Employee B

```text
Transfers Salary
```

Can B work without knowing the salary prepared by A?

**No.**

A must send the information to B.

Similarly,

Processes also need to exchange data.

This communication is called

> **Inter-Process Communication (IPC)**

---

# What is IPC?

### Definition

IPC (Inter-Process Communication) is a mechanism that allows **two or more processes to exchange data and coordinate with each other.**

Easy definition for IBPS:

> **IPC = Communication between processes.**

---

# Simple Example

Suppose

Chrome downloads a file.

Antivirus immediately scans it.

Diagram

```text
Chrome
(Downloads File)
        │
        │ IPC
        ▼
Antivirus
(Scans File)
```

Chrome and Antivirus must communicate.

---

# Another Example

Printing a document.

```text
MS Word

↓

Print Request

↓

Print Spooler

↓

Printer
```

Word communicates with the Print Spooler.

This is IPC.

---

# Why is IPC Needed?

Suppose

Process A calculates

```text
Total Salary = ₹50,000
```

Process B sends salary to the bank.

Without IPC,

Process B never receives

₹50,000.

Therefore,

communication is necessary.

---

# Benefits of IPC

The tutorial mentions several advantages.

Let's understand each.

---

## 1. Faster Communication

Instead of writing data again and again,

processes directly communicate.

Diagram

```text
Without IPC

A

↓

File

↓

B

↓

Slow


With IPC

A

↓

B

↓

Fast
```

---

## 2. Parallel Processing

Suppose

You are editing video.

Tasks are

```text
Audio

Video

Effects
```

Instead of one process doing everything,

three processes work together.

Diagram

```text
Video

──────────┐
          │
Audio ────┼──► Final Output
          │
Effects ──┘
```

IPC allows these processes to exchange information.

---

## 3. Saves Memory

Processes can share memory.

Instead of

```text
A creates copy

↓

B creates copy

↓

C creates copy
```

Everyone accesses the same memory.

Memory saved.

---

## 4. Synchronization

Suppose

Printer

can print only one document at a time.

IPC synchronizes access.

Example

```text
P1

↓

Printer

↓

P2
```

No conflict.

---

# Types of Processes

The tutorial mentions two types.

```text
Independent Processes

Cooperating Processes
```

---

# Independent Processes

Definition

Processes do not share anything.

Diagram

```text
Chrome

(No communication)

Word
```

They cannot affect each other.

---

### Example

Calculator

and

Notepad

Normally,

they don't need each other.

---

# Cooperating Processes

Definition

Processes share data or resources.

Diagram

```text
Process A

↓

Shared Data

↓

Process B
```

One process affects another.

---

### Example

Browser

↓

Downloads File

↓

Antivirus

↓

Scans File

Both cooperate.

---

# Easy Trick

Independent

=

No Sharing

Cooperating

=

Sharing

---

# Synchronization in IPC

Imagine

10 students want to write on one whiteboard.

Can everyone write together?

No.

Only one at a time.

Operating System uses synchronization.

---

The tutorial mentions four methods.

---

# 1. Semaphore ⭐⭐⭐

Very Important.

Semaphore is

> A variable used to control access to shared resources.

Imagine

One bathroom.

One key.

Diagram

```text
Bathroom

↓

Semaphore = Key

↓

Only one person enters
```

If key available

↓

Enter

Else

↓

Wait

---

### Types

Tutorial mentions

* Binary Semaphore
* Counting Semaphore

### Binary Semaphore

Only

```text
0

or

1
```

Like

Door

Open / Closed

---

### Counting Semaphore

Can have

```text
0

1

2

3

...
```

Useful when multiple resources exist.

Example

Parking

10 spaces.

Semaphore = 10.

---

# 2. Mutual Exclusion (Mutex)

Very Important.

Definition

Only **one process** enters the critical section at a time.

Diagram

```text
Critical Section

↓

P1

↓

P2 waits

↓

P3 waits
```

---

### Why?

To avoid

Race Condition.

Example

Bank Account

Balance

₹1000

P1

Withdraw ₹500

P2

Withdraw ₹500

Without synchronization,

balance becomes incorrect.

Mutex prevents this.

---

# 3. Barrier

Imagine

Relay Race.

Runner 2

cannot start

until Runner 1 finishes.

Barrier works similarly.

Diagram

```text
P1

↓

Barrier

↓

P2

↓

Barrier

↓

P3
```

All must reach barrier.

Then continue.

---

# 4. Spinlock

Spinlock means

Process keeps checking.

Diagram

```text
Lock Free?

↓

No

↓

Check Again

↓

No

↓

Check Again

↓

No

↓

Check Again

↓

Yes

↓

Enter
```

This is called

Busy Waiting.

Because CPU is active,

but doing nothing useful.

---

# Why is IPC Necessary?

Tutorial gives several reasons.

---

# 1. Information Sharing

Example

Database

↓

Multiple Users

↓

Need same data.

IPC allows sharing.

---

# 2. Achieving Modularity

Suppose

Bank Software

contains

```text
Login

↓

Payment

↓

Balance

↓

Transactions
```

Each module runs separately.

IPC allows communication.

---

# 3. Faster Processing

Large task

↓

Divide

↓

Multiple Processes

↓

Communicate

↓

Finish Faster

Example

Video Editing

Separate processes

* Audio
* Video
* Rendering

---

# 4. Convenience

User can

```text
Listen Music

+

Browse Internet

+

Download File

+

Print Document
```

All together.

IPC helps these processes cooperate.

---

# Two Methods of IPC

Very Important.

There are only **2 main methods**.

```text
IPC

↓

1. Shared Memory

2. Message Passing
```

Most IBPS questions come from this comparison.

---

# 1. Shared Memory ⭐⭐⭐

Definition

Multiple processes share

the same memory area.

Diagram

```text
          Shared Memory
      +-------------------+
      |     Common Area   |
      +-------------------+
        ▲               ▲
        │               │
   Process A       Process B
```

Both access

same memory.

---

## How It Works?

Step 1

Process A creates

Shared Memory.

Diagram

```text
Process A

↓

Create Shared Memory
```

---

Step 2

Process B attaches

to same memory.

```text
Process B

↓

Attach
```

---

Step 3

Both read/write

same memory.

Diagram

```text
Process A

↓

Shared Memory

↓

Process B
```

---

## Example

Shared Notebook.

Two students.

Both write.

Both read.

No copying.

---

## Advantages

Very Fast.

Because

No copying of messages.

Both access

same memory.

---

## Disadvantage

Needs synchronization.

Otherwise

Both write together.

Data becomes corrupted.

---

# 2. Message Passing ⭐⭐⭐

Definition

Processes communicate

by sending messages.

Diagram

```text
Process A

↓

Message

↓

Process B
```

Unlike Shared Memory,

they

DO NOT

share memory.

---

## Example

WhatsApp.

You

↓

Message

↓

Friend

Nobody shares phone memory.

Only messages.

---

## Advantages

Easy.

Safe.

Works even on different computers.

---

## Disadvantage

Slower than Shared Memory.

Because

Messages must be copied.

---

# Shared Memory vs Message Passing

Most important comparison.

| Shared Memory                 | Message Passing                                     |
| ----------------------------- | --------------------------------------------------- |
| Processes share common memory | Processes exchange messages                         |
| Faster                        | Slower                                              |
| Needs synchronization         | Synchronization is usually built into communication |
| Best for large data           | Best for small data                                 |
| Same computer                 | Same computer or different computers                |
| More complex                  | Easier to implement                                 |

---

# Ways to Implement Message Passing

Tutorial gives several methods.

Let's understand.

---

# 1. Pipes ⭐⭐⭐

Pipe

=

Communication Channel.

Diagram

```text
Process A

────Pipe────►

Process B
```

Think

Water Pipe.

Water flows

one direction.

Similarly,

Data flows

one direction.

---

### Bidirectional

Need

Two Pipes.

Diagram

```text
A ───► B

A ◄─── B
```

---

# 2. Socket ⭐⭐⭐

Socket

=

Communication endpoint.

Can connect

Same Computer

OR

Different Computers.

Diagram

```text
Computer A

↓

Socket

🌐

Socket

↓

Computer B
```

Example

Web Browser

↓

Internet

↓

Web Server

Uses sockets.

---

# 3. Files

Processes communicate

through files.

Diagram

```text
Process A

↓

Write File

↓

Process B

↓

Read File
```

Simple,

but slower.

---

# 4. Signals

Signal

=

Small notification.

Example

```text
Stop

Pause

Resume

Terminate
```

Signals

do NOT transfer large data.

Only commands.

Example

```text
SIGTERM
```

Terminate Process.

---

# 5. Message Queue ⭐⭐⭐

Think

Queue.

Diagram

```text
Process A

↓

Queue

↓

Process B
```

Messages wait

until receiver reads them.

Like

Email Inbox.

---

# Real-Life Example

Suppose

Restaurant.

Shared Memory

↓

Common Whiteboard.

All chefs read/write.

Message Passing

↓

Chef tells Waiter.

Waiter tells Cashier.

No common board.

# IBPS SO IT Important Points

### IPC

* **IPC = Communication between processes**
* Used for **data sharing**, **resource sharing**, and **coordination**.

### Types of Processes

* **Independent Process** → Does not share data with others.
* **Cooperating Process** → Shares data/resources and therefore needs IPC.

### Synchronization

* **Semaphore** → Controls access to shared resources.
* **Binary Semaphore** → Values 0 or 1.
* **Counting Semaphore** → Multiple instances of a resource.
* **Mutual Exclusion (Mutex)** → Only one process enters the critical section at a time.
* **Barrier** → All processes must reach the barrier before continuing.
* **Spinlock** → Busy waiting while repeatedly checking if a lock is available.

### IPC Methods

* **Shared Memory** → Fastest, shared memory region, requires synchronization.
* **Message Passing** → Simpler, uses messages, suitable for distributed systems.

### Message Passing Techniques

* **Pipe** → Unidirectional communication.
* **Socket** → Communication on the same machine or across a network.
* **File** → Communication through shared files.
* **Signal** → Small notifications or commands (e.g., terminate, pause).
* **Message Queue** → Messages stored until the receiver reads them.

---

# Final One-Line Revision (Most Important)

```text
IPC = Process Communication

Shared Memory = Share the same memory (Fast)

Message Passing = Send messages (Simple and suitable for distributed systems)
```

This comparison between **Shared Memory** and **Message Passing** is one of the highest-probability conceptual questions in **IBPS SO IT** examinations.
