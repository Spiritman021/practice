<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">COMPANY Relational Database Schema</title>
  <desc id="desc">EMPLOYEE, DEPARTMENT, PROJECT and WORKS_ON relations connected by foreign keys.</desc>
  <defs>
    <linearGradient id="head" x1="0" x2="1"><stop stop-color="#0f766e"/><stop offset="1" stop-color="#14b8a6"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#134e4a" flood-opacity=".13"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/></marker>
    <style>.t{font-family:Arial,sans-serif;fill:#16302d}.h{font:700 26px Arial,sans-serif;fill:white}.r{font:600 20px Arial,sans-serif}.s{font:500 17px Arial,sans-serif}.tag{font:700 16px Arial,sans-serif;fill:#0f766e}.line{fill:none;stroke:#0f766e;stroke-width:4;marker-end:url(#arrow)}.box{fill:white;stroke:#99d5ca;stroke-width:2;filter:url(#shadow)}</style>
  </defs>
  <rect width="1400" height="900" fill="#f7fffd"/>
  <text x="700" y="58" text-anchor="middle" class="t" font-size="38" font-weight="800">COMPANY Relational Database Schema</text>
  <rect x="80" y="85" width="510" height="54" rx="14" fill="#ccfbf1" stroke="#5eead4"/>
  <text x="335" y="119" text-anchor="middle" class="t r">S = Relation Schemas + Integrity Constraints</text>
  <rect x="920" y="85" width="400" height="54" rx="14" fill="#eefbf8" stroke="#99d5ca"/>
  <text x="1120" y="119" text-anchor="middle" class="t tag">PK = Primary Key · FK = Foreign Key</text>

  <g transform="translate(90 190)"><rect class="box" width="410" height="265" rx="18"/><rect width="410" height="58" rx="18" fill="url(#head)"/><rect y="40" width="410" height="18" fill="url(#head)"/><text x="205" y="38" text-anchor="middle" class="h">EMPLOYEE</text>
    <text x="28" y="95" class="t r">🔑 Ssn (PK)</text><text x="28" y="132" class="t s">Name</text><text x="28" y="169" class="t s">Salary</text><text x="28" y="206" class="t r">Dno (FK)</text><text x="28" y="240" class="t s">Example tuple: John, 30000, Dno 5</text></g>
  <g transform="translate(900 190)"><rect class="box" width="410" height="265" rx="18"/><rect width="410" height="58" rx="18" fill="url(#head)"/><rect y="40" width="410" height="18" fill="url(#head)"/><text x="205" y="38" text-anchor="middle" class="h">DEPARTMENT</text>
    <text x="28" y="95" class="t r">🔑 Dnumber (PK)</text><text x="28" y="132" class="t s">Dname</text><text x="28" y="169" class="t r">Mgr_ssn (FK)</text><text x="28" y="206" class="t s">Mgr_start_date</text><text x="28" y="240" class="t s">5 Research · 4 Administration · 1 HQ</text></g>
  <g transform="translate(90 570)"><rect class="box" width="410" height="235" rx="18"/><rect width="410" height="58" rx="18" fill="url(#head)"/><rect y="40" width="410" height="18" fill="url(#head)"/><text x="205" y="38" text-anchor="middle" class="h">PROJECT</text>
    <text x="28" y="95" class="t r">🔑 Pnumber (PK)</text><text x="28" y="132" class="t s">Pname · Plocation</text><text x="28" y="169" class="t r">Dnum (FK)</text><text x="28" y="205" class="t s">ProductX · Reorganization · Newbenefits</text></g>
  <g transform="translate(900 570)"><rect class="box" width="410" height="235" rx="18"/><rect width="410" height="58" rx="18" fill="url(#head)"/><rect y="40" width="410" height="18" fill="url(#head)"/><text x="205" y="38" text-anchor="middle" class="h">WORKS_ON</text>
    <text x="28" y="95" class="t r">Essn (FK)</text><text x="28" y="132" class="t r">Pno (FK)</text><text x="28" y="169" class="t s">Hours</text><text x="28" y="205" class="t s">Connects employees with projects</text></g>

  <path class="line" d="M500 390 C680 390 720 315 900 315"/><text x="700" y="338" text-anchor="middle" class="t tag">EMPLOYEE.Dno → DEPARTMENT.Dnumber</text>
  <path class="line" d="M900 370 C735 490 665 255 500 285"/><text x="700" y="476" text-anchor="middle" class="t tag">DEPARTMENT.Mgr_ssn → EMPLOYEE.Ssn</text>
  <path class="line" d="M500 690 C690 690 705 420 900 420"/><text x="700" y="608" text-anchor="middle" class="t tag">PROJECT.Dnum → DEPARTMENT.Dnumber</text>
  <path class="line" d="M900 665 C735 630 690 420 500 420"/><text x="705" y="656" text-anchor="middle" class="t tag">WORKS_ON.Essn → EMPLOYEE.Ssn</text>
  <path class="line" d="M900 745 C750 835 650 745 500 745"/><text x="700" y="844" text-anchor="middle" class="t tag">WORKS_ON.Pno → PROJECT.Pnumber</text>
  <rect x="455" y="505" width="490" height="52" rx="14" fill="#fffbeb" stroke="#fcd34d"/><text x="700" y="538" text-anchor="middle" class="t r">Database State = Current Valid Tuples</text>
</svg>
