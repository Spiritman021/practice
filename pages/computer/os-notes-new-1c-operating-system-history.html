# Operating System - History

## Why do we need to study OS history?

The history of Operating Systems tells us **how computers evolved**.

Earlier computers were very simple.

Today they are extremely intelligent.

The journey was like this:

```text
No OS
   ↓
Batch OS
   ↓
Multiprogramming
   ↓
Time Sharing
   ↓
GUI
   ↓
Network OS
   ↓
Mobile OS
   ↓
AI Powered OS
```

This is the complete evolution of Operating Systems.

---

# Early Computers (1940s–1950s)

Imagine computers in the 1940s.

They looked like huge rooms.

There was

* No Windows
* No Linux
* No Mouse
* No Keyboard

They could run only **one program at a time**.

Example

```text
Calculator Program
```

Only this program could run.

If another program needed to run,

the first one had to finish completely.

### Problem

* CPU remained idle most of the time.
* Very slow.
* No multitasking.

---

# First Operating System (1956)

This is a favorite IBPS MCQ.

The **first Operating System** was created in **1956**.

Developed by:

> **General Motors (GM)**

It was made for

> **IBM 704 Mainframe Computer**

### Remember

| Question              | Answer         |
| --------------------- | -------------- |
| First OS developed by | General Motors |
| Year                  | 1956           |
| Computer              | IBM 704        |

**IBPS Tip**

Don't confuse **IBM** and **General Motors**.

* **General Motors developed the OS.**
* **IBM made the computer (IBM 704).**

---

# IBM in the 1960s

The tutorial says

IBM became the **first computer manufacturer** to distribute Operating Systems with its computers.

Earlier,

people bought computers without an OS.

IBM started providing the Operating System along with the hardware.

---

# Important Timeline

Let's study every milestone.

---

# 1. NLS (Late 1960s)

Developed by

**Stanford Research Institute**

Full name

> **oN-Line System (NLS)**

### Why important?

It looked similar to today's desktop systems.

Before NLS,

everything was command-based.

NLS introduced ideas that later inspired desktop interfaces.

---

# 2. Unix (Mid-1960s)

One of the **most important Operating Systems ever created**.

Developed jointly by

* MIT
* AT&T Bell Labs
* General Electric

Initially,

it was called

> **MULTICS**

### Full Form

**MULTICS**

= **Multiplexed Information and Computing System**

Later,

Unix was developed from the ideas of MULTICS and became one of the most influential operating systems.

### Why is Unix important?

Many modern Operating Systems come from Unix.

Examples

* Linux
* macOS
* FreeBSD

### IBPS Questions

**Unix was developed by?**

Answer

* MIT
* AT&T Bell Labs
* General Electric

**MULTICS stands for?**

Multiplexed Information and Computing System

---

# 3. QDOS → MS-DOS (1981)

Microsoft purchased

> **QDOS**

Full Form

**Quick and Dirty Operating System**

Then Microsoft renamed it

> **MS-DOS**

MS-DOS stands for

> **Microsoft Disk Operating System**

Microsoft stopped supporting MS-DOS in

> **1994**

### Easy Memory Trick

```text
QDOS
   ↓
Microsoft buys it
   ↓
MS-DOS
```

---

# 4. FreeBSD

FreeBSD is

* a UNIX derivative
* based on BSD project

Interesting fact

Modern macOS is based on a modified version of FreeBSD.

So,

```text
UNIX
   ↓
BSD
   ↓
FreeBSD
   ↓
macOS
```

---

# 5. Windows 95

Released

> **24 August 1995**

Developed by

Microsoft

### Why famous?

Before Windows,

people typed commands.

Windows 95 introduced a Graphical User Interface (GUI).

Example

Instead of typing

```text
copy file.txt
```

you simply

* Click
* Drag
* Double-click

Very user friendly.

---

# 6. Solaris

Originally developed by

Sun Microsystems

Year

1991

Later,

Oracle purchased Sun Microsystems.

The OS became

> **Oracle Solaris**

---

# Evolution of Operating Systems

This is extremely important.

Let's understand every stage.

---

# 1. Batch Processing System (1940s–1950s)

Imagine you are in school.

Teacher says,

Give all assignments together.

Students submit

* Math
* Science
* English

Teacher checks all together.

This is Batch Processing.

---

## How it worked?

Users didn't directly use computers.

Instead,

They wrote programs on **Punch Cards**.

```text
User

↓

Punch Card

↓

Computer Operator

↓

Computer
```

The operator collected many jobs.

Grouped similar jobs together.

Then ran them one after another.

---

## Why Batch?

Because similar jobs were processed in one batch.

Example

100 Payroll Programs

↓

Run together.

---

## Problems

* User had to wait.
* CPU often stayed idle.
* No interaction.
* Difficult to prioritize jobs.

---

# 2. Multiprogramming System (1950s–1960s)

This solved the biggest problem.

Earlier,

only one program stayed in memory.

Now,

multiple programs could stay in RAM.

Example

```text
RAM

Chrome

Word

Excel
```

Suppose

Chrome is waiting for printer.

CPU doesn't remain idle.

Instead,

CPU starts executing Word.

### Benefit

CPU utilization became much higher.

---

### Important Difference

Batch System

One program in memory.

Multiprogramming

Multiple programs in memory.

---

# 3. Time Sharing System (1960s–1970s)

Also called

**Multitasking**

Imagine

Three students share one teacher.

Teacher teaches

Student A for 5 minutes.

Then

Student B.

Then

Student C.

This switching happens very fast.

Everyone feels the teacher is always available.

Similarly,

CPU rapidly switches between users.

---

## Example

```text
CPU

Chrome

↓

Word

↓

Spotify

↓

Chrome

↓

Excel
```

This switching is called

Time Sharing.

---

### Advantages

* Multiple users
* Fast response
* Better CPU utilization
* Interactive

---

# Difference

## Multiprogramming

Many programs in memory.

Goal

Keep CPU busy.

---

## Time Sharing

Many users share CPU.

Goal

Quick response.

This difference is frequently asked.

---

# 4. GUI Based Systems (1970s–1980s)

GUI

= **Graphical User Interface**

Before GUI

Users typed commands.

Example

```text
dir
copy
del
```

After GUI

Users clicked

* Folder
* Icons
* Buttons

Examples

Windows

macOS

Very user friendly.

---

# 5. Network Operating Systems (1980s–1990s)

Computers became connected.

Servers appeared.

Operating Systems started managing

* Networks
* Shared files
* Shared printers
* Users
* Groups
* Security

Example

Office LAN

```text
Computer A

      │

Computer B

      │

Server

      │

Printer
```

Everyone can use

same printer

same files.

---

### Responsibilities

Network OS manages

* User accounts
* File sharing
* Printer sharing
* Security
* Applications

---

# 6. Mobile Operating Systems (Late 1990s–Early 2000s)

Initially,

phones were simple.

Popular OS

* Symbian
* Java ME

Then smartphones arrived.

Need

* Camera
* GPS
* Internet
* Apps

Result

Android

iOS

Today,

they are very powerful.

---

# 7. AI Powered Operating Systems (2010–Present)

Modern Operating Systems include AI.

Examples

* Siri
* Google Assistant
* Alexa
* Microsoft Copilot

Now,

Operating Systems understand

* Voice
* Language
* Context

Example

You say

> "Open Chrome."

The OS understands and opens Chrome.

---

```text
1940s

1950s

1960s

---

# Easy Memory Trick

Remember the evolution in order:

**B → M → T → G → N → M → A**

* **B** = Batch Processing
* **M** = Multiprogramming
* **T** = Time Sharing
* **G** = GUI
* **N** = Network OS
* **M** = Mobile OS
* **A** = AI Powered OS

---

# IBPS SO Most Important Facts

| Topic                  | Remember                                                           |
| ---------------------- | ------------------------------------------------------------------ |
| First Operating System | General Motors                                                     |
| Year                   | 1956                                                               |
| Computer               | IBM 704                                                            |
| IBM                    | First company to distribute OS with computers (1960s)              |
| NLS                    | Developed by Stanford Research Institute                           |
| UNIX                   | Developed by MIT, AT&T Bell Labs, and General Electric             |
| MULTICS                | Multiplexed Information and Computing System                       |
| QDOS                   | Quick and Dirty Operating System                                   |
| QDOS became            | MS-DOS                                                             |
| Microsoft bought QDOS  | 1981                                                               |
| MS-DOS support ended   | 1994                                                               |
| Windows 95 released    | 24 August 1995                                                     |
| Solaris                | Developed by Sun Microsystems (1991), later Oracle Solaris         |
| macOS                  | Based on a modified version of FreeBSD                             |
| Batch Processing       | Jobs processed in groups using punch cards                         |
| Multiprogramming       | Multiple programs in memory; improves CPU utilization              |
| Time Sharing           | CPU time shared among multiple users/processes for quick response  |
| GUI                    | Graphical User Interface using icons, windows, and mouse           |
| Network OS             | Manages users, shared files, printers, and security over a network |
| Mobile OS              | Symbian, Java ME → Android and iOS                                 |
| AI Powered OS          | Siri, Google Assistant, Alexa, Copilot integration                 |

---

## 🎯 IBPS SO Exam Focus

From this chapter, you should **definitely memorize**:

1. **General Motors → First OS (1956) → IBM 704**
2. **UNIX developers** and **MULTICS full form**
3. **QDOS → MS-DOS**
4. **Windows 95 release (1995)**
5. **Evolution order:** **Batch → Multiprogramming → Time Sharing → GUI → Network → Mobile → AI**
6. The **difference between Batch, Multiprogramming, and Time Sharing**, as these are frequently tested in competitive exams.
