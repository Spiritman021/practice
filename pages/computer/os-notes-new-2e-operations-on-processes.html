# Operating System – Operations on Processes (IBPS SO IT)

This topic explains **what operations (actions) the Operating System performs on a process during its lifetime**.

It is closely related to:

* Process States
* Process Scheduling
* Process Control Block (PCB)
* Context Switching

For **IBPS SO IT**, this is an important conceptual topic.

---

# What is a Process?

You already know:

> **A Process = Program in Execution**

Example

```text
Chrome.exe (Program)
        ↓
Double Click
        ↓
Chrome Running
        ↓
Process
```

During its lifetime, this process goes through different states and the OS performs different operations on it.

---

# Process States (Revision)

Every process passes through these states:

```text
           +------+
           | New  |
           +------+
               |
               v
          +---------+
          | Ready   |
          +---------+
               |
               v
          +---------+
          | Running |
          +---------+
           /       \
          /         \
         v           v
 +-----------+   +------------+
 | Waiting   |   | Terminated |
 +-----------+   +------------+
        |
        v
     Ready
```

Quick revision:

| State      | Meaning                          |
| ---------- | -------------------------------- |
| New        | Process is created               |
| Ready      | Waiting for CPU                  |
| Running    | CPU is executing it              |
| Waiting    | Waiting for I/O or another event |
| Terminated | Process has finished             |

---

# Operations on a Process

The Operating System performs **5 major operations**.

```text
1. Process Creation

2. Process Dispatch

3. Process Preemption

4. Process Blocking

5. Process Termination
```

Let's understand each.

---

# 1. Process Creation

This is the **first operation**.

It happens when a new process is created.

State involved:

```text
New
```

---

## Diagram

```text
Program

↓

User Runs Program

↓

Operating System

↓

Creates Process

↓

Creates PCB

↓

Process enters NEW State
```

---

## When Does Process Creation Happen?

The tutorial mentions **4 situations**.

---

### (A) System Initialization

When the computer starts,

Operating System automatically creates system processes.

Example

```text
Power ON

↓

Windows Starts

↓

Background Processes Created
```

Examples:

* Memory Manager
* Print Spooler
* Antivirus Service

---

### (B) User Request

Most common example.

User opens

```text
Chrome

↓

Chrome Process Created
```

Same for

* VLC
* MS Word
* Photoshop

---

### (C) Child Process System Call

A running process can create another process.

This is called

> **Child Process**

using

```c
fork()
```

(This is mainly in UNIX/Linux.)

---

## Parent and Child Process

Example

Chrome is already running.

Chrome creates another process.

```text
Chrome

↓

fork()

↓

Chrome Child
```

Diagram

```text
        Parent Process
              |
          fork()
              |
     -----------------
     |               |
Parent Process   Child Process
```

---

## Important Points

The tutorial says

Child Process

* has **only one parent**

Parent Process

* can have **many children**

Diagram

```text
             Parent
          /     |      \
         /      |       \
      Child1 Child2 Child3
```

One parent

Many children

---

## Memory Image

Initially,

Parent and Child have

* same program code
* same open files
* same environment variables

But

they have **different address spaces**.

Meaning

they become independent processes.

---

### IBPS Point

Remember

> **fork() creates a child process.**

---

# 2. Process Dispatch

Now the process reaches

```text
Ready
```

Many processes are waiting.

Who gets CPU?

The Scheduler decides.

Dispatcher gives CPU.

This operation is called

> **Process Dispatch**

---

## Diagram

```text
Ready Queue

P1

P2

P3

↓

Scheduler Selects P2

↓

Dispatcher

↓

CPU Executes P2
```

---

## When Does Dispatch Happen?

Tutorial gives several situations.

---

### CPU becomes idle

Example

P1 finished.

CPU is free.

Next process is dispatched.

---

### Ready Queue has processes

If CPU is free

and Ready Queue contains

```text
P2

P3

P4
```

Dispatcher gives CPU to one.

---

### Time Quantum Expires

Suppose Round Robin scheduling.

```text
P1

5 ms

↓

Time Over

↓

Dispatcher Gives CPU

↓

P2
```

---

### High Priority Process Arrives

Suppose

Chrome is running.

Suddenly

Emergency Process arrives.

Higher priority.

Dispatcher switches CPU.

---

### Hardware Interrupt

Example

Printer interrupt

Network interrupt

Disk interrupt

Dispatcher may switch processes.

---

# PCB During Dispatch

Tutorial says

When dispatch happens,

the process status is loaded from

```text
PCB
```

Diagram

```text
PCB

↓

Registers Loaded

↓

CPU

↓

Process Starts Running
```

---

# 3. Process Preemption

Very Important.

---

## Definition

Preemption means

> **Stopping the currently running process and giving the CPU to another process.**

---

## Example

Suppose

P1 running.

```text
CPU

↓

P1
```

Suddenly

P2 has higher priority.

Now

```text
CPU

↓

P2
```

P1 is stopped.

This is

```text
Preemption
```

---

## Diagram

```text
CPU

Running P1

↓

Preemption

↓

P1 goes to Ready Queue

↓

P2 Starts Running
```

---

## When Does Preemption Occur?

Tutorial gives

### Time Quantum Expires

Round Robin

```text
P1

↓

5 ms completed

↓

CPU goes to P2
```

---

### Higher Priority Process Arrives

Example

```text
Normal Process Running

↓

Emergency Process Arrives

↓

Immediate CPU Switch
```

---

### Hardware Interrupt

Interrupt occurs

↓

CPU switches process.

---

# Context Switching

Every preemption causes

> **Context Switching**

---

## What Happens?

Suppose

Chrome is running.

CPU switches to Word.

OS must

```text
Save Chrome Registers

↓

Save PCB

↓

Load Word PCB

↓

Load Registers

↓

Run Word
```

This is Context Switching.

---

# Easy Trick

Preemption

=

Stopping a process.

Context Switching

=

Saving old process + Loading new process.

---

# 4. Process Blocking

Sometimes,

CPU is not the problem.

The process itself needs to wait.

Examples

* Keyboard input
* Printer
* Internet
* Database
* Disk

Then

Process enters

```text
Waiting State
```

---

## Diagram

```text
Running

↓

Needs Keyboard Input

↓

Waiting

↓

User Types

↓

Ready

↓

Running Again
```

---

## Example

Program says

```text
Enter Password:
```

CPU cannot continue.

Process waits.

State

```text
Waiting
```

When user types

```text
12345
```

Process returns

```text
Ready
```

Then gets CPU.

---

## Why Blocking?

The tutorial says

Operating System blocks the process

because

the process itself requests it.

Example

```text
Read File

↓

Need Disk

↓

Wait
```

CPU is not needed while waiting.

So another process gets CPU.

---

# Process Blocking Flow

```text
Running

↓

Needs I/O

↓

Waiting

↓

I/O Completed

↓

Ready

↓

CPU Assigned

↓

Running
```

---

# 5. Process Termination

This is the final operation.

Process finishes.

Resources released.

PCB deleted.

Process disappears.

---

## Diagram

```text
Running

↓

Completed

↓

Release Memory

↓

Close Files

↓

Delete PCB

↓

Terminated
```

---

# Why Does Process Terminate?

Tutorial gives several reasons.

---

## (A) Normal Completion

Most common.

Example

```c
printf("Hello");
```

Program finished.

OS terminates it.

---

## (B) Parent Terminates Child

Suppose

Parent created

Child.

```text
Parent

↓

Child
```

Parent decides

Child no longer needed.

Parent terminates child.

---

### Important Point

Tutorial says

When parent terminates,

its child processes are also terminated.

(While many Unix-like systems reassign orphaned children to another process rather than terminating them immediately, for **this tutorial and IBPS-style questions**, remember what the tutorial states.)

---

## (C) Service Errors

Operating System may terminate process.

Example

Illegal operation.

---

## (D) Hardware Failure

Example

Disk failure

Memory error

Power issue

Process terminated.

---

# SIGTERM Signal

Tutorial mentions

```text
SIGTERM
```

This is a signal sent to terminate a process.

Flow

```text
Parent

↓

SIGTERM

↓

Child

↓

Clean-up

↓

Exit
```

---

# What Happens During Clean-Up?

Before exiting,

process releases

* Memory
* Files
* Printer
* Shared Variables
* Shared Tables
* Resources

Diagram

```text
Running

↓

Close Files

↓

Release Memory

↓

Release Printer

↓

Delete PCB

↓

Exit
```

---

# Complete Life Cycle with Operations

```text
Program Starts
      │
      ▼
Process Creation
      │
      ▼
     NEW
      │
      ▼
    READY
      │
      │ Dispatch
      ▼
   RUNNING
   /   |    \
  /    |     \
Block Preempt Finish
 |      |      |
 ▼      ▼      ▼
WAITING READY TERMINATED
 |
 ▼
READY
```

---

# Difference Between Dispatch, Preemption and Blocking

| Operation           | Meaning                               | State Change         |
| ------------------- | ------------------------------------- | -------------------- |
| Process Dispatch    | CPU assigned to a ready process       | Ready → Running      |
| Process Preemption  | CPU taken away from a running process | Running → Ready      |
| Process Blocking    | Process waits for I/O or an event     | Running → Waiting    |
| Process Creation    | New process is created                | New                  |
| Process Termination | Process finishes and exits            | Running → Terminated |

---

# Memory Trick

Think of a student in school.

### Creation

Student gets admission.

```text
Admission

↓

Student Created
```

---

### Dispatch

Teacher calls

```text
Roll No. 15

Come to board
```

Student gets CPU.

---

### Preemption

Teacher says

```text
Stop.

Roll No. 20 Come.
```

Current student leaves.

New student comes.

---

### Blocking

Teacher asks

```text
Bring your notebook.
```

Student leaves to get notebook.

Waiting.

Returns.

---

### Termination

Class ends.

Student goes home.

---

# Complete Comparison

| Operation           | Trigger                                                     | Result                           |
| ------------------- | ----------------------------------------------------------- | -------------------------------- |
| Process Creation    | Program starts, system boot, `fork()`, batch job            | New process and PCB created      |
| Process Dispatch    | Scheduler selects a ready process                           | CPU assigned (Ready → Running)   |
| Process Preemption  | Time quantum expires, higher-priority process, interrupt    | CPU taken away (Running → Ready) |
| Process Blocking    | Process waits for I/O or another event                      | Running → Waiting                |
| Process Termination | Process completes, parent ends child, error, hardware issue | Resources released, PCB deleted  |

---

# IBPS SO IT Important Points

### Must Remember

* **Process Creation = Creation of a new process**
* **`fork()` creates a child process**
* **One child has one parent; one parent can have many children**
* **Process Dispatch = CPU assigned to a ready process**
* **Dispatcher performs dispatch**
* **Process Preemption = CPU taken away from a running process**
* **Every preemption involves Context Switching**
* **Context Switching = Save current process state in PCB + Load next process state from PCB**
* **Process Blocking = Running process waits for I/O or another event**
* **After the event completes, the blocked process moves from Waiting → Ready**
* **Process Termination = Process ends, resources are released, PCB is deleted**
* **`SIGTERM` is a signal used to request graceful process termination**

---

# One-Line Revision for IBPS

```text
Creation   → New process is created.

Dispatch   → Ready process gets CPU.

Preemption → Running process loses CPU.

Blocking   → Running process waits for I/O/event.

Termination → Process finishes, resources released, PCB deleted.
```

This five-operation flow is enough to answer most conceptual questions asked in **IBPS SO IT** examinations.
