# Operating System – Process Scheduling (IBPS SO IT)

This is one of the **most important Operating System topics** for **IBPS SO IT**. Questions are asked directly from:

* Process Scheduling
* Types of Schedulers
* Context Switching
* Preemptive vs Non-preemptive Scheduling
* Scheduling Queues

Let's understand everything from scratch in a very simple way.

---

# What is Process Scheduling?

## Simple Definition

**Process Scheduling** is the job of the Operating System to decide:

> **"Which process should get the CPU next?"**

Since there is usually **only one CPU (or limited CPU cores)** but many processes (Chrome, Spotify, MS Word, Antivirus, etc.), the OS decides who gets CPU time.

This decision-making is called **Process Scheduling**.

---

## Real-Life Example

Imagine a **teacher checking answer sheets**.

There are 100 answer sheets.

The teacher can check only **one answer sheet at a time**.

So the teacher decides:

* Check Roll No. 1
* then Roll No. 5
* then Roll No. 3
* then Roll No. 20

Exactly like this,

CPU can execute **only one process at a time (per core)**.

The OS acts like the teacher.

It decides:

```
CPU

P1 → P2 → P5 → P3 → P8 → P1 ...
```

This is Process Scheduling.

---

# Why is Process Scheduling Needed?

Suppose you are doing all these together:

* Chrome downloading files
* YouTube playing music
* MS Word typing notes
* Antivirus scanning
* Windows updating

All need CPU.

CPU cannot execute all simultaneously on one core.

Therefore OS quickly switches CPU among them.

This makes us feel that everything is running together.

This is called

**Time Sharing (Time Multiplexing).**

---

# Multiprogramming and Scheduling

The book says:

> Process scheduling is an essential part of Multiprogramming Operating Systems.

Let's understand.

Suppose memory contains

```
RAM

Process A
Process B
Process C
Process D
```

Only one gets CPU.

OS keeps changing CPU like

```
A → B → C → D → A → C → B ...
```

This switching is scheduling.

Without scheduling,

only one process would run while others wait forever.

---

# Categories of Scheduling

There are **2 types**

```
Scheduling
│
├── Non-Preemptive
│
└── Preemptive
```

These are extremely important for exams.

---

# 1. Non-Preemptive Scheduling

## Meaning

Once CPU is given to a process,

**it cannot be taken back until the process finishes or voluntarily waits (e.g., for I/O).**

The OS waits patiently.

---

### Example

Three processes

```
P1 = 8 sec
P2 = 4 sec
P3 = 2 sec
```

CPU starts P1.

```
Time

0---------8---------12-------14

P1          P2         P3
```

Even if P3 is very small,

OS cannot stop P1.

P1 must finish first.

---

### Key Point

CPU is **not forcefully taken away**.

The process leaves CPU only when:

* execution completes ✔
* it waits for I/O ✔
* it terminates ✔

---

### Advantages

* Simple
* Less overhead
* Fewer context switches

---

### Disadvantages

* Long processes delay short ones.
* Poor response time.
* Can cause the **Convoy Effect**, where many short processes wait behind one long process.

---

# 2. Preemptive Scheduling

## Meaning

Here,

OS **can take CPU away** from the running process.

If another process deserves CPU more,

OS interrupts current process.

---

### Example

Suppose

```
P1 = Priority 3
P2 = Priority 10
```

CPU starts P1.

After 2 seconds,

P2 arrives.

Since P2 has higher priority,

OS immediately stops P1.

CPU becomes

```
P1 -----> STOP

↓

P2 starts
```

Later,

P1 resumes from where it stopped.

---

### Another Example

Imagine teacher checking papers.

Teacher starts checking Roll No. 1.

Principal suddenly says

"Check this urgent paper first."

Teacher stops current work,

checks urgent one,

then comes back.

Exactly Preemptive Scheduling.

---

### Advantages

* Better response time
* Interactive systems become fast
* Fair CPU sharing

---

### Disadvantages

* More context switching
* More overhead
* Slightly slower due to frequent switching

---

# IBPS Shortcut

## Non-Preemptive

> CPU cannot be taken away.

## Preemptive

> CPU can be taken away.

---

# Process Scheduling Queues

Every process exists in some queue.

The Operating System keeps track of them using **PCBs (Process Control Blocks)**.

When a process changes state, **its PCB moves from one queue to another**.

Think of the PCB as the process’s identity card containing all information needed to resume execution.

---

## Why Queues?

Imagine a hospital.

Patients wait in different lines.

```
Registration Queue

↓

Doctor Queue

↓

Lab Queue

↓

Medicine Queue
```

Similarly,

processes wait in different queues.

---

# Types of Scheduling Queues

## 1. Job Queue

Contains

> **All processes in the entire system.**

```
Job Queue

P1
P2
P3
P4
P5
P6
```

Some are in memory.

Some are waiting.

Some may not yet be admitted into memory.

Everything belongs here.

### Easy Trick

**Job Queue = Every job in the system**

---

## 2. Ready Queue (Most Important)

Contains

Processes that are:

* already in RAM ✔
* ready to execute ✔
* waiting only for CPU ✔

```
Ready Queue

P2
P4
P7
P9
```

They are ready.

Only CPU is unavailable.

Whenever CPU becomes free,

one process from Ready Queue gets CPU.

---

### Easy Trick

Ready Queue

= Ready for CPU

Nothing else is required.

---

## 3. Device Queue

Contains processes waiting for an I/O device.

Examples:

* Printer
* Keyboard
* Disk
* Scanner

Suppose

P2 wants printer.

Printer is busy.

Then

```
Device Queue

P2
P5
P8
```

They wait until printer becomes free.

---

# How Processes Move Between Queues

```
New Process
      │
      ▼
Job Queue
      │
(Long-Term Scheduler)
      ▼
Ready Queue
      │
(Short-Term Scheduler)
      ▼
Running (CPU)
      │
      ├── Needs I/O?
      │         │
      │         ▼
      │    Device Queue
      │         │
      │   I/O Complete
      │         ▼
      └────► Ready Queue

Running
   │
   └── Finished → Exit
```

---

# Two-State Process Model

This is the simplest process model.

There are only **2 states**:

```
Running

Not Running
```

---

## Running

Process currently using CPU.

Only one process per CPU core.

```
CPU

P3
```

---

## Not Running

Every other process.

They may be:

* Ready
* Waiting
* Suspended

All are simply called

**Not Running**.

---

### Dispatcher

The dispatcher gives the CPU to the process chosen by the short-term scheduler.

If the running process:

* finishes,
* blocks for I/O,
* or is preempted,

the dispatcher loads the next selected process onto the CPU.

---

# Schedulers

A scheduler is a system component that decides **which process moves to the next stage**.

There are **3 schedulers**.

```
Schedulers

Long-Term

Short-Term

Medium-Term
```

---

# 1. Long-Term Scheduler (Job Scheduler)

## Main Job

Decides

**Which new processes should enter RAM for execution?**

It selects processes from the **Job Queue** and loads them into memory.

---

### Example

Suppose 100 programs exist.

RAM can hold only 20.

Long-term scheduler chooses which 20 are admitted.

```
100 Jobs

↓

Select 20

↓

Load into RAM
```

---

## Another Job

Maintain a good mix of:

* **CPU-bound processes** (need lots of CPU)
* **I/O-bound processes** (frequently wait for I/O)

This balance keeps the CPU and I/O devices busy.

---

## Degree of Multiprogramming

**Degree of Multiprogramming = Number of processes present in main memory.**

Example:

```
RAM

P1
P2
P3
P4
P5
```

Degree of multiprogramming = **5**

The long-term scheduler controls this by deciding how many processes enter memory.

---

### Time-Sharing Systems

Modern time-sharing systems usually admit new processes immediately, so the long-term scheduler is **minimal or absent**.

---

# 2. Short-Term Scheduler (CPU Scheduler)

This is the **most active scheduler**.

## Main Job

Choose one process from the **Ready Queue** and assign the CPU.

```
Ready Queue

P2
P4
P7

↓

CPU

P4
```

---

### Characteristics

* Runs **very frequently**
* Must be **very fast**
* Also called the **CPU Scheduler**

---

### Dispatcher vs Short-Term Scheduler

Many books distinguish them:

* **Short-Term Scheduler:** Decides **which** process should run.
* **Dispatcher:** Actually **gives the CPU** to that chosen process.

---

# 3. Medium-Term Scheduler

## Main Job

Temporarily remove processes from memory.

This process is called

**Swapping**.

---

## Why?

Suppose RAM is full.

```
RAM

P1
P2
P3
P4
P5
```

A process is waiting for disk I/O and won't use the CPU for some time.

Instead of keeping it in RAM,

OS moves it to disk.

```
RAM

P1
P2
P4
P5

Disk

P3
```

Now another process can use the freed memory.

---

## Swapping

**Swapping** = Moving a process between RAM and secondary storage.

* **Swap Out (Roll Out):** RAM → Disk
* **Swap In (Roll In):** Disk → RAM

The medium-term scheduler performs this.

---

### Effect

Swapping reduces the **degree of multiprogramming** because fewer processes remain in RAM.

---

# Comparison of the Three Schedulers

| Feature                    | Long-Term                  | Short-Term                  | Medium-Term                        |
| -------------------------- | -------------------------- | --------------------------- | ---------------------------------- |
| Also called                | Job Scheduler              | CPU Scheduler               | Swapping Scheduler                 |
| Main work                  | Admit jobs into RAM        | Select next process for CPU | Swap processes in/out of RAM       |
| Selects from               | Job Queue                  | Ready Queue                 | Memory (suspended processes)       |
| Controls                   | Degree of multiprogramming | CPU allocation              | Reduces degree of multiprogramming |
| Speed                      | Slow                       | Fastest                     | Medium                             |
| Frequency                  | Least frequent             | Most frequent               | Occasional                         |
| Present in time-sharing OS | Minimal/Absent             | Always present              | Used when swapping is needed       |

---

# Context Switching (Very Important)

## Definition

A **Context Switch** happens when the CPU stops executing one process and starts executing another.

Before switching, the OS **saves the current process's state in its PCB**.

When the process runs again later, the OS **restores that saved state**, allowing it to continue exactly where it left off.

---

## Real-Life Example

Imagine you're writing notes.

Suddenly your teacher says:

> "Solve this math problem first."

You:

* close your notebook,
* remember the page,
* solve the math problem,
* return and continue from the same line.

That is exactly what a context switch does.

---

## Step-by-Step

Suppose:

```
CPU

Running P1
```

A higher-priority process P2 arrives.

### Step 1

Save P1's state into its PCB.

### Step 2

Load P2's saved state from its PCB.

### Step 3

CPU starts executing P2.

Later, when P1 gets CPU again, the OS restores its saved state and P1 continues from the same instruction.

---

# What Information is Saved During a Context Switch?

The tutorial lists the following, all of which are important:

1. **Program Counter (PC)** – Address of the next instruction to execute.
2. **Scheduling Information** – Priority, queue information, scheduling parameters.
3. **Base and Limit Register Values** – Memory management information (defines the process's memory region).
4. **CPU Registers** – General-purpose registers currently in use.
5. **Process State** – Whether the process is Running, Ready, Waiting, etc.
6. **I/O State Information** – Status of files, devices, and pending I/O operations.
7. **Accounting Information** – CPU time used, process ID, user information, and other usage statistics.

All this information is stored in the **PCB (Process Control Block)**.

---

# Why is Context Switching Expensive?

During a context switch:

* Save the old process state.
* Load the new process state.
* Update CPU registers and memory information.

During this time, **no useful user process is executing**.

Therefore:

* More context switches = More overhead.
* Excessive switching reduces CPU efficiency.

Some hardware uses multiple sets of CPU registers to reduce the time needed for context switching.

---

# IBPS SO IT Exam Summary (Must Remember)

| Topic                      | Key Point                                                                                                |
| -------------------------- | -------------------------------------------------------------------------------------------------------- |
| Process Scheduling         | Decides which process gets the CPU.                                                                      |
| Non-Preemptive             | CPU cannot be taken away until the process finishes or blocks.                                           |
| Preemptive                 | OS can interrupt a running process and give the CPU to another.                                          |
| Job Queue                  | Contains all processes in the system.                                                                    |
| Ready Queue                | Processes in RAM waiting only for the CPU.                                                               |
| Device Queue               | Processes waiting for I/O devices.                                                                       |
| Long-Term Scheduler        | Admits processes from the Job Queue into memory; controls the degree of multiprogramming.                |
| Short-Term Scheduler       | Selects a process from the Ready Queue and allocates the CPU; fastest scheduler.                         |
| Medium-Term Scheduler      | Swaps processes between RAM and disk to free memory.                                                     |
| Swapping                   | Moving a process between RAM and secondary storage (swap out/in).                                        |
| Degree of Multiprogramming | Number of processes currently in main memory.                                                            |
| Dispatcher                 | Gives the CPU to the process selected by the short-term scheduler.                                       |
| Context Switching          | Saving one process's state in its PCB and restoring another's state so execution can continue correctly. |
| PCB                        | Stores all information needed to pause and resume a process.                                             |

## IBPS SO IT Memory Trick

Remember the scheduler order as:

**Job → Memory → CPU**

* **Long-Term Scheduler** → **Loads jobs into memory**
* **Short-Term Scheduler** → **Selects a process from memory (Ready Queue) and gives it the CPU**
* **Medium-Term Scheduler** → **Temporarily removes processes from memory (Swapping) and brings them back later**
