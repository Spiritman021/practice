# Operating System – Processes (IBPS SO IT Exam Explanation)

This is one of the **most important Operating System topics** for **IBPS SO IT Officer**. Questions are frequently asked from:

* Process vs Program
* Process States
* Process Control Block (PCB)
* Process Memory Layout (Stack, Heap, Data, Text)

Let's understand everything in a very simple way.

---

# What is a Process?

### Definition

A **Process** is **a program that is currently being executed**.

### Remember this one-line definition for IBPS:

> **Program + Execution = Process**

---

## Simple Real-Life Example

Imagine you have a recipe book.

* Recipe written in the book = **Program**
* Cooking the recipe = **Process**

The recipe itself does nothing.

Only when someone starts cooking does it become an active task.

Similarly,

```
Calculator.exe (stored in disk)
        ↓
Double Click
        ↓
Calculator starts running
        ↓
It becomes a Process
```

---

## Another Example

Suppose you have written this program.

```c
#include<stdio.h>

int main()
{
    printf("Hello World");
}
```

When this code is stored inside your computer, it is only a **Program**.

When you execute it,

```
Hello World
```

is printed.

Now the operating system creates a **Process**.

So,

```
Stored Code
=
Program

Running Code
=
Process
```

---

# Important Definition

Tutorial says:

> A process is an entity which represents the basic unit of work in the system.

Easy meaning:

The Operating System does **all work through processes**.

Examples:

* Chrome running
* MS Word running
* VLC playing video
* Spotify playing music

All are processes.

---

# Sequential Execution

The tutorial says:

> The execution of a process progresses in sequential fashion.

Meaning:

Instructions execute **one after another**.

Example:

```
Step 1
↓

Step 2
↓

Step 3
↓

Step 4
```

CPU executes them in order.

---

# Program vs Process

This is a favorite exam question.

| Program             | Process                     |
| ------------------- | --------------------------- |
| Passive             | Active                      |
| Stored on disk      | Running in memory           |
| Static              | Dynamic                     |
| Doesn't consume CPU | Consumes CPU                |
| Just instructions   | Instructions being executed |

### Easy Trick

```
Program
=
Recipe

Process
=
Cooking
```

OR

```
Program
=
Movie File

Process
=
Movie Playing
```

---

# What Happens When Program Starts?

When you run a program,

```
Program stored on Hard Disk
           ↓
Operating System loads it into RAM
           ↓
Allocates memory
           ↓
Assigns CPU
           ↓
Creates Process
```

---

# Memory Layout of a Process

When the OS loads a program into RAM, memory is divided into **four sections**.

```
--------------------------
|        Stack           |
--------------------------
|        Heap            |
--------------------------
|        Text            |
--------------------------
|        Data            |
--------------------------
```

Let's understand each.

---

# 1. Stack

Stack stores **temporary data**.

It contains:

* Function parameters
* Local variables
* Return addresses

Example

```c
void add()
{
    int x = 5;
}
```

Here

```
x
```

is a local variable.

It is stored in the **Stack**.

---

### Stack Characteristics

* Temporary memory
* Fast
* Automatically managed
* Stores function calls

### Easy Trick

Think

```
Stack
=
Temporary Notebook
```

As soon as the function finishes,

everything is erased.

---

# 2. Heap

Heap stores **memory allocated during runtime**.

Example

```c
malloc()
new
calloc()
```

All allocate memory in Heap.

Suppose user enters

```
How many students?

500
```

Program cannot know beforehand.

So memory is allocated while running.

That memory comes from **Heap**.

---

### Heap Characteristics

* Dynamic memory
* Allocated during execution
* Programmer controls allocation/deallocation

---

### Easy Trick

```
Heap
=
Expandable Storage Room
```

Need more memory?

Take more from Heap.

---

# 3. Text Section

This is also called the **Code Segment**.

It contains:

* Program instructions
* Program Counter (PC)
* CPU registers related to execution (as simplified in the tutorial)

The tutorial mentions:

> Current activity represented by Program Counter and processor registers.

### Program Counter (PC)

Program Counter stores:

> Address of the next instruction to execute.

Example

```
Instruction 1

Instruction 2

Instruction 3

Instruction 4
```

If CPU is executing instruction 2,

Program Counter points to

```
Instruction 3
```

because that is next.

---

### Easy Trick

```
Program Counter
=
Bookmark in a book
```

It tells CPU

"Read from here next."

---

# 4. Data Section

Stores

* Global variables
* Static variables

Example

```c
int count = 10;
```

Global variable.

Stored in

```
Data Segment
```

Example

```c
static int x;
```

Also stored here.

---

## Easy Trick

```
Data Section
=
Permanent Variables
```

---

# Complete Memory Layout

```
-------------------------
Stack
(Local Variables)

↓

Heap
(Dynamic Memory)

↓

Text
(Program Instructions)

↓

Data
(Global + Static Variables)
-------------------------
```

---

# What is a Program?

A Program is simply

> Collection of instructions.

Example

```c
printf("Hello");
```

This is a program.

It does nothing until executed.

---

# Software

Tutorial says

Software consists of

* Programs
* Libraries
* Related Data

Example

Microsoft Office

contains

* Word
* Excel
* PowerPoint
* Libraries

Together they form software.

---

# Algorithm

Algorithm

=

Step-by-step method to solve a problem.

Example

Find largest number

```
Step 1

Read numbers

↓

Compare

↓

Print largest
```

That sequence is an algorithm.

---

# Process Life Cycle

Every process moves through different states.

There are **5 states**.

```
Start
   ↓
Ready
   ↓
Running
   ↓
Waiting
   ↓
Running
   ↓
Exit
```

Let's understand one by one.

---

# 1. Start (New)

This is the first state.

Example

You double-click Chrome.

OS creates process.

State

```
Start
```

---

# 2. Ready State

Process is **ready to run**.

But CPU is busy.

So process waits.

Example

You open

* Chrome
* Word
* VLC

Only one gets CPU immediately.

Others wait.

That waiting queue is

```
Ready Queue
```

State:

```
Ready
```

---

### Important Point

Ready means

**Waiting for CPU**

NOT waiting for user.

This is an exam favorite.

---

# 3. Running State

CPU has selected the process.

Now it executes.

```
CPU
↓

Chrome Running
```

State

```
Running
```

---

# Scheduler

Tutorial mentions

Scheduler interrupts running process.

Suppose

Chrome is running.

Suddenly,

Word has higher priority.

CPU switches.

```
Chrome

↓

Ready

↓

Word Running
```

This switching is done by

**CPU Scheduler**.

---

# 4. Waiting State

Waiting means

Process needs something.

Examples

Waiting for

* Keyboard input
* Mouse click
* Printer
* Disk
* File
* Network response

CPU cannot help.

So process waits.

---

Example

Program asks

```
Enter your Name:
```

Until you type,

Process stays

```
Waiting
```

---

### Important Difference

Ready

↓

Waiting for CPU

Waiting

↓

Waiting for Resource

This is asked frequently.

---

# 5. Terminated (Exit)

Program finishes.

Example

```
Hello World
```

Printed.

Done.

State

```
Terminated
```

OS removes it from memory.

---

# Complete Process State Diagram

```
          +--------+
          | Start  |
          +--------+
               |
               v
          +--------+
          | Ready  |
          +--------+
               |
        CPU Assigned
               |
               v
         +---------+
         | Running |
         +---------+
          /       \
Needs I/O         Finishes
   |                 |
   v                 v
+---------+     +-----------+
| Waiting |     | Terminated|
+---------+     +-----------+
     |
Resource Available
     |
     v
  Ready
```

---

# Process Control Block (PCB)

This is another **very important IBPS topic**.

---

## Definition

PCB is a **data structure maintained by the Operating System for every process**.

Think of it as the **identity card (or file) of a process** that stores all information the OS needs to manage it.

---

## What is PID?

Every process gets a unique number.

Called

```
PID
=
Process ID
```

Example

Chrome

```
PID = 1024
```

Word

```
PID = 2056
```

No two processes have the same PID at the same time.

---

# Information Stored in PCB

## 1. Process State

Stores current state.

Example

```
Ready

Running

Waiting

Exit
```

---

## 2. Process Privileges

Defines permissions.

Can process

* Read file?
* Write file?
* Access printer?
* Use network?

---

## 3. Process ID (PID)

Unique identification number.

Example

```
PID = 1100
```

---

## 4. Pointer

Stores the address/reference of the **parent process** (the process that created this one).

---

## 5. Program Counter

Stores

```
Next instruction address
```

Very important.

---

## 6. CPU Registers

CPU registers contain the process's working data while it runs (like instruction pointer, stack pointer, general-purpose registers, etc.). When the CPU switches to another process, these register values are saved in the PCB so execution can later continue from the same point.

---

## 7. CPU Scheduling Information

Stores

* Priority
* Scheduling information
* Queue information

Needed by scheduler.

---

## 8. Memory Management Information

Stores information related to memory, such as:

* Page Table
* Segment Table
* Memory limits

---

## 9. Accounting Information

Stores usage details.

Example

* CPU time used
* Time limits
* Execution ID

Useful for billing, monitoring, or statistics.

---

## 10. I/O Status Information

Stores

* Files opened
* Printer allocated
* Disk allocated
* Other I/O devices assigned to the process

---

# Why is PCB Needed?

Imagine there are many processes:

```
Chrome

Word

Excel

Spotify

VS Code
```

The OS needs to know for each process:

* Which state is it in?
* Where should it continue executing?
* Which resources does it own?
* How much CPU has it used?

All of this information is stored in its PCB.

Without PCB, the OS cannot efficiently manage or switch between processes.

---

# Process Switching (Context Switching)

When the CPU changes from one process to another:

```
Chrome Running
      ↓
Save Chrome's information in PCB
      ↓
Load Word's information from PCB
      ↓
Word Starts Running
```

This save-and-restore mechanism is called **Context Switching**, and the PCB is essential for it.

---

# Important Exam Points (IBPS SO IT)

### Must Remember

* **Program = Passive (stored code)**
* **Process = Active (running program)**
* **Program + Execution = Process**
* **Process has four memory sections:** Stack, Heap, Text, Data
* **Stack = Local variables, function parameters, return address**
* **Heap = Dynamic memory allocation**
* **Text = Program instructions + current execution context (including Program Counter as described in the tutorial)**
* **Data = Global and static variables**
* **Five process states = Start → Ready → Running → Waiting → Terminated**
* **Ready = Waiting for CPU**
* **Waiting = Waiting for I/O or another resource**
* **PCB = Data structure containing all information about a process**
* **PID = Unique Process ID**
* **Program Counter = Address of the next instruction to execute**
* **PCB is created when a process is created and deleted after the process terminates**

---

# IBPS SO IT Memory Tricks

### Process vs Program

**"Stored = Program, Running = Process."**

### Process Memory

**SHTD** → **Stack, Heap, Text, Data**

### Process States

**SRRWT**

**Start → Ready → Running → Waiting → Terminated**

### Ready vs Waiting

* **Ready = Waiting for CPU**
* **Waiting = Waiting for Resource (I/O, keyboard, file, printer, etc.)**

### PCB

**"PCB is the report card/identity card of a process."** It stores everything the OS needs to know about that process.
