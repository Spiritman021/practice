# Operating System – Context Switching (IBPS SO IT)

**Context Switching** is one of the **most important topics** in Operating Systems and is **frequently asked in IBPS SO IT**.

Questions are commonly asked on:

* What is Context Switching?
* Why is Context Switching needed?
* Steps of Context Switching
* Context Switching vs Process Switching
* Triggers of Context Switching
* Context Switch Cost
* Process Switching Latency

Let's understand everything from scratch.

---

# First Understand the Problem

Suppose your computer has opened:

* Chrome
* MS Word
* Spotify
* VS Code

Can the CPU execute all of them simultaneously?

**No** (assuming a single CPU core).

CPU executes

```text
One Process

↓

Another Process

↓

Another Process

↓

Again First Process
```

Question:

When CPU leaves one process and starts another,

how does the first process remember where it stopped?

Answer:

**Context Switching**

---

# What is Context?

Before understanding Context Switching,

you must know

**Context**.

---

## Definition

Context means

> **The complete current state (information) of a process.**

Think of it as

the "current progress" of a process.

---

# Example

Suppose Chrome is downloading a file.

Current status

```text
Download = 55%

Instruction = 500

Registers

Memory

Stack
```

All this information together is called

```text
Context
```

---

# What does Context contain?

The tutorial mentions

Context includes:

* Process Stack
* Memory Address Space
* Virtual Memory Address Space
* CPU Registers
* Stack Pointer (SP)

Let's understand each.

---

## 1. Process Stack

Stores

* Local Variables
* Function Calls
* Return Addresses

---

## 2. Memory Address Space

Memory assigned to process.

Example

```text
Chrome

↓

RAM Area
```

---

## 3. Virtual Memory Address Space

Logical memory addresses

used by process.

(No need to study deeply for IBPS.)

---

## 4. CPU Registers

Current values inside CPU.

Example

```text
A = 5

B = 10
```

---

## 5. Stack Pointer (SP)

Points to

top of the stack.

Think

Bookmark

of Stack.

---

# Easy Definition

Context

=

Everything needed

to restart the process

exactly where it stopped.

---

# What is Context Switching?

## Definition

Context Switching is the process of

> **Saving the current process state and loading another process state so that CPU can execute another process.**

Easy definition

```text
Save Current Process

↓

Load New Process

↓

Continue Execution
```

---

# Why is Context Switching Needed?

Suppose

CPU running

Chrome.

Suddenly

Word gets CPU.

Later

Chrome returns.

Question

How will Chrome continue

from exactly the same place?

Because

its Context was saved.

---

# Real-Life Example

Suppose

You are writing

Math Homework.

Suddenly

Mother says

"Answer the phone."

You stop.

You place a bookmark.

Talk.

Come back.

Continue

from same page.

That bookmark

is exactly

Context Switching.

---

# Complete Context Switching Diagram

```text
CPU

Running P1

↓

Save P1 Context

↓

Load P2 Context

↓

Running P2
```

---

# Multitasking Example

Imagine

CPU has

```text
P1

P2

P3
```

Timeline

```text
Time →

P1

↓

P2

↓

P3

↓

P1 Again

↓

P2 Again
```

Every switch

requires

Context Switching.

---

# What Happens During Context Switching?

Suppose

Chrome running.

```text
Chrome

↓

Instruction 200
```

CPU switches.

OS saves

```text
Instruction 200

Registers

Stack

Memory

PCB
```

Later

Chrome resumes

from

Instruction 201.

---

# Context Switching Triggers

Tutorial mentions

3 triggers.

Let's understand.

---

# 1. Multitasking ⭐⭐⭐

Most common.

Suppose

Chrome

Word

Spotify

are running.

CPU gives

time

to everyone.

Diagram

```text
Chrome

↓

Word

↓

Spotify

↓

Chrome
```

Every switch

↓

Context Switch.

---

# 2. Interrupt Handling ⭐⭐⭐

Suppose

CPU executing

Chrome.

Suddenly

Keyboard pressed.

Diagram

```text
Chrome

↓

Keyboard Interrupt

↓

OS Handles Interrupt

↓

Resume Chrome
```

Context Switching happens.

---

# 3. User Mode ↔ Kernel Mode

Remember

Operating System has

```text
User Mode

Kernel Mode
```

Suppose

Application wants

to read file.

It cannot directly access disk.

Diagram

```text
Application

↓

Kernel

↓

Disk
```

Sometimes

switching modes

also requires

saving/restoring context.

---

# Steps of Context Switching

Very Important.

Let's understand one by one.

---

# Step 1

Save Current Process

Diagram

```text
CPU

↓

P1 Running

↓

Save Registers

↓

Save PCB
```

Everything stored.

---

# Step 2

Move PCB

Suppose

P1 waiting.

PCB moves

to

```text
Ready Queue

or

Waiting Queue
```

Diagram

```text
Running

↓

Ready Queue
```

---

# Step 3

Scheduler Selects New Process

Suppose

Ready Queue

contains

```text
P2

P3

P4
```

Scheduler chooses

```text
P3
```

---

# Step 4

Update PCB

P3 state

changes

```text
Ready

↓

Running
```

PCB updated.

---

# Step 5

Update Memory

Memory structures

Page Tables

etc.

prepared.

(No need deep study.)

---

# Step 6

Restore Context

CPU loads

P3

Registers

Stack

Program Counter

Diagram

```text
PCB

↓

Registers Loaded

↓

CPU

↓

P3 Running
```

Done.

---

# Complete Context Switching Flow

```text
Running P1

↓

Save Context

↓

Save PCB

↓

Scheduler Picks P2

↓

Load PCB

↓

Restore Context

↓

Running P2
```

Remember this.

# Context Switching Cost

Very Important.

Context Switching

takes time.

Question

Why?

Because OS must

* Save Registers
* Save PCB
* Load PCB
* Restore Registers
* Update Memory

All consume CPU cycles.

---

# Simple Example

Suppose

Switch takes

2 ms.

During

those 2 ms

CPU

is NOT executing

useful program instructions.

Diagram

```text
Execution

████████

Context Switch

░░

Execution

████████
```

Shaded part

is overhead.

---

# What is Process Switching Latency?

Tutorial says

Time required

to switch

between

two processes.

Definition

> **Process Switching Latency = Time taken to perform Context Switching.**

Easy Trick

Latency

=

Delay.

---

# Why Too Many Context Switches are Bad?

Suppose

Every

1 ms

CPU switches.

Diagram

```text
Run

Switch

Run

Switch

Run

Switch
```

Most time

is wasted

in switching.

Performance

decreases.

---

# Good Scheduler

A good scheduler

reduces

unnecessary

Context Switches.

Diagram

```text
Run Long

↓

Less Switching

↓

Higher Performance
```

---

# Single Address Space vs Private Address Space

Tutorial says

Single Address Space

↓

Faster Context Switching.

Why?

Because

less memory information

needs updating.

Private Address Space

↓

More work.

↓

Slower.

For IBPS,

remember only

the conclusion.

---

# Context Switching vs Process Switching

Students confuse these.

---

## Process Switching

Means

CPU changes

from one process

to another.

---

## Context Switching

Means

Saving current process state

and

Loading new process state.

Context Switching

is actually

the mechanism

used during

Process Switching.

---

Diagram

```text
Process Switching

P1

↓

P2

Needs

↓

Context Switching
```

---

# Context Switching vs Mode Switching

Sometimes asked.

| Context Switching  | Mode Switching            |
| ------------------ | ------------------------- |
| Process changes    | Process remains same      |
| PCB saved/restored | Usually no process change |
| Higher overhead    | Lower overhead            |

# IBPS SO IT Important Points

### Context

* **Context = Complete state of a process.**
* Includes:

  * CPU Registers
  * Stack
  * Stack Pointer (SP)
  * Memory Address Space
  * Virtual Memory Address Space

### Context Switching

* Saves the current process state.
* Loads the next process state.
* Allows multitasking on a single CPU.

### Triggers

* **Multitasking**
* **Interrupt Handling**
* **User Mode ↔ Kernel Mode switching**
* (In practice, context switches also occur due to scheduler decisions like time quantum expiry.)

### Steps

1. Save current context.
2. Update PCB.
3. Move PCB to the appropriate queue.
4. Scheduler selects next process.
5. Update the selected PCB.
6. Update memory structures.
7. Restore the new process context.

### Performance

* Every context switch consumes CPU cycles.
* Too many context switches reduce system performance.
* **Process Switching Latency** = Time taken to complete a context switch.

---

# Final One-Line Revision (Most Important)

```text
Context = Current state of a process.

Context Switching = Save current process state → Load next process state.

PCB stores the saved context.

More Context Switches = More Overhead = Lower Performance.
```

---

# IBPS SO IT Exam Tips

These are the **highest-probability questions** from this topic:

1. **What is Context Switching?**

   * Saving the current process context and restoring another process's context so the CPU can switch execution.

2. **Where is the process context stored?**

   * **Process Control Block (PCB).**

3. **Why is Context Switching needed?**

   * To enable **multitasking** by allowing multiple processes to share the CPU.

4. **What is Context Switch (Process Switching) Latency?**

   * The **time required to switch** the CPU from one process to another.

5. **What is the effect of excessive Context Switching?**

   * **Performance decreases** because CPU spends more time saving/restoring contexts than executing useful instructions.
