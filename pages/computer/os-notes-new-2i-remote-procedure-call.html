# Operating System – Remote Procedure Call (RPC) (IBPS SO IT)

**RPC (Remote Procedure Call)** is an important topic in **Operating Systems**, **Distributed Systems**, and **Computer Networks**.

For **IBPS SO IT**, questions are commonly asked on:

* What is RPC?
* Working of RPC
* Client Stub & Server Stub
* Marshalling
* Synchronous vs Asynchronous RPC
* Components of RPC
* RPC vs REST ⭐⭐⭐

Let's understand it from scratch.

---

# First Understand the Problem

Suppose you have two computers.

```text
Computer A (Client)

Computer B (Server)
```

Computer A wants to calculate

```java
calculateSalary()
```

But...

The function exists only on **Computer B**.

Question:

**Can Computer A directly execute that function?**

**No.**

Because the function is stored on another computer.

So how can A use it?

This is where **RPC** comes in.

---

# What is RPC?

### Definition

RPC (Remote Procedure Call) is a technique that allows one computer to **call a function that exists on another computer** as if it were a local function.

### Easy Definition for IBPS

> **RPC allows a program to call a function on another computer just like a normal local function.**

---

# Real-Life Example

Imagine

You are in Delhi.

Your friend is in Mumbai.

You call him.

```text
You

↓

Phone Call

↓

Friend

↓

Friend Does Work

↓

Returns Result
```

You don't travel to Mumbai.

You simply ask him.

RPC works exactly the same way.

---

# Simple Computer Example

Suppose

Client

```java
getBalance()
```

But the actual function is on

Bank Server.

Diagram

```text
Client PC

getBalance()

        │
        │ RPC
        ▼

Bank Server

Runs getBalance()

        │
        ▼

Returns Balance
```

To the client,

it feels like the function was running locally.

---

# Why is it called "Remote Procedure Call"?

Let's understand each word.

### Remote

Function is on another computer.

---

### Procedure

Procedure means

Function

or

Method

---

### Call

Client calls that function.

Hence

```text
Remote

+

Procedure

+

Call
```

=

RPC

---

# Main Purpose of RPC

The tutorial says

RPC hides all network communication.

Meaning

Without RPC

Programmer must write

* Socket code
* Network code
* Data transfer
* Protocol handling

With RPC

Simply call

```java
getBalance();
```

Everything else is automatic.

---

# Easy Example

Without RPC

```text
Create Socket

↓

Connect Server

↓

Send Data

↓

Wait

↓

Receive Data

↓

Close Socket
```

Lots of work.

---

With RPC

```java
getBalance();
```

Done.

RPC hides all networking.

---

# Working of RPC

This is the **most important part**.

Let's understand step-by-step.

---

# Complete RPC Diagram

```text
 CLIENT COMPUTER                     SERVER COMPUTER

 Client
    │
    ▼
Client Stub
    │
    │  Request
    ▼
======================== Network ========================
    ▲
    │
Server Stub
    │
    ▼
Server Function
```

Now let's understand each step.

---

# Step 1

Client Calls Function

Example

```java
getBalance()
```

Client thinks

Function is local.

Diagram

```text
Client

↓

getBalance()
```

---

# Step 2

Client Stub

Client Stub receives the function call.

Question

What is Stub?

Tutorial says

> Stub is a small program that works as an interface between Client and Server.

Think of Stub as a

Translator.

---

Diagram

```text
Client

↓

Client Stub

↓

Server
```

---

# Step 3

Marshalling

Very Important.

The tutorial says

Client Stub packs parameters.

Example

```java
getBalance(12345)
```

Parameter

```text
12345
```

must be packed.

This packing is called

> **Marshalling**

---

Diagram

```text
Account Number

12345

↓

Packed

↓

Message
```

---

### Easy Trick

Marshalling

=

Packing Data.

---

# Step 4

Message Sent

Operating System sends

request

through network.

Diagram

```text
Client

↓

Network

↓

Server
```

---

# Step 5

Server Stub Receives Message

Server Stub

receives packed message.

Diagram

```text
Network

↓

Server Stub
```

---

# Step 6

Unmarshalling

Server Stub removes data.

Example

Packed

↓

```text
Account = 12345
```

This unpacking is called

> **Unmarshalling**

Easy Trick

Unmarshalling

=

Unpacking Data.

---

# Step 7

Server Executes Function

Now

Server runs

```java
getBalance()
```

Diagram

```text
Server Stub

↓

Actual Function

↓

Database

↓

Balance
```

---

# Step 8

Response Returns

Balance

↓

Packed

↓

Network

↓

Client

Diagram

```text
Server

↓

Result

↓

Client
```

Done.

---

# Complete RPC Flow

```text
Client

↓

Client Stub

↓

Marshalling

↓

Network

↓

Server Stub

↓

Unmarshalling

↓

Server Function

↓

Result

↓

Client
```

This flow is very important for exams.

---

# Components of RPC

Tutorial mentions several components.

Let's understand.

---

# 1. Client

Requests service.

Example

ATM Machine

asks

Bank Server.

---

# 2. Server

Provides service.

Example

Bank Database

returns balance.

---

# 3. Client Stub

Acts as interface.

Converts

Function Call

↓

Message.

---

# 4. Server Stub

Receives message.

Converts

Message

↓

Function Call.

---

# 5. RPC Runtime

Manages communication.

Think

Manager.

It controls

* Sending
* Receiving
* Errors

---

# 6. Network

Transfers messages.

Could be

* LAN
* Internet
* WiFi

---

# 7. Binding

Very Important.

Binding means

Finding

which server

provides the required service.

Example

You know

```text
Google
```

But

Which IP?

Binding finds it.

---

# Easy Analogy

Restaurant.

Customer

↓

Waiter

↓

Kitchen

Waiter

=

Stub

Kitchen

=

Server

Customer

=

Client

---

# Types of RPC

Tutorial gives

5 types.

---

# 1. Synchronous RPC ⭐⭐⭐

Another name

Blocking RPC.

Diagram

```text
Client

↓

Request

↓

Wait

↓

Server

↓

Response

↓

Continue
```

Client waits.

Cannot do anything.

---

Example

ATM

You insert card.

Machine waits.

Only after response

can you continue.

---

# 2. Asynchronous RPC ⭐⭐⭐

Another name

Non-blocking RPC.

Diagram

```text
Client

↓

Request

↓

Continue Working

↓

Server

↓

Response Later
```

Client

does not wait.

---

Example

Email.

You send.

Continue working.

Reply comes later.

---

# Difference

| Synchronous | Asynchronous |
| ----------- | ------------ |
| Waits       | Doesn't Wait |
| Blocking    | Non-blocking |
| Simpler     | Faster       |

---

# 3. Callback RPC

Interesting type.

Diagram

```text
Client

↓

Server

↓

Server Calls Client Back
```

Example

Food Delivery.

You order.

Restaurant later calls

"Food Ready."

---

# 4. Batch RPC

Instead of

100 requests

send

one by one.

Diagram

```text
A

B

C

D

↓

Batch

↓

Server
```

Less network overhead.

---

# 5. Broadcast RPC

One request

goes to

ALL servers.

Diagram

```text
           Client
             │
      ┌──────┼──────┐
      ▼      ▼      ▼
   Server1 Server2 Server3
```

Useful when

Client doesn't know

which server has data.

---

Disadvantage

Lots of network traffic.

---

# RPC Issues

Tutorial discusses problems.

Let's understand.

---

# 1. Network Failure

Unlike local functions,

Network can fail.

Example

```text
Client

↓

Network Broken

↓

Server Never Receives
```

RPC fails.

---

# 2. Duplicate Messages

Suppose

Client sends request.

Network slow.

Client sends again.

Server executes

Twice.

Problem.

---

OS must ensure

Exactly Once Execution.

---

# 3. Binding Problem

Question

How does Client know

Server address?

Answer

Binding.

---

# Fixed Binding

Server

always

Port 8080.

Simple

but

Not flexible.

---

# Dynamic Binding

Tutorial mentions

Rendezvous (Matchmaker).

Diagram

```text
Client

↓

Matchmaker

↓

Server Address

↓

Actual Server
```

Like

Google Maps.

You ask

Where?

It tells.

---

# Advantages of RPC

Tutorial gives several.

Let's simplify.

---

### 1

Looks like

Local Function.

Easy.

---

### 2

Hides

Networking.

---

### 3

Less Coding.

---

### 4

Works in

Distributed Systems.

---

### 5

High Performance.

---

# Disadvantages

### 1

Network Failure Possible.

---

### 2

No Standard Implementation.

Different technologies implement RPC differently.

---

### 3

Hardware Architecture Differences.

Sometimes compatibility issues.

---

# RPC vs REST ⭐⭐⭐⭐⭐

Very Important.

---

## RPC

Focus

Calling Functions.

Example

```text
deposit()

withdraw()

calculateSalary()
```

---

## REST

Focus

Resources.

Example

```text
/users

/products

/orders
```

---

# Comparison

| RPC                      | REST                  |
| ------------------------ | --------------------- |
| Calls remote functions   | Accesses resources    |
| Function/Method based    | URL based             |
| Uses function names      | Uses URLs             |
| Uses TCP, UDP, HTTP etc. | Uses HTTP only        |
| Internal systems         | Public APIs, Web APIs |
| Action-oriented          | Resource-oriented     |

---

# Example

## RPC

```text
calculateSalary()
```

Looks like function call.

---

## REST

```text
GET /employees

POST /employee

PUT /employee

DELETE /employee
```

Looks like web URL.

# IBPS SO IT Important Points

### RPC

* **RPC = Remote Procedure Call**
* Allows a program to call a function on another computer **as if it were local**.
* Hides all networking details from the programmer.

### Working

1. Client calls the Client Stub.
2. Client Stub performs **Marshalling** (packs parameters).
3. Request is sent over the network.
4. Server Stub receives the request.
5. Server Stub performs **Unmarshalling** (unpacks parameters).
6. Server executes the procedure.
7. Response is sent back to the client.

### Components

* Client
* Server
* Client Stub
* Server Stub
* RPC Runtime
* Network
* Binding

### Types

* **Synchronous RPC** → Blocking.
* **Asynchronous RPC** → Non-blocking.
* **Callback RPC** → Server calls the client back.
* **Batch RPC** → Multiple requests sent together.
* **Broadcast RPC** → One request sent to all servers.

### RPC vs REST

* **RPC** → Function/Method based communication.
* **REST** → Resource-based communication using HTTP methods (GET, POST, PUT, DELETE).

---

# Final One-Line Revision (Most Important)

```text
RPC = Call a function on another computer just like a local function.

Marshalling = Packing parameters.

Unmarshalling = Unpacking parameters.

Client Stub = Converts function call into a network request.

Server Stub = Converts the network request back into a function call.

REST = Works with resources (URLs), while RPC works with remote function calls.
```

This distinction between **RPC** and **REST**, along with the **RPC working flow (Client → Stub → Marshalling → Network → Server Stub → Unmarshalling → Server)**, is highly important for **IBPS SO IT** examinations.
