# Operating System Properties

## What are Operating System Properties?

Properties are the **special characteristics or capabilities** of an Operating System.

Think of them as the **features** that make an Operating System powerful.

The tutorial mentions **7 important properties**:

```text
Operating System Properties

1. Batch Processing
2. Multitasking
3. Multiprogramming
4. Interactivity
5. Real-Time System
6. Distributed Environment
7. Spooling
```

---

# 1. Batch Processing ⭐⭐⭐⭐⭐

This is one of the oldest Operating System techniques.

---

## What is Batch Processing?

Instead of executing one job at a time,

the Operating System

**collects similar jobs together**

and executes them one after another.

This collection is called a **Batch**.

---

## Real-Life Example

Imagine your college.

Suppose 500 students submit assignments.

Teacher doesn't check them one by one immediately.

Instead,

Teacher collects all assignments.

↓

Makes one bundle.

↓

Checks them together.

This is Batch Processing.

---

## Computer Example

Suppose a bank has

100 salary calculations.

Instead of calculating each salary separately,

Operating System collects all salary jobs.

```text
Salary 1

Salary 2

Salary 3

↓

Batch

↓

Execution
```

---

## How Batch Processing Works

### Step 1

User submits jobs.

```text
Job A

Job B

Job C
```

---

### Step 2

Operating System stores them.

---

### Step 3

Executes them

in order.

---

### Step 4

Stores output.

Prints later.

---

## First Come First Served

Jobs execute in

submission order.

```text
Job A

↓

Job B

↓

Job C
```

This is

**FCFS**

---

## After Execution

Memory becomes free.

Output goes into

Output Spool.

Later,

it gets printed.

---

## Advantages

### Less manual work

Operator doesn't need to start every job.

---

### Better Performance

Next job starts automatically.

---

## Disadvantages

### Difficult Debugging

If Job 57 has an error,

finding it is difficult.

---

### Infinite Loop

One program may never finish.

Everything behind it waits.

---

### No Protection

One bad job

can affect all other jobs.

---

# Easy Memory

Batch

↓

Collect Jobs

↓

Execute Together

---

# 2. Multitasking ⭐⭐⭐⭐⭐

Very important.

---

## What is Multitasking?

Running

multiple programs

at the same time.

Actually,

CPU switches between them

very quickly.

---

## Example

You're

🎵 Listening to Music

📄 Typing in Word

🌐 Downloading File

🌍 Using Chrome

All together.

---

## Does CPU execute all together?

No.

Suppose

```text
CPU

↓

Chrome

↓

Spotify

↓

Word

↓

Chrome

↓

Download
```

Switching happens

thousands of times every second.

You feel

everything is running together.

---

## Why?

Because

CPU switching is extremely fast.

---

## Time Sharing

The tutorial says

Multitasking is also called

> **Time Sharing**

because

every process gets

a small amount of CPU time.

---

Example

```text
Chrome

5 ms

↓

Word

5 ms

↓

Spotify

5 ms

↓

Chrome
```

Every program gets

its own CPU slice.

---

## Advantages

✔ Interactive

✔ Fast

✔ Better CPU utilization

---

# Easy Memory

Multitasking

↓

One CPU

↓

Many Running Programs

↓

Fast Switching

---

# 3. Multiprogramming ⭐⭐⭐⭐⭐

This topic is frequently confused with Multitasking.

Let's clear it forever.

---

## What is Multiprogramming?

Multiple programs

stay in RAM

at the same time.

Suppose

```text
RAM

Chrome

Word

Excel
```

All are waiting.

CPU executes

one.

If that program waits for I/O,

CPU immediately starts another.

---

## Example

Chrome

↓

Waiting for Internet

↓

CPU starts Word.

CPU never stays idle.

---

## Goal

Increase

CPU Utilization.

---

## Responsibilities

Operating System

Keeps several jobs in memory.

Chooses one.

Executes it.

If waiting,

switches.

---

## Advantages

High CPU Utilization.

---

## Disadvantages

Requires

Memory Management

and

CPU Scheduling.

---

# Easy Memory

Multiprogramming

↓

Many Programs

↓

Inside Memory

---

# Difference

## Multitasking

Focus

Running

many tasks.

---

## Multiprogramming

Focus

Keeping

many programs

inside memory.

---

# Easy Trick

**Multiprogramming = Multiple Programs in Memory**

**Multitasking = Multiple Tasks Running**

---

# 4. Interactivity ⭐⭐⭐⭐

Interactivity means

User

can interact

with the computer.

---

## Example

You type

```text
Hello
```

Computer immediately displays

```text
Hello
```

This immediate response

is Interactivity.

---

## Responsibilities

OS manages

Input Devices

Keyboard

Mouse

Touch Screen

---

Output Devices

Monitor

Printer

Speaker

---

## Response Time

Operating System should respond quickly.

Long delay

↓

Poor Interactivity.

---

# Example

ATM Machine

Press

Withdraw

↓

Immediate response.

---

# Easy Memory

Interactivity

↓

Fast Response

to User.

---

# 5. Real-Time System ⭐⭐⭐⭐⭐

Very Important.

---

## What is Real-Time System?

Operating System

must respond

within

a fixed time.

Missing the deadline

may cause failure.

---

## Example

Airbag System

Suppose

Car crashes.

Airbag must open

within milliseconds.

If delayed

↓

Accident.

---

## Other Examples

Medical Equipment

Robots

Aircraft

Traffic Signals

Missile Systems

---

## Responsibilities

Read Sensor Data.

Respond Immediately.

Meet Deadlines.

---

# Easy Memory

Real Time

↓

Correct Response

Within Fixed Time

---

# 6. Distributed Environment ⭐⭐⭐⭐

Distributed

means

many computers

working together.

---

## Example

Google Search.

Your search result

comes from

thousands of servers.

---

## Diagram

```text
Computer A

↓

Computer B

↓

Computer C
```

Every computer

has

its own

CPU

Memory

Clock

---

## Responsibilities

Operating System

distributes work

among all computers.

Coordinates communication.

---

## Example

Bank Servers

Delhi

Mumbai

Chennai

All process transactions together.

---

# Easy Memory

Distributed

↓

Many Computers

↓

One Common Goal

---

# 7. Spooling ⭐⭐⭐⭐⭐

This is one of the favourite IBPS questions.

---

## Full Form

**SPOOL**

=

**Simultaneous Peripheral Operations On-Line**

---

## What is Spooling?

Spooling

means

keeping I/O jobs

inside a

temporary buffer

or queue.

---

## Why?

CPU

is fast.

Printer

is slow.

Suppose

10 people print.

Printer

cannot print together.

Operating System

creates

Print Queue.

---

## Diagram

```text
Print Queue

Document A

↓

Document B

↓

Document C

↓

Printer
```

Printer prints

one by one.

---

## Buffer

The queue

is called

Spooling Buffer.

Can exist

in RAM

or

Hard Disk.

---

## Responsibilities

Operating System

Stores Print Jobs.

Waits.

Printer becomes free.

Prints.

---

## Advantages

### Large Buffer

Disk is used

as huge buffer.

---

### Parallel Processing

CPU continues

working.

Printer continues

printing.

Both happen together.

---

# Real Example

You print

100 pages.

Can you continue browsing?

Yes.

Why?

Because

Operating System

has already stored

the print job

inside

Print Spooler.

---

# Easy Memory

Spooling

↓

Queue

↓

Slow Device

↓

Printer

---

# Difference Between Batch Processing, Multiprogramming & Multitasking

This is the **most important comparison** for IBPS.

| Batch Processing                     | Multiprogramming                            | Multitasking                                           |
| ------------------------------------ | ------------------------------------------- | ------------------------------------------------------ |
| Jobs collected and executed together | Multiple programs stay in memory            | Multiple programs appear to run simultaneously         |
| No user interaction during execution | CPU switches when one program waits for I/O | CPU rapidly switches between tasks using time slices   |
| Goal: Automatic processing of jobs   | Goal: Maximize CPU utilization              | Goal: Provide interactive computing and quick response |
| Example: Salary processing           | Chrome + Word loaded in RAM                 | Chrome + Word + Spotify running together               |

---

# Difference Between Multitasking and Multiprogramming

| Multiprogramming                                       | Multitasking                                                                    |
| ------------------------------------------------------ | ------------------------------------------------------------------------------- |
| Multiple programs in memory                            | Multiple tasks executed apparently simultaneously                               |
| CPU switches only when a program waits (e.g., for I/O) | CPU switches rapidly after small time slices even if a program is still running |
| Goal: Keep CPU busy                                    | Goal: Fast response to users                                                    |
| Mostly system-oriented                                 | User-oriented                                                                   |

---

# Difference Between Batch Processing and Spooling

Students often confuse these.

| Batch Processing               | Spooling                                 |
| ------------------------------ | ---------------------------------------- |
| Collects jobs before execution | Queues I/O operations (like printing)    |
| Used before processing starts  | Used while processing is already running |
| Example: Payroll processing    | Printer Queue                            |

---

# Easy Memory Trick

Remember the properties using:

## **B M M I R D S**

* **B** → Batch Processing
* **M** → Multitasking
* **M** → Multiprogramming
* **I** → Interactivity
* **R** → Real-Time System
* **D** → Distributed Environment
* **S** → Spooling

---

# IBPS SO IT Officer – Most Important MCQs

| Question                                          | Answer                                                              |
| ------------------------------------------------- | ------------------------------------------------------------------- |
| What is Batch Processing?                         | Collecting similar jobs and executing them together                 |
| Batch jobs are generally executed in which order? | First Come First Served (FCFS)                                      |
| What is Multitasking?                             | Running multiple tasks by rapidly switching CPU time among them     |
| Multitasking is also known as?                    | Time Sharing                                                        |
| What is Multiprogramming?                         | Keeping multiple programs in memory so the CPU is never idle        |
| Main goal of Multiprogramming?                    | Maximize CPU utilization                                            |
| What is Interactivity?                            | Ability of users to interact with the computer with quick response  |
| What is a Real-Time System?                       | A system that must respond within fixed deadlines                   |
| What is a Distributed Environment?                | Multiple independent computers/processors working together          |
| Full form of SPOOL?                               | Simultaneous Peripheral Operations On-Line                          |
| What is Spooling?                                 | Storing I/O jobs in a buffer/queue for slower devices like printers |

---

These topics are asked repeatedly:

If you clearly understand the **differences between Batch Processing, Multiprogramming, Multitasking, and Spooling**, you will be able to answer almost every OS objective question from this chapter.
