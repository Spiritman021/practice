# Operating System – Process Schedulers (IBPS SO IT)

This is one of the **most important topics** for **IBPS SO IT**. Questions are frequently asked on:

* Types of Schedulers
* Long-Term Scheduler
* Short-Term Scheduler
* Medium-Term Scheduler
* Dispatcher
* Dispatch Latency
* Swapping
* Degree of Multiprogramming

Let's understand it from scratch.

---

# First, Why Do We Need a Scheduler?

When many applications are open, the CPU cannot execute all of them at exactly the same instant. The Operating System must decide:

* Which process should enter RAM?
* Which process should get the CPU?
* Which process should be temporarily removed from RAM?

The component that makes these decisions is called a **Scheduler**.

---

# What is Process Scheduling?

**Process Scheduling** is the method used by the Operating System to decide **which process gets CPU time**.

## Main Goals

### 1. Fairness

Every process should eventually get CPU time. No process should wait forever; indefinite waiting is called **starvation**.

### 2. Maximum CPU Utilization

The CPU should remain busy as much as possible.

---

# Three Types of Process Schedulers

| Scheduler | Main Work |
| --- | --- |
| Long Term | Brings processes into RAM |
| Short Term | Gives CPU to a process |
| Medium Term | Removes processes from RAM temporarily |

---

# 1. Long-Term Scheduler (Job Scheduler)

The **Long-Term Scheduler**, also called the **Job Scheduler**, selects processes from the Job Pool on disk and loads them into RAM.

```text
Hard Disk
    ↓
Long-Term Scheduler
    ↓
RAM (Ready State)
```

It does **not** give the CPU to a process. It only admits processes into memory.

## Degree of Multiprogramming

> **Degree of Multiprogramming = Number of processes present in memory (RAM).**

The Long-Term Scheduler controls the degree of multiprogramming because it decides how many processes enter RAM.

It is the **slowest scheduler**, runs infrequently, and may execute every few seconds or minutes.

### Easy Trick

> **Long journey: Disk → RAM**

---

# 2. Short-Term Scheduler (CPU Scheduler)

The **Short-Term Scheduler**, also called the **CPU Scheduler**, selects one process from the Ready Queue and gives it the CPU.

```text
Ready Queue
    ↓
Short-Term Scheduler
    ↓
Dispatcher
    ↓
CPU
```

The Ready Queue contains processes that are:

* in RAM
* ready to run
* waiting only for the CPU

Scheduling algorithms such as **FCFS**, **SJF**, and **Round Robin** help it decide which process should run next.

It runs every few milliseconds, so it must be extremely fast. It is the **fastest scheduler**.

---

# Scheduler vs Dispatcher

## Scheduler

Decides:

> **Who should run?**

## Dispatcher

Actually gives the CPU to the selected process.

```text
Ready Queue
    ↓
Short-Term Scheduler chooses P2
    ↓
Dispatcher
    ↓
CPU executes P2
```

---

# Context Switching

When the CPU changes from P1 to P2, the OS must:

1. Save P1 information in its PCB.
2. Load P2 information from its PCB.
3. Start running P2.

This is called **Context Switching**.

# Dispatch Latency

> **Dispatch Latency = Time taken by the Dispatcher to perform Context Switching.**

It is the time required to switch the CPU from one process to another.

---

# 3. Medium-Term Scheduler

The **Medium-Term Scheduler**, also called the **Swapper**, temporarily removes processes from RAM and later brings them back.

This operation is called **Swapping**.

```text
RAM ⇄ Secondary Storage (Swap Area)
```

It is needed when:

* RAM is low
* too many processes are in memory
* the system is under heavy load

Its speed and frequency are between the Short-Term and Long-Term schedulers.

---

# Speed Order

```text
Short-Term Scheduler
        ↓
Medium-Term Scheduler
        ↓
Long-Term Scheduler
```

**Fastest → Slowest**

---

# Comparison Table

| Feature | Long-Term Scheduler | Short-Term Scheduler | Medium-Term Scheduler |
| --- | --- | --- | --- |
| Also Called | Job Scheduler | CPU Scheduler | Swapper |
| Main Work | Loads processes from Disk → RAM | Selects from Ready Queue and allocates CPU | Swaps between RAM and secondary storage |
| Works Between | Disk and RAM | Ready Queue and CPU | RAM and Disk |
| Frequency | Every few seconds/minutes | Every few milliseconds | Occasionally |
| Speed | Slowest | Fastest | Moderate |
| Controls | Degree of Multiprogramming | CPU allocation | Frees memory and reduces multiprogramming |
| Performs Swapping? | ❌ No | ❌ No | ✅ Yes |

---

# Easy Memory Tricks

### Long-Term Scheduler

> **Long journey: Disk → RAM.**

* Job Scheduler
* Loads processes into memory
* Controls degree of multiprogramming
* Slowest

### Short-Term Scheduler

> **Short decision: Ready Queue → CPU.**

* CPU Scheduler
* Chooses the next process
* Uses the Dispatcher
* Fastest

### Medium-Term Scheduler

> **Middle manager: RAM ⇄ Disk.**

* Swapper
* Performs Swapping
* Frees memory
* Moderate speed

---

# Most Important Exam Points

* **Long-Term Scheduler = Job Scheduler**
* **Short-Term Scheduler = CPU Scheduler**
* **Medium-Term Scheduler = Swapper**
* Long-Term Scheduler loads processes from Disk to RAM.
* Short-Term Scheduler selects from the Ready Queue and allocates the CPU.
* Medium-Term Scheduler performs Swapping.
* Dispatcher performs Context Switching.
* Dispatch Latency is the time taken to switch the CPU between processes.
* Degree of Multiprogramming is the number of processes in RAM.
* Long-Term Scheduler controls the Degree of Multiprogramming.
* Speed order: **Short-Term → Medium-Term → Long-Term**

> **IBPS SO IT Tip:** Memorize who controls the degree of multiprogramming, who performs swapping, who allocates the CPU, and which scheduler is fastest.
