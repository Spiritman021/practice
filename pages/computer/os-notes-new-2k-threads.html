# Operating System – Threads (IBPS SO IT)

**Threads** are one of the **most important topics** in Operating Systems and are frequently asked in **IBPS SO IT**.

Questions are commonly asked on:

* What is a Thread?
* Process vs Thread ⭐⭐⭐⭐⭐
* User-Level Thread (ULT) vs Kernel-Level Thread (KLT) ⭐⭐⭐
* Advantages of Threads
* Thread Components
* Thread Operations

Let's understand everything in a simple way.

---

# First Understand the Problem

Suppose you open **Google Chrome**.

What are you doing?

* Watching a YouTube video
* Downloading a file
* Opening another tab

Question:

Is Chrome running **one task** or **many tasks**?

Answer:

Many tasks simultaneously.

How?

Using **Threads**.

---

# What is a Thread?

### Definition

A **Thread** is the **smallest unit of execution** inside a process.

OR

> A thread is a **single flow (sequence) of execution** within a process.

The tutorial also calls it a:

> **Lightweight Process (LWP)**

---

# Easy Definition for IBPS

> **Thread = A lightweight execution unit inside a process.**

---

# Program → Process → Thread

Remember this hierarchy.

```text
Program
    │
    ▼
Process
    │
    ▼
Threads
```

---

# Real-Life Example

Imagine a restaurant.

Restaurant

↓

Manager

↓

Workers

Diagram

```text
Restaurant (Process)

      │
 ┌────┼────┐
 │    │    │
 ▼    ▼    ▼
Cook Cashier Cleaner

(Threads)
```

One restaurant.

Many workers.

Similarly,

One Process

↓

Many Threads.

---

# Another Example

Chrome Browser

Diagram

```text
Chrome Process

      │
 ┌────┼─────┬────────┐
 │    │     │        │
 ▼    ▼     ▼        ▼
Tab1 Tab2 Download Music
```

Every tab

may execute as a different thread.

---

# Important Point

Tutorial says

Every thread belongs to

exactly

**one process.**

Diagram

```text
Process A

↓

Thread 1

Thread 2

Thread 3
```

Thread

cannot exist

without process.

---

# Why is it called Lightweight Process?

Because

Compared to a Process,

Thread needs

* Less Memory
* Less Time
* Less Resources

Diagram

```text
Process

██████████

Thread

██
```

Very small.

Therefore

Lightweight.

---

# What Does a Thread Have?

Each thread has

its own

* Program Counter
* Registers
* Stack

But shares

* Code
* Data
* Files

Let's understand.

---

# Thread Memory Structure

```text
                PROCESS

        +----------------------+
        |   Code Segment       |
        |   Data Segment       |
        |   Open Files         |
        +----------------------+
           ▲      ▲       ▲
           │      │       │
      Shared by All Threads
           │      │       │
     ┌─────┴──────┴───────┴─────┐
     │           │              │
     ▼           ▼              ▼
 Thread1     Thread2        Thread3
   │             │              │
   ▼             ▼              ▼
Program Ctr  Program Ctr   Program Ctr
Registers    Registers     Registers
Stack        Stack         Stack
```

This is the most important diagram.

---

# Shared Resources

All threads share

```text
Code

Data

Files
```

Example

Browser tabs

All use

same browser code.

---

# Private Resources

Each thread has

its own

```text
Program Counter

Registers

Stack
```

So they can execute independently.

---

# Example

Suppose

Thread 1

changes

```text
salary = 10000
```

Since

Data Segment

is shared,

Thread 2 immediately sees

```text
salary = 10000
```

This is why

threads communicate easily.

---

# Why Do We Need Threads?

Tutorial gives several reasons.

Let's understand.

---

# 1. Responsiveness ⭐⭐⭐

Suppose

Word is printing

a document.

Can you still type?

Yes.

Because

One thread prints.

Another thread

accepts keyboard input.

Diagram

```text
Word Process

      │
 ┌────┴────┐
 │         │
 ▼         ▼
Typing   Printing
```

Application stays responsive.

---

# 2. Resource Sharing ⭐⭐⭐

Threads

share

same memory.

Diagram

```text
Thread 1

↓

Shared Memory

↑

Thread 2
```

No IPC required.

Communication becomes easy.

---

# 3. Cost Efficient ⭐⭐⭐

Creating

a Process

↓

Expensive

Creating

a Thread

↓

Cheap

Because

No new memory space needed.

---

# 4. Parallelism ⭐⭐⭐

Suppose

CPU has

4 cores.

Diagram

```text
Core1

Thread1

Core2

Thread2

Core3

Thread3

Core4

Thread4
```

Tasks execute

simultaneously.

Performance improves.

---

# 5. Better CPU Utilization

Suppose

Thread 1

waiting for Disk.

CPU need not remain idle.

Diagram

```text
Thread1

Waiting

↓

CPU

Runs

Thread2
```

CPU stays busy.

---

# 6. Simpler Program Design

Instead of

one huge task,

divide

into smaller threads.

Example

Video Editing

```text
Audio Thread

Video Thread

Rendering Thread
```

Easy to maintain.

---

# Components of a Thread

Tutorial gives

4 components.

---

# 1. Thread ID (TID)

Every thread gets

Unique ID.

Example

```text
Thread1

ID = 101
```

---

# 2. Program Counter (PC)

Stores

address

of next instruction.

Every thread

has its own PC.

---

# 3. Register Set

Stores

working values.

Every thread

has separate registers.

---

# 4. Stack

Stores

* Local Variables
* Function Calls
* Return Addresses

Every thread

has its own stack.

---

# Memory Trick

Every Thread has

```text
ID

PC

Registers

Stack
```

Shared

```text
Code

Data

Files
```

---

# Types of Threads

Very Important.

Only

2 types.

```text
1

User-Level Thread

2

Kernel-Level Thread
```

---

# User-Level Thread (ULT)

Definition

Managed

in

User Space.

Kernel

doesn't know

these threads exist.

Diagram

```text
Application

↓

Thread Library

↓

ULT1

ULT2

ULT3

↓

Kernel

Thinks

One Process
```

Kernel unaware.

---

### Characteristics

* Fast creation
* Fast switching
* Kernel unaware

---

### Problem

Suppose

One thread

blocks.

Kernel thinks

whole process blocked.

All threads stop.

---

# Kernel-Level Thread (KLT)

Definition

Managed directly

by Kernel.

Diagram

```text
Kernel

↓

Thread1

Thread2

Thread3
```

Kernel knows

every thread.

---

### Characteristics

* Kernel aware
* Better scheduling
* One blocked thread does not stop all threads

---

### Disadvantage

More overhead.

Kernel involved.

---

# ULT vs KLT

Very Important.

| User-Level Thread                               | Kernel-Level Thread        |
| ----------------------------------------------- | -------------------------- |
| Managed by User Library                         | Managed by Kernel          |
| Kernel unaware                                  | Kernel aware               |
| Faster                                          | Slower                     |
| Less overhead                                   | More overhead              |
| Blocking one thread may block the whole process | Other threads can continue |

---

# Thread Operations

Tutorial mentions

3 operations.

---

# 1. Thread Creation

Create new thread.

Diagram

```text
Process

↓

Thread1

↓

Create

↓

Thread2
```

---

# 2. Thread Termination

Thread finishes.

Diagram

```text
Thread Running

↓

Completed

↓

Resources Released
```

---

# 3. Thread Join

Very Important.

Suppose

Thread A

must wait

until

Thread B finishes.

Diagram

```text
Thread A

↓

Waiting

↓

Thread B Finishes

↓

Thread A Continues
```

This is called

Thread Join.

---

# Process vs Thread ⭐⭐⭐⭐⭐

This is one of the most asked questions.

| Process                        | Thread                                         |
| ------------------------------ | ---------------------------------------------- |
| Heavyweight                    | Lightweight                                    |
| Own memory space               | Shared memory                                  |
| More resources                 | Fewer resources                                |
| Process switching is slower    | Thread switching is faster                     |
| Independent                    | Depends on process                             |
| Communication requires IPC     | Communication through shared memory            |
| If blocked, that process waits | Other threads of the same process can continue |

# Disadvantages

# IBPS SO IT Important Points

### Thread

* **Thread = Smallest unit of execution inside a process.**
* Also called a **Lightweight Process (LWP).**
* Every thread belongs to exactly **one process**.

### Shared by Threads

* **Code Segment**
* **Data Segment**
* **Open Files**

### Private to Each Thread

* **Thread ID**
* **Program Counter**
* **Registers**
* **Stack**

### Types

* **User-Level Threads (ULT)** → Managed by thread library; kernel unaware.
* **Kernel-Level Threads (KLT)** → Managed directly by the operating system kernel.

### Operations

* **Thread Creation**
* **Thread Termination**
* **Thread Join**

### Process vs Thread

* **Process** → Heavyweight, separate memory.
* **Thread** → Lightweight, shared memory, faster switching.

### Advantages

* Faster context switching
* Better responsiveness
* Efficient communication
* Improved CPU utilization
* Better parallelism on multi-core systems

### Disadvantages

* Race conditions due to shared memory
* Synchronization complexity
* Security risks
* Extra stack memory per thread

---

# Final One-Line Revision (Most Important)

```text
Program → Process → Threads

Thread = Smallest execution unit inside a process.

Threads share Code, Data, and Files but have their own Program Counter, Registers, and Stack.

Process = Heavyweight

Thread = Lightweight
```

---

# IBPS SO IT Exam Tips

The **highest-probability questions** from this topic are:

1. **What is a Thread?**

   * A lightweight process and the smallest unit of CPU execution.

2. **What resources are shared among threads?**

   * **Code, Data, and Open Files.**

3. **What resources are private to each thread?**

   * **Program Counter, Registers, Stack, and Thread ID.**

4. **Difference between Process and Thread.**

   * This is one of the **most frequently asked** conceptual questions.

5. **Difference between User-Level Threads and Kernel-Level Threads.**

   * **ULT:** Kernel unaware, managed in user space.
   * **KLT:** Kernel aware, managed by the operating system.
