# Operating System – Types of Threading (IBPS SO IT)

This chapter is an extension of the previous topic on **Threads**.

The **most important part** for IBPS SO IT is:

* User Level Thread (ULT)
* Kernel Level Thread (KLT)
* Difference between ULT and KLT ⭐⭐⭐⭐⭐

Many exams ask direct comparison questions from this topic.

---

# Quick Revision

Before starting,

remember:

A **Thread** is the **smallest unit of execution** inside a process.

Example

```text
Chrome Process

│
├── Tab 1
├── Tab 2
├── Download
└── Music
```

Each tab can be a separate thread.

---

# Types of Threads

There are only **2 types**.

```text
                Threads
                   │
         ┌─────────┴─────────┐
         │                   │
         ▼                   ▼
 User-Level Thread      Kernel-Level Thread
       (ULT)                  (KLT)
```

Everything in this chapter revolves around these two.

---

# First Understand User Space and Kernel Space

Before understanding ULT and KLT, understand these two terms.

## User Space

This is where

* Chrome
* MS Word
* VLC
* Notepad

run.

Applications execute here.

---

## Kernel Space

This is where the **Operating System** runs.

The kernel manages:

* CPU
* Memory
* Files
* Devices
* Threads
* Processes

Diagram

```text
+---------------------------+
|       User Space          |
| Chrome                    |
| Word                      |
| VLC                       |
+---------------------------+
|      Kernel Space         |
| Operating System Kernel   |
+---------------------------+
```

Remember:

* **User programs → User Space**
* **Operating System → Kernel Space**

---

# User-Level Thread (ULT)

## Definition

A **User-Level Thread (ULT)** is a thread that is **created and managed in User Space**.

The **Operating System kernel does not know** about these threads.

### Easy Definition

> **ULT = Managed by Thread Library, Kernel is unaware.**

---

# Diagram

```text
          User Space

        Application
             │
      Thread Library
      ┌─────┼─────┐
      ▼     ▼     ▼
    ULT1  ULT2  ULT3

             │
             ▼

         Kernel

   Thinks there is
   only ONE process
```

Notice

Kernel **cannot see**

ULT1

ULT2

ULT3.

It only sees

```text
One Process
```

---

# Who Manages ULT?

Not the OS.

A **Thread Library** manages it.

Examples

* POSIX Pthreads
* Java Green Threads
* GNU Pth

No need to memorize all examples for IBPS.

Just know:

> **Thread Library manages ULT.**

---

# Why is ULT Faster?

Suppose

Thread 1

↓

Thread 2

Switch.

No need

to ask the Operating System.

Thread Library

does it directly.

Diagram

```text
Thread 1

↓

Thread Library

↓

Thread 2
```

No Kernel.

So

Very Fast.

---

# Characteristics of ULT

* Managed in User Space.
* Kernel unaware.
* Fast creation.
* Fast switching.
* Uses Thread Library.

---

# Advantages of ULT

Tutorial gives four.

Let's understand.

---

## 1. Easy to Create

No Operating System call.

Just Thread Library.

Fast.

---

## 2. Fast Switching ⭐⭐⭐

No Kernel involvement.

Switching

↓

Very Fast.

---

## 3. Portable

Runs

on almost every OS.

Because

Kernel doesn't matter.

---

## 4. Application-Specific Scheduling

Application decides

which thread runs.

OS

doesn't interfere.

---

# Disadvantages of ULT

Very Important.

---

## 1. No Multiprocessing

Suppose

Computer

has

4 CPU Cores.

Kernel sees

only

one process.

It cannot run

multiple ULTs

on different cores.

Diagram

```text
4 CPU Cores

↓

Kernel sees

Only One Process
```

So

No real parallelism.

---

## 2. Blocking Problem ⭐⭐⭐⭐⭐

This is the biggest disadvantage.

Suppose

Thread 1

needs Disk.

Diagram

```text
Thread1

↓

Disk Waiting
```

Kernel thinks

Whole Process

is waiting.

Result

```text
Thread2

Blocked

Thread3

Blocked
```

Everything stops.

---

Diagram

```text
Process

├── Thread1 (Blocked)
├── Thread2 (Ready)
└── Thread3 (Ready)

Kernel

↓

Blocks Whole Process
```

Remember this.

---

# Kernel-Level Thread (KLT)

## Definition

Kernel-Level Threads are

**managed directly by the Operating System Kernel.**

Easy Definition

> **KLT = Kernel manages every thread individually.**

---

# Diagram

```text
        User Process

     ┌─────┼─────┐
     ▼     ▼     ▼
   KLT1  KLT2  KLT3

          │
          ▼

      Operating System
         Kernel

Knows every thread.
```

Unlike ULT,

Kernel knows

everything.

---

# Characteristics

* Kernel aware.
* Kernel manages scheduling.
* Kernel creates threads.
* Kernel switches threads.

---

# Advantages of KLT

Tutorial mentions three.

---

## 1. Multiprocessing ⭐⭐⭐⭐⭐

Suppose

CPU

has

4 cores.

Kernel sees

all threads.

Diagram

```text
Core1

Thread1

Core2

Thread2

Core3

Thread3

Core4

Thread4
```

Real Parallelism.

---

## 2. Blocking Problem Solved ⭐⭐⭐⭐⭐

Suppose

Thread1

waiting.

Diagram

```text
Thread1

Blocked

↓

Kernel

↓

Runs Thread2
```

Other threads continue.

Huge advantage.

---

## 3. Kernel Can Use Threads

Even

Operating System

can create

its own threads.

---

# Disadvantages of KLT

---

## 1. Slower

Kernel involved

every time.

Diagram

```text
Thread

↓

Kernel

↓

Thread
```

Extra work.

---

## 2. Mode Switching

Every thread switch

requires

Kernel Mode.

This adds overhead.

---

# ULT vs KLT ⭐⭐⭐⭐⭐

This table is **extremely important**.

| User-Level Thread (ULT)                        | Kernel-Level Thread (KLT)                 |
| ---------------------------------------------- | ----------------------------------------- |
| Managed by Thread Library                      | Managed by OS Kernel                      |
| Kernel unaware                                 | Kernel aware                              |
| Fast                                           | Slower                                    |
| Lightweight                                    | Heavyweight                               |
| No system calls required                       | System calls required                     |
| Cannot utilize multiple processors efficiently | Supports multiprocessing                  |
| If one thread blocks, entire process blocks    | Other threads continue even if one blocks |
| Low overhead                                   | High overhead                             |
| Scheduling by Thread Library                   | Scheduling by Kernel                      |

Memorize this comparison.

---

# Easy Diagram

## ULT

```text
User Space

Thread1

Thread2

Thread3

↓

Thread Library

↓

Kernel

Only sees one process.
```

---

## KLT

```text
Kernel

↓

Thread1

Thread2

Thread3

Kernel schedules
each thread.
```

---

# Real-Life Example

## User-Level Thread

Imagine

Company

has

three employees.

Manager

doesn't know

what each employee is doing.

Only

Team Leader

manages them.

Manager

↓

One Team

---

## Kernel-Level Thread

Manager

knows

every employee.

Can assign work

to each individually.

---

# Blocking Example

### ULT

```text
Thread1

Waiting

↓

Entire Process Stops
```

---

### KLT

```text
Thread1

Waiting

↓

Thread2 Runs

↓

Thread3 Runs
```

Huge difference.

---

# Multiprocessing Example

Suppose

4-Core CPU.

### ULT

Kernel sees

one process.

Only one core

may effectively execute it.

---

### KLT

Kernel sees

all threads.

Diagram

```text
CPU

Core1 → T1

Core2 → T2

Core3 → T3

Core4 → T4
```

Maximum performance.

---

# Memory Trick

## ULT

Remember

**U**

↓

**User**

↓

Thread Library

↓

Kernel Unaware

---

## KLT

Remember

**K**

↓

**Kernel**

↓

Kernel Aware

---

# Complete Mind Map

```text
                Threads
                    │
      ┌─────────────┴─────────────┐
      │                           │
      ▼                           ▼
 User-Level Thread          Kernel-Level Thread
      │                           │
      ▼                           ▼
 Thread Library             Kernel
      │                           │
      ▼                           ▼
 Fast                     Slower
 Kernel Unaware           Kernel Aware
 No Multiprocessing       Supports Multiprocessing
 Whole Process Blocks     Other Threads Continue
```

---

# Quick Comparison

| Feature          | ULT                  | KLT                       |
| ---------------- | -------------------- | ------------------------- |
| Managed By       | Thread Library       | Kernel                    |
| Kernel Awareness | No                   | Yes                       |
| Speed            | Faster               | Slower                    |
| Thread Switching | Faster               | Slower                    |
| Multiprocessing  | No                   | Yes                       |
| Blocking         | Whole process blocks | Only blocked thread waits |
| System Calls     | No                   | Yes                       |

---

# IBPS SO IT Important Points

### User-Level Thread (ULT)

* Managed in **User Space**.
* Managed by **Thread Library**.
* Kernel is **not aware** of threads.
* Faster creation and switching.
* No system calls required.
* Cannot effectively utilize multiple processors.
* If one thread blocks, the **entire process blocks**.

### Kernel-Level Thread (KLT)

* Managed in **Kernel Space**.
* Managed directly by the **Operating System Kernel**.
* Kernel is fully aware of all threads.
* Supports true multiprocessing.
* If one thread blocks, **other threads of the same process can continue**.
* Thread operations require **system calls**, making them slower.

---

# Final One-Line Revision (Most Important)

```text
ULT → User Space → Thread Library → Kernel Unaware → Faster → Whole Process Blocks

KLT → Kernel Space → Kernel Managed → Kernel Aware → Supports Multiprocessing → Other Threads Continue
```

---

# IBPS SO IT Exam Tips (Most Important Questions)

1. **Who manages User-Level Threads?**

   * **Thread Library (User Space).**

2. **Who manages Kernel-Level Threads?**

   * **Operating System Kernel.**

3. **If one User-Level Thread blocks, what happens?**

   * The **entire process blocks** because the kernel is unaware of individual threads.

4. **If one Kernel-Level Thread blocks, what happens?**

   * Only that thread blocks; **other threads continue executing**.

5. **Which thread type supports multiprocessing better?**

   * **Kernel-Level Threads (KLT)** because the kernel can schedule different threads on different CPU cores.

6. **Which is faster to create and switch?**

   * **User-Level Threads (ULT)** because no kernel involvement or system calls are required.
