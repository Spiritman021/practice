<body>
    <header>
        <a class="logo" href="../../index.html">Practice Hub</a>
        <div class="stats">
            <div class="pill" id="timer">00:00</div>
            <div class="pill" id="score-pill">Score: 0</div>
            <div class="pill" id="q-pill">Q: 0/0</div>
        </div>
    </header>
    <nav class="ph-breadcrumb" aria-label="Breadcrumb"><a href="../../index.html">🏠 Practice Hub</a><span class="sep">›</span><span class="current">Stroop Tap</span><a class="back-btn" href="../../index.html">← Back</a></nav>
    <main>
        <section class="panel" id="setup-panel">
            <h1>Stroop Tap</h1>
            <p>Tap the ink color, not the written word. This improves inhibition control and selective attention.</p>
            <div class="row">
                <div>
                    <label for="level-select">Level</label>
                    <select id="level-select">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div>
                    <label for="count-select">Questions</label>
                    <select id="count-select">
                        <option value="15">15</option>
                        <option value="25" selected>25</option>
                        <option value="40">40</option>
                    </select>
                </div>
            </div>
            <button id="start-btn" type="button">Start Task</button>
        </section>

        <section class="panel hidden" id="task-panel">
            <p>Choose the color used to paint the word.</p>
            <div class="word" id="word">BLUE</div>
            <div class="options" id="options"></div>
        </section>

        <section class="panel hidden" id="result-panel">
            <h2>Task Complete</h2>
            <div class="result-grid">
                <div class="box"><div class="val" id="score-result">0</div><div class="lbl">Score</div></div>
                <div class="box"><div class="val" id="correct-result">0</div><div class="lbl">Correct</div></div>
                <div class="box"><div class="val" id="accuracy-result">0%</div><div class="lbl">Accuracy</div></div>
                <div class="box"><div class="val" id="time-result">00:00</div><div class="lbl">Time</div></div>
            </div>
            <button id="again-btn" type="button">Start Again</button>
        </section>
    </main>
    <script>
        const colorMap = {
            red: '#ef4444',
            blue: '#3b82f6',
            green: '#22c55e',
            yellow: '#f59e0b',
            purple: '#a855f7',
            orange: '#f97316'
        };
        const labels = Object.keys(colorMap);
        const levelPools = {
            easy: ['red', 'blue', 'green', 'yellow'],
            medium: ['red', 'blue', 'green', 'yellow', 'purple'],
            hard: ['red', 'blue', 'green', 'yellow', 'purple', 'orange']
        };
        const setupPanel = document.getElementById('setup-panel');
        const taskPanel = document.getElementById('task-panel');
        const resultPanel = document.getElementById('result-panel');
        const wordEl = document.getElementById('word');
        const optionsEl = document.getElementById('options');
        const timerEl = document.getElementById('timer');
        const scorePill = document.getElementById('score-pill');
        const qPill = document.getElementById('q-pill');
        let questionCount = 25;
        let current = 0;
        let correct = 0;
        let score = 0;
        let startedAt = 0;
        let interval = null;
        let active = false;
        let currentAnswer = '';
        let level = 'medium';

        document.getElementById('start-btn').addEventListener('click', startTask);
        document.getElementById('again-btn').addEventListener('click', resetTask);

        function startTask() {
            level = document.getElementById('level-select').value;
            questionCount = parseInt(document.getElementById('count-select').value, 10);
            current = 0;
            correct = 0;
            score = 0;
            startedAt = performance.now();
            active = true;
            setupPanel.classList.add('hidden');
            resultPanel.classList.add('hidden');
            taskPanel.classList.remove('hidden');
            clearInterval(interval);
            interval = setInterval(updateTimer, 200);
            nextQuestion();
        }

        function nextQuestion() {
            if (!active) return;
            if (current >= questionCount) {
                finishTask();
                return;
            }
            current++;
            const pool = levelPools[level];
            const wordLabel = pick(pool);
            const inkColor = pick(pool.filter(item => item !== wordLabel));
            currentAnswer = inkColor;
            wordEl.textContent = wordLabel.toUpperCase();
            wordEl.style.color = colorMap[inkColor];
            renderOptions(pool);
            updateTop();
        }

        function renderOptions(pool) {
            optionsEl.innerHTML = '';
            const hideLabel = level === 'hard';
            shuffle([...pool]).forEach(name => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'opt-btn';
                btn.textContent = hideLabel ? '' : name.toUpperCase();
                btn.setAttribute('aria-label', name.toUpperCase());
                btn.style.background = colorMap[name];
                if (hideLabel) {
                    btn.style.fontSize = '0';
                } else {
                    btn.style.fontSize = '1rem';
                }
                btn.addEventListener('click', () => answer(btn, name));
                optionsEl.appendChild(btn);
            });
        }

        function answer(button, selected) {
            if (!active) return;
            const isRight = selected === currentAnswer;
            if (isRight) {
                correct++;
                score += 1;
                button.classList.add('correct');
            } else {
                score -= 0.25;
                button.classList.add('wrong');
            }
            updateTop();
            active = false;
            setTimeout(() => {
                active = true;
                nextQuestion();
            }, 220);
        }

        function finishTask() {
            clearInterval(interval);
            active = false;
            taskPanel.classList.add('hidden');
            resultPanel.classList.remove('hidden');
            const elapsed = performance.now() - startedAt;
            const accuracy = Math.round((correct / questionCount) * 100);
            timerEl.textContent = formatClock(elapsed);
            document.getElementById('score-result').textContent = score.toFixed(2);
            document.getElementById('correct-result').textContent = `${correct}/${questionCount}`;
            document.getElementById('accuracy-result').textContent = `${accuracy}%`;
            document.getElementById('time-result').textContent = formatClock(elapsed);
        }

        function resetTask() {
            resultPanel.classList.add('hidden');
            setupPanel.classList.remove('hidden');
            timerEl.textContent = '00:00';
            scorePill.textContent = 'Score: 0';
            qPill.textContent = 'Q: 0/0';
        }

        function updateTop() {
            scorePill.textContent = `Score: ${score.toFixed(2)}`;
            qPill.textContent = `Q: ${current}/${questionCount}`;
        }

        function updateTimer() {
            timerEl.textContent = formatClock(performance.now() - startedAt);
        }

        function pick(items) {
            return items[Math.floor(Math.random() * items.length)];
        }

        function shuffle(items) {
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [items[i], items[j]] = [items[j], items[i]];
            }
            return items;
        }

        function formatClock(ms) {
            const sec = Math.floor(ms / 1000);
            return `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('../../sw.js').catch(console.log));
        }
    </script>
<script src="../../ask-ai.js" defer></script>
