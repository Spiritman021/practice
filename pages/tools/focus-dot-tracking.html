<body>
    <header><a class="logo" href="../../index.html">Practice Hub</a><div class="timer" id="timer">00:00</div></header>
    <nav class="ph-breadcrumb" aria-label="Breadcrumb"><a href="../../index.html">🏠 Practice Hub</a><span class="sep">›</span><span class="current">Dot Tracking</span><a class="back-btn" href="../../index.html">← Back</a></nav>
    <main>
        <canvas id="track-canvas"></canvas>
        <section class="panel" id="setup-panel">
            <h1>Dot Tracking</h1>
            <p>Follow the moving dot with your eyes only. Keep your head still and attention steady.</p>
            <div class="row">
                <div><label for="duration-select">Duration</label><select id="duration-select"><option value="60">1 minute</option><option value="120" selected>2 minutes</option><option value="300">5 minutes</option><option value="600">10 minutes</option></select></div>
                <div><label for="speed-select">Speed</label><select id="speed-select"><option value="slow" selected>Slow</option><option value="medium">Medium</option><option value="fast">Fast</option></select></div>
            </div>
            <button id="start-btn" type="button">Start Task</button>
        </section>
        <section class="panel hidden" id="result-panel">
            <h2>Tracking Complete</h2>
            <p>Good visual focus.</p>
            <div class="result-grid">
                <div class="result-box"><div class="result-value" id="planned-time">00:00</div><div class="result-label">Planned</div></div>
                <div class="result-box"><div class="result-value" id="actual-time">00:00</div><div class="result-label">Focused</div></div>
            </div>
            <button id="again-btn" type="button">Start Again</button>
        </section>
    </main>
    <script>
        const canvas = document.getElementById('track-canvas');
        const ctx = canvas.getContext('2d');
        const timer = document.getElementById('timer');
        const setupPanel = document.getElementById('setup-panel');
        const resultPanel = document.getElementById('result-panel');
        let durationMs = 0, startedAt = 0, animationId = 0, active = false, speed = 0.00035;
        document.getElementById('start-btn').addEventListener('click', startTask);
        document.getElementById('again-btn').addEventListener('click', resetTask);
        window.addEventListener('resize', resize);
        resize();
        draw(0);

        function startTask() {
            durationMs = parseInt(document.getElementById('duration-select').value, 10) * 1000;
            speed = { slow: 0.00035, medium: 0.00055, fast: 0.0008 }[document.getElementById('speed-select').value];
            startedAt = performance.now();
            active = true;
            setupPanel.classList.add('hidden');
            resultPanel.classList.add('hidden');
            cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(loop);
        }

        function loop(now) {
            draw(now);
            if (active) {
                const elapsed = performance.now() - startedAt;
                const remaining = Math.max(0, durationMs - elapsed);
                timer.textContent = formatClock(remaining);
                if (remaining <= 0) return finishTask();
            }
            animationId = requestAnimationFrame(loop);
        }

        function draw(now) {
            const w = canvas.clientWidth, h = canvas.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.34)';
            ctx.lineWidth = 1;
            for (let x = 0; x < w; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
            for (let y = 0; y < h; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
            const t = now * speed;
            const x = w / 2 + Math.sin(t * 1.7) * w * 0.34;
            const y = h / 2 + Math.sin(t * 2.3 + 1.2) * h * 0.32;
            ctx.beginPath();
            ctx.arc(x, y, 13, 0, Math.PI * 2);
            ctx.fillStyle = '#38bdf8';
            ctx.shadowColor = '#38bdf8';
            ctx.shadowBlur = 24;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }

        function finishTask() {
            active = false;
            cancelAnimationFrame(animationId);
            const elapsed = Math.min(durationMs, performance.now() - startedAt);
            timer.textContent = '00:00';
            document.getElementById('planned-time').textContent = formatClock(durationMs);
            document.getElementById('actual-time').textContent = formatClock(elapsed);
            resultPanel.classList.remove('hidden');
            draw(performance.now());
        }

        function resetTask() {
            resultPanel.classList.add('hidden');
            setupPanel.classList.remove('hidden');
            timer.textContent = '00:00';
        }

        function resize() {
            const scale = window.devicePixelRatio || 1;
            canvas.width = Math.floor(canvas.clientWidth * scale);
            canvas.height = Math.floor(canvas.clientHeight * scale);
            ctx.setTransform(scale, 0, 0, scale, 0, 0);
        }
        function formatClock(ms) { const total = Math.ceil(ms / 1000); return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`; }
        if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('../../sw.js').catch(console.log));
    </script>
