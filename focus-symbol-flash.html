<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Practice Hub tools for government job preparation: multiplication, division, tables, mock tests, and focus exercises.">
    <meta name="keywords" content="government job preparation, SSC, bank exam, railway exam, multiplication tables, mock test, focus practice">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Symbol Scan Focus Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; color: #f8fafc; background: linear-gradient(135deg, #111827, #020617); }
        header { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(2,6,23,0.88); border-bottom: 1px solid rgba(255,255,255,0.12); }
        .logo { color: #fff; text-decoration: none; font-weight: 800; }
        .stats { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill { border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 7px 10px; color: rgba(255,255,255,0.78); font-size: 0.8rem; font-weight: 800; }
        main { min-height: calc(100vh - 59px); display: grid; place-items: center; padding: 18px; background: radial-gradient(circle at center, #111827, #020617 72%); }
        .panel { width: min(780px, 100%); background: rgba(15,23,42,0.92); border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; padding: 18px; box-shadow: 0 20px 50px rgba(0,0,0,0.28); }
        .hidden { display: none; }
        h1, h2, p { margin-top: 0; }
        p { color: #cbd5e1; line-height: 1.55; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .level-note { color: #a7f3d0; font-size: 0.88rem; font-weight: 800; margin: -4px 0 14px; min-height: 22px; }
        label { display: block; color: #cbd5e1; font-size: 0.8rem; font-weight: 800; margin-bottom: 6px; }
        select, button { width: 100%; min-height: 42px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); font: inherit; font-weight: 800; padding: 9px 10px; }
        button { cursor: pointer; background: #fff; color: #020617; }
        .target { text-align: center; font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 800; margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .cell { aspect-ratio: 1; border-radius: 12px; background: #fff; color: #111827; font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 800; display: grid; place-items: center; border: 3px solid transparent; user-select: none; }
        .cell.alpha { background: #dbeafe; }
        .cell.number { background: #dcfce7; }
        .cell.symbol { background: #fef3c7; }
        .cell.done { background: #22c55e; color: #fff; }
        .cell.wrong { border-color: #ef4444; background: #fecaca; }
        .result-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 14px 0; }
        .result-box { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; }
        .result-value { font-size: 1.45rem; font-weight: 800; }
        .result-label { color: #cbd5e1; font-size: 0.78rem; font-weight: 800; margin-top: 4px; }
        @media (max-width: 700px) {
            header { align-items: flex-start; flex-direction: column; }
            main { padding: 12px; }
            .row, .result-grid { grid-template-columns: 1fr; }
            .grid { gap: 7px; }
            .panel { padding: 14px; }
            .cell { border-radius: 10px; }
        }
    
        body { color: #1f2937 !important; background: #f8fafc !important; }
        header { background: #ffffff !important; border-bottom: 1px solid #e5e7eb !important; }
        .logo { color: #2563eb !important; }
        .pill, .timer { color: #334155 !important; border-color: #cbd5e1 !important; background: #f8fafc !important; }
        .panel { background: #ffffff !important; border: 1px solid #e5e7eb !important; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08) !important; }
        p, label, .result-label, .lbl { color: #475569 !important; }
        main { background: transparent !important; }
    </style>
</head>

<body>
    <header>
        <a class="logo" href="index.html">Practice Hub</a>
        <div class="stats">
            <div class="pill" id="timer">00:00</div>
            <div class="pill" id="score-pill">Hits: 0</div>
            <div class="pill" id="target-pill">Target: -</div>
        </div>
    </header>
    <main>
        <section class="panel" id="setup-panel">
            <h1>Symbol Scan</h1>
            <p>Random alphabets, numbers, and symbols will appear in a grid. Read the target and tap the matching tile.</p>
            <div class="row">
                <div>
                    <label for="level-select">Level</label>
                    <select id="level-select">
                        <option value="beginner">Beginner</option>
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>
                <div>
                    <label for="rounds-select">Rounds</label>
                    <select id="rounds-select">
                        <option value="auto" selected>Auto by level</option>
                        <option value="1">1 round</option>
                        <option value="3">3 rounds</option>
                        <option value="5">5 rounds</option>
                        <option value="7">7 rounds</option>
                    </select>
                </div>
            </div>
            <div class="level-note" id="level-note"></div>
            <button id="start-btn" type="button">Start Task</button>
        </section>

        <section class="panel hidden" id="task-panel">
            <div class="target" id="target">Tap A</div>
            <div class="grid" id="grid"></div>
        </section>

        <section class="panel hidden" id="result-panel">
            <h2>Scan Complete</h2>
            <p>Review your focus result.</p>
            <div class="result-grid">
                <div class="result-box"><div class="result-value" id="time-result">00:00</div><div class="result-label">Time</div></div>
                <div class="result-box"><div class="result-value" id="mistake-result">0</div><div class="result-label">Mistakes</div></div>
                <div class="result-box"><div class="result-value" id="accuracy-result">100%</div><div class="result-label">Tap Accuracy</div></div>
                <div class="result-box"><div class="result-value" id="round-result">0</div><div class="result-label">Level / Rounds</div></div>
            </div>
            <button id="again-btn" type="button">Start Again</button>
        </section>
    </main>

    <script>
        const setupPanel = document.getElementById('setup-panel');
        const taskPanel = document.getElementById('task-panel');
        const resultPanel = document.getElementById('result-panel');
        const grid = document.getElementById('grid');
        const timer = document.getElementById('timer');
        const scorePill = document.getElementById('score-pill');
        const targetPill = document.getElementById('target-pill');
        const targetText = document.getElementById('target');
        const symbols = ['#', '@', '&', '%', '$', '+', '?', '*', '=', '!', '~'];
        const alphabets = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const numbers = '0123456789'.split('');
        const levels = {
            beginner: { label: 'Beginner', size: 9, rounds: 1, pool: 'alphaNumber', reverse: false, note: '3 x 3 grid, 1 round, alphabets and numbers.' },
            easy: { label: 'Easy', size: 16, rounds: 1, pool: 'alphaNumber', reverse: false, note: '4 x 4 grid, 1 round, alphabets and numbers.' },
            medium: { label: 'Medium', size: 25, rounds: 3, pool: 'all', reverse: false, note: '5 x 5 grid, 3 rounds, symbols, alphabets, and numbers.' },
            hard: { label: 'Hard', size: 25, rounds: 5, pool: 'all', reverse: true, note: '5 x 5 grid, 5 rounds. Target order reverses every round.' },
            expert: { label: 'Expert', size: 36, rounds: 5, pool: 'all', reverse: true, note: '6 x 6 grid, 5 rounds. Larger mixed grid with changing order.' }
        };
        let activeLevel = levels.medium;
        let size = 25;
        let rounds = 3;
        let round = 1;
        let sequence = [];
        let targetIndex = 0;
        let hits = 0;
        let mistakes = 0;
        let startedAt = 0;
        let interval = null;

        document.getElementById('start-btn').addEventListener('click', startTask);
        document.getElementById('again-btn').addEventListener('click', resetTask);
        document.getElementById('level-select').addEventListener('change', updateLevelNote);
        updateLevelNote();

        function startTask() {
            activeLevel = levels[document.getElementById('level-select').value];
            size = activeLevel.size;
            const selectedRounds = document.getElementById('rounds-select').value;
            rounds = selectedRounds === 'auto' ? activeLevel.rounds : parseInt(selectedRounds, 10);
            round = 1;
            targetIndex = 0;
            hits = 0;
            mistakes = 0;
            startedAt = performance.now();
            setupPanel.classList.add('hidden');
            resultPanel.classList.add('hidden');
            taskPanel.classList.remove('hidden');
            clearInterval(interval);
            interval = setInterval(updateTimer, 250);
            buildGrid();
            updateLabels();
        }

        function buildGrid() {
            const columns = Math.sqrt(size);
            const values = shuffle(getPool()).slice(0, size);
            sequence = makeTargetSequence(values);
            targetIndex = 0;
            grid.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
            grid.innerHTML = '';
            values.forEach(value => {
                const cell = document.createElement('button');
                cell.className = `cell ${getType(value)}`;
                cell.textContent = value;
                cell.type = 'button';
                cell.addEventListener('click', () => handleTap(cell, value));
                grid.appendChild(cell);
            });
        }

        function handleTap(cell, value) {
            if (cell.classList.contains('done')) return;
            if (value === sequence[targetIndex]) {
                hits++;
                cell.classList.add('done');
                cell.disabled = true;
                targetIndex++;
                if (targetIndex >= sequence.length) {
                    if (round >= rounds) return finishTask();
                    round++;
                    buildGrid();
                }
            } else {
                mistakes++;
                cell.classList.add('wrong');
                setTimeout(() => cell.classList.remove('wrong'), 220);
            }
            updateLabels();
        }

        function finishTask() {
            clearInterval(interval);
            taskPanel.classList.add('hidden');
            resultPanel.classList.remove('hidden');
            const elapsed = performance.now() - startedAt;
            const attempts = hits + mistakes;
            const accuracy = attempts ? Math.round((hits / attempts) * 100) : 0;
            timer.textContent = formatClock(elapsed);
            document.getElementById('time-result').textContent = formatClock(elapsed);
            document.getElementById('mistake-result').textContent = mistakes;
            document.getElementById('accuracy-result').textContent = `${accuracy}%`;
            document.getElementById('round-result').textContent = `${activeLevel.label} / ${rounds}`;
            targetPill.textContent = 'Complete';
        }

        function resetTask() {
            resultPanel.classList.add('hidden');
            setupPanel.classList.remove('hidden');
            grid.innerHTML = '';
            timer.textContent = '00:00';
            scorePill.textContent = 'Hits: 0';
            targetPill.textContent = 'Target: -';
        }

        function updateLabels() {
            const nextTarget = sequence[targetIndex] || '-';
            targetText.textContent = `Tap ${nextTarget}`;
            scorePill.textContent = `Hits: ${hits}`;
            targetPill.textContent = `${activeLevel.label} · Round ${round}/${rounds} · Target ${targetIndex + 1}/${size}`;
        }

        function updateLevelNote() {
            const level = levels[document.getElementById('level-select').value];
            document.getElementById('level-note').textContent = level.note;
        }

        function updateTimer() {
            timer.textContent = formatClock(performance.now() - startedAt);
        }

        function shouldReverseRound() {
            return activeLevel.reverse && round % 2 === 0;
        }

        function makeTargetSequence(values) {
            const randomized = shuffle(values);
            return shouldReverseRound() ? randomized.reverse() : randomized;
        }

        function getPool() {
            if (activeLevel.pool === 'alphaNumber') return [...alphabets, ...numbers];
            return [...symbols, ...alphabets, ...numbers];
        }

        function getType(value) {
            if (numbers.includes(value)) return 'number';
            if (alphabets.includes(value)) return 'alpha';
            return 'symbol';
        }

        function shuffle(items) {
            const copy = [...items];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function formatClock(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            return `${String(Math.floor(totalSeconds / 60)).padStart(2, '0')}:${String(totalSeconds % 60).padStart(2, '0')}`;
        }

        if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(console.log));
    </script>
</body>

</html>
