<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Peripheral Tap Focus Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: 'Outfit', sans-serif; color: #f1f5f9; background: radial-gradient(circle at center, #1f2937 0%, #0b0b0b 68%); }
        header { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.45); }
        .logo { color: #fff; text-decoration: none; font-weight: 800; }
        .stats { display: flex; gap: 8px; flex-wrap: wrap; }
        .pill { border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; padding: 6px 10px; font-weight: 700; font-size: 0.78rem; color: #d1d5db; }
        main { min-height: calc(100vh - 56px); display: grid; place-items: center; padding: 14px; }
        .panel { width: min(860px, 100%); background: rgba(8,8,8,0.82); border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; padding: 16px; }
        h1, h2, p { margin-top: 0; }
        p { color: #9ca3af; line-height: 1.5; }
        .hidden { display: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; font-weight: 700; color: #cbd5e1; }
        select, button { width: 100%; min-height: 42px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); font: inherit; font-weight: 700; padding: 8px 10px; }
        button { cursor: pointer; background: #f8fafc; color: #0f172a; }
        .task-wrap { position: relative; min-height: 66vh; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: radial-gradient(circle at center, #121212 0%, #050505 75%); overflow: hidden; }
        .center-lock {
            position: absolute;
            inset: 50% auto auto 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            aspect-ratio: 1;
            border-radius: 999px;
            border: 3px solid #f59e0b;
            display: grid;
            place-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: #fbbf24;
            background: rgba(245,158,11,0.12);
            pointer-events: none;
        }
        .orb {
            position: absolute;
            width: clamp(44px, 7vw, 66px);
            aspect-ratio: 1;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            font-weight: 800;
            font-size: clamp(1.1rem, 2.2vw, 1.45rem);
            display: grid;
            place-items: center;
        }
        .orb.target { background: #16a34a; }
        .orb.trap { background: #dc2626; }
        .result-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 12px 0; }
        .box { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 10px; }
        .val { font-size: 1.35rem; font-weight: 800; }
        .lbl { color: #9ca3af; font-size: 0.78rem; font-weight: 700; }
        @media (max-width: 700px) {
            header { flex-direction: column; align-items: flex-start; }
            .row, .result-grid { grid-template-columns: 1fr; }
            .task-wrap { min-height: 62vh; }
            .center-lock { width: 96px; font-size: 1.7rem; }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="index.html">Practice Hub</a>
        <div class="stats">
            <div class="pill" id="timer">00:00</div>
            <div class="pill" id="score-pill">Score: 0</div>
            <div class="pill" id="life-pill">Lives: 0</div>
        </div>
    </header>
    <main>
        <section class="panel" id="setup-panel">
            <h1>Peripheral Tap</h1>
            <p>Keep eyes on the center. Tap only matching targets appearing around the edges. Ignore traps.</p>
            <div class="row">
                <div>
                    <label for="level-select">Level</label>
                    <select id="level-select">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div>
                    <label for="duration-select">Duration</label>
                    <select id="duration-select">
                        <option value="60">1 min</option>
                        <option value="90" selected>1.5 min</option>
                        <option value="120">2 min</option>
                    </select>
                </div>
            </div>
            <button id="start-btn" type="button">Start Task</button>
        </section>

        <section class="panel hidden" id="task-panel">
            <div class="task-wrap" id="task-wrap">
                <div class="center-lock" id="center-lock">A</div>
            </div>
        </section>

        <section class="panel hidden" id="result-panel">
            <h2>Task Complete</h2>
            <div class="result-grid">
                <div class="box"><div class="val" id="score-result">0</div><div class="lbl">Score</div></div>
                <div class="box"><div class="val" id="hit-result">0</div><div class="lbl">Hits</div></div>
                <div class="box"><div class="val" id="miss-result">0</div><div class="lbl">Mistakes</div></div>
                <div class="box"><div class="val" id="time-result">00:00</div><div class="lbl">Time</div></div>
            </div>
            <button id="again-btn" type="button">Start Again</button>
        </section>
    </main>
    <script>
        const setupPanel = document.getElementById('setup-panel');
        const taskPanel = document.getElementById('task-panel');
        const resultPanel = document.getElementById('result-panel');
        const taskWrap = document.getElementById('task-wrap');
        const centerLock = document.getElementById('center-lock');
        const timerEl = document.getElementById('timer');
        const scorePill = document.getElementById('score-pill');
        const lifePill = document.getElementById('life-pill');
        const levelSettings = {
            easy: { gap: 1200, lifetime: 1200, lives: 5, traps: 0.25 },
            medium: { gap: 950, lifetime: 950, lives: 4, traps: 0.35 },
            hard: { gap: 700, lifetime: 720, lives: 3, traps: 0.45 }
        };
        const pool = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'.split('');
        const edgeZones = [
            { x1: 4, x2: 18, y1: 8, y2: 92 },
            { x1: 82, x2: 96, y1: 8, y2: 92 },
            { x1: 20, x2: 80, y1: 4, y2: 20 },
            { x1: 20, x2: 80, y1: 80, y2: 96 }
        ];
        let level = 'medium';
        let duration = 90;
        let lives = 4;
        let hits = 0;
        let mistakes = 0;
        let score = 0;
        let active = false;
        let startedAt = 0;
        let spawnTimer = null;
        let clockTimer = null;
        let activeOrbs = [];
        let targetChar = 'A';

        document.getElementById('start-btn').addEventListener('click', startTask);
        document.getElementById('again-btn').addEventListener('click', resetTask);

        function startTask() {
            level = document.getElementById('level-select').value;
            duration = parseInt(document.getElementById('duration-select').value, 10);
            lives = levelSettings[level].lives;
            hits = 0;
            mistakes = 0;
            score = 0;
            targetChar = pick(pool);
            centerLock.textContent = targetChar;
            startedAt = performance.now();
            active = true;
            setupPanel.classList.add('hidden');
            resultPanel.classList.add('hidden');
            taskPanel.classList.remove('hidden');
            clearArea();
            updateTop();
            clearInterval(clockTimer);
            clockTimer = setInterval(updateTimer, 150);
            scheduleSpawn();
            setTimeout(finishTask, duration * 1000);
        }

        function scheduleSpawn() {
            if (!active) return;
            const cfg = levelSettings[level];
            spawnOrb(Math.random() < cfg.traps);
            spawnTimer = setTimeout(scheduleSpawn, cfg.gap);
        }

        function spawnOrb(isTrap) {
            const orb = document.createElement('button');
            const char = isTrap ? pick(pool.filter(item => item !== targetChar)) : targetChar;
            const zone = pick(edgeZones);
            const x = random(zone.x1, zone.x2);
            const y = random(zone.y1, zone.y2);
            orb.type = 'button';
            orb.className = `orb ${isTrap ? 'trap' : 'target'}`;
            orb.textContent = char;
            orb.style.left = `${x}%`;
            orb.style.top = `${y}%`;
            orb.style.transform = 'translate(-50%, -50%)';
            orb.addEventListener('click', () => onOrbTap(isTrap, orb));
            taskWrap.appendChild(orb);
            activeOrbs.push(orb);
            const lifetime = levelSettings[level].lifetime;
            setTimeout(() => {
                if (orb.isConnected) {
                    if (!isTrap) {
                        mistakes++;
                        lives--;
                        updateTop();
                        if (lives <= 0) finishTask();
                    }
                    removeOrb(orb);
                }
            }, lifetime);
        }

        function onOrbTap(isTrap, orb) {
            if (!active) return;
            if (isTrap) {
                mistakes++;
                lives--;
                score -= 1;
            } else {
                hits++;
                score += 2;
            }
            updateTop();
            removeOrb(orb);
            if (lives <= 0) finishTask();
        }

        function removeOrb(orb) {
            activeOrbs = activeOrbs.filter(item => item !== orb);
            if (orb.isConnected) orb.remove();
        }

        function clearArea() {
            activeOrbs.forEach(orb => orb.remove());
            activeOrbs = [];
        }

        function finishTask() {
            if (!active) return;
            active = false;
            clearTimeout(spawnTimer);
            clearInterval(clockTimer);
            clearArea();
            taskPanel.classList.add('hidden');
            resultPanel.classList.remove('hidden');
            const elapsed = Math.min(duration * 1000, performance.now() - startedAt);
            timerEl.textContent = formatClock(elapsed);
            document.getElementById('score-result').textContent = score;
            document.getElementById('hit-result').textContent = hits;
            document.getElementById('miss-result').textContent = mistakes;
            document.getElementById('time-result').textContent = formatClock(elapsed);
        }

        function resetTask() {
            resultPanel.classList.add('hidden');
            setupPanel.classList.remove('hidden');
            timerEl.textContent = '00:00';
            scorePill.textContent = 'Score: 0';
            lifePill.textContent = 'Lives: 0';
        }

        function updateTop() {
            scorePill.textContent = `Score: ${score}`;
            lifePill.textContent = `Lives: ${lives}`;
        }

        function updateTimer() {
            const elapsed = performance.now() - startedAt;
            timerEl.textContent = formatClock(elapsed);
        }

        function random(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function pick(items) {
            return items[Math.floor(Math.random() * items.length)];
        }

        function formatClock(ms) {
            const sec = Math.floor(ms / 1000);
            return `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(console.log));
        }
    </script>
</body>
</html>
