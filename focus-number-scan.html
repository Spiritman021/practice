<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Number Scan Focus Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; color: #f8fafc; background: linear-gradient(135deg, #111827, #020617); }
        header { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(2,6,23,0.88); border-bottom: 1px solid rgba(255,255,255,0.12); }
        .logo { color: #fff; text-decoration: none; font-weight: 800; }
        .stats { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill { border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 7px 10px; color: rgba(255,255,255,0.78); font-size: 0.8rem; font-weight: 800; }
        main { min-height: calc(100vh - 59px); display: grid; place-items: center; padding: 18px; }
        .panel { width: min(740px, 100%); background: rgba(15,23,42,0.92); border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; padding: 18px; box-shadow: 0 20px 50px rgba(0,0,0,0.28); }
        .hidden { display: none; }
        h1, h2, p { margin-top: 0; }
        p { color: #cbd5e1; line-height: 1.55; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        label { display: block; color: #cbd5e1; font-size: 0.8rem; font-weight: 800; margin-bottom: 6px; }
        select, button { width: 100%; min-height: 42px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); font: inherit; font-weight: 800; padding: 9px 10px; }
        button { cursor: pointer; background: #fff; color: #020617; }
        .target { text-align: center; font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 800; margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .cell { aspect-ratio: 1; border-radius: 12px; background: #fff; color: #111827; font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 800; display: grid; place-items: center; border: 3px solid transparent; }
        .cell.done { background: #22c55e; color: #fff; }
        .cell.wrong { border-color: #ef4444; }
        .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0; }
        .result-box { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; }
        .result-value { font-size: 1.45rem; font-weight: 800; }
        .result-label { color: #cbd5e1; font-size: 0.78rem; font-weight: 800; margin-top: 4px; }
        @media (max-width: 700px) { header { align-items: flex-start; flex-direction: column; } .row, .result-grid { grid-template-columns: 1fr; } .grid { gap: 7px; } .panel { padding: 14px; } }
    </style>
</head>

<body>
    <header><a class="logo" href="index.html">Practice Hub</a><div class="stats"><div class="pill" id="timer">00:00</div><div class="pill" id="progress">Target: -</div></div></header>
    <main>
        <section class="panel" id="setup-panel">
            <h1>Number Scan</h1>
            <p>Find numbers in order from 1 to 25. This trains visual scanning, attention switching, and calm speed.</p>
            <div class="row">
                <div><label for="rounds-select">Rounds</label><select id="rounds-select"><option value="1">1 round</option><option value="3" selected>3 rounds</option><option value="5">5 rounds</option></select></div>
                <div><label for="size-select">Grid</label><select id="size-select"><option value="16">4 x 4</option><option value="25" selected>5 x 5</option></select></div>
            </div>
            <button id="start-btn" type="button">Start Task</button>
        </section>
        <section class="panel hidden" id="task-panel">
            <div class="target" id="target">Tap 1</div>
            <div class="grid" id="grid"></div>
        </section>
        <section class="panel hidden" id="result-panel">
            <h2>Scan Complete</h2>
            <p>Review your focus result.</p>
            <div class="result-grid">
                <div class="result-box"><div class="result-value" id="time-result">00:00</div><div class="result-label">Time</div></div>
                <div class="result-box"><div class="result-value" id="mistake-result">0</div><div class="result-label">Mistakes</div></div>
                <div class="result-box"><div class="result-value" id="round-result">0</div><div class="result-label">Rounds</div></div>
            </div>
            <button id="again-btn" type="button">Start Again</button>
        </section>
    </main>
    <script>
        const setupPanel = document.getElementById('setup-panel');
        const taskPanel = document.getElementById('task-panel');
        const resultPanel = document.getElementById('result-panel');
        const grid = document.getElementById('grid');
        const timer = document.getElementById('timer');
        const progress = document.getElementById('progress');
        let size = 25, rounds = 3, round = 1, target = 1, mistakes = 0, startedAt = 0, interval = null;
        document.getElementById('start-btn').addEventListener('click', startTask);
        document.getElementById('again-btn').addEventListener('click', resetTask);

        function startTask() {
            size = parseInt(document.getElementById('size-select').value, 10);
            rounds = parseInt(document.getElementById('rounds-select').value, 10);
            round = 1; target = 1; mistakes = 0; startedAt = performance.now();
            setupPanel.classList.add('hidden'); resultPanel.classList.add('hidden'); taskPanel.classList.remove('hidden');
            clearInterval(interval); interval = setInterval(updateTimer, 250);
            buildGrid();
            updateLabels();
        }

        function buildGrid() {
            grid.style.gridTemplateColumns = `repeat(${Math.sqrt(size)}, 1fr)`;
            grid.innerHTML = '';
            shuffle(Array.from({ length: size }, (_, i) => i + 1)).forEach(number => {
                const cell = document.createElement('button');
                cell.className = 'cell';
                cell.textContent = number;
                cell.addEventListener('click', () => handleTap(cell, number));
                grid.appendChild(cell);
            });
        }

        function handleTap(cell, number) {
            if (number === target) {
                cell.classList.add('done');
                target++;
                if (target > size) {
                    if (round >= rounds) return finishTask();
                    round++;
                    target = 1;
                    buildGrid();
                }
            } else {
                mistakes++;
                cell.classList.add('wrong');
                setTimeout(() => cell.classList.remove('wrong'), 220);
            }
            updateLabels();
        }

        function updateLabels() {
            document.getElementById('target').textContent = `Tap ${target}`;
            progress.textContent = `Round ${round}/${rounds} · Target ${target}`;
        }

        function finishTask() {
            clearInterval(interval);
            taskPanel.classList.add('hidden');
            resultPanel.classList.remove('hidden');
            const elapsed = performance.now() - startedAt;
            document.getElementById('time-result').textContent = formatClock(elapsed);
            document.getElementById('mistake-result').textContent = mistakes;
            document.getElementById('round-result').textContent = rounds;
        }

        function resetTask() {
            resultPanel.classList.add('hidden');
            setupPanel.classList.remove('hidden');
            timer.textContent = '00:00';
            progress.textContent = 'Target: -';
        }

        function updateTimer() { timer.textContent = formatClock(performance.now() - startedAt); }
        function shuffle(items) { for (let i = items.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [items[i], items[j]] = [items[j], items[i]]; } return items; }
        function formatClock(ms) { const total = Math.floor(ms / 1000); return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`; }
        if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(console.log));
    </script>
</body>

</html>
