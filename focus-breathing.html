        body {

        header {

            justify-content: space-between;
            align-items: center;

            padding: 14px 18px;
            background: rgba(2, 6, 23, 0.82);

        .logo { color: #fff; text-decoration: none; font-weight: 800; }

        main {
            height: calc(100vh - 59px);
            display: grid;
            place-items: center;
            position: relative;
            padding: 18px;
        }
        .panel {
            position: absolute;
            left: 18px;
            top: 18px;
            width: min(360px, calc(100% - 36px));
            background: rgba(2, 6, 23, 0.82);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 12px;
            padding: 16px;
            z-index: 3;
        }
        .panel.hidden { display: none; }
        h1, h2, p { margin-top: 0; }
        h1 { font-size: 1.35rem; margin-bottom: 8px; }
        p { color: #cbd5e1; line-height: 1.5; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        label { display: block; color: #cbd5e1; font-size: 0.8rem; font-weight: 800; margin-bottom: 6px; }
        select, input, button {
            width: 100%;

            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.22);
            font: inherit;
            font-weight: 800;
            padding: 9px 10px;
        }
        button { cursor: pointer; background: #fff; color: #020617; }
        .breath-area {
            display: grid;
            place-items: center;
            gap: 26px;
            text-align: center;
        }
        .breath-circle {
            width: min(42vw, 320px);
            aspect-ratio: 1;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(125,211,252,0.88));
            box-shadow: 0 0 60px rgba(125,211,252,0.45);
            transform: scale(0.58);
            transition: transform 4s ease-in-out;
        }
        .breath-circle.inhale { transform: scale(1); }
        .breath-circle.hold { transform: scale(1); }
        .breath-circle.exhale { transform: scale(0.58); }
        .cue {
            font-size: clamp(2.2rem, 8vw, 5rem);

<body>
    <header>
        <a class="logo" href="index.html">Practice Hub</a>
        <div class="timer" id="timer">00:00</div>
    </header>
    <main>
        <section class="panel" id="setup-panel">
            <h1>Breathing Focus</h1>
            <p>Follow the circle: inhale, hold, exhale. Keep attention on the breathing rhythm.</p>
            <div class="row">
                <div>
                    <label for="duration-select">Duration</label>
                    <select id="duration-select">
                        <option value="60">1 minute</option>
                        <option value="120">2 minutes</option>
                        <option value="300" selected>5 minutes</option>
                        <option value="600">10 minutes</option>
                    </select>
                </div>
                <div>
                    <label for="custom-minutes">Custom min</label>
                    <input id="custom-minutes" type="number" min="1" max="60" inputmode="numeric" placeholder="Optional">
                </div>
            </div>
            <button id="start-btn" type="button">Start Task</button>
        </section>

        <section class="panel hidden" id="result-panel">
            <h2>Task Complete</h2>
            <p id="result-message">Good focus.</p>
            <div class="result-grid">
                <div class="result-box"><div class="result-value" id="planned-time">00:00</div><div class="result-label">Planned</div></div>
                <div class="result-box"><div class="result-value" id="actual-time">00:00</div><div class="result-label">Focused</div></div>
            </div>
            <button id="again-btn" type="button">Start Again</button>
        </section>

        <div class="breath-area">
            <div class="breath-circle" id="breath-circle"></div>
            <div class="cue" id="cue">Ready</div>
        </div>
    </main>

    <script>
        const timer = document.getElementById('timer');
        const circle = document.getElementById('breath-circle');
        const cue = document.getElementById('cue');
        const setupPanel = document.getElementById('setup-panel');
        const resultPanel = document.getElementById('result-panel');
        let durationMs = 0;
        let startedAt = 0;
        let interval = null;
        let active = false;
        const phases = [
            { name: 'Inhale', className: 'inhale', length: 4000 },
            { name: 'Hold', className: 'hold', length: 2000 },
            { name: 'Exhale', className: 'exhale', length: 4000 }
        ];

        document.getElementById('start-btn').addEventListener('click', startTask);
        document.getElementById('again-btn').addEventListener('click', resetTask);

        function startTask() {
            const custom = parseInt(document.getElementById('custom-minutes').value, 10);
            const seconds = Number.isFinite(custom) && custom > 0 ? custom * 60 : parseInt(document.getElementById('duration-select').value, 10);
            durationMs = seconds * 1000;
            startedAt = performance.now();
            active = true;
            setupPanel.classList.add('hidden');
            resultPanel.classList.add('hidden');
            clearInterval(interval);
            interval = setInterval(tick, 120);
            tick();
        }

        function tick() {
            if (!active) return;
            const elapsed = performance.now() - startedAt;
            const remaining = Math.max(0, durationMs - elapsed);
            timer.textContent = formatClock(remaining);
            const cycle = phases.reduce((sum, phase) => sum + phase.length, 0);
            let within = elapsed % cycle;
            let phase = phases[0];
            for (const item of phases) {
                if (within <= item.length) {
                    phase = item;
                    break;
                }
                within -= item.length;
            }
            circle.className = `breath-circle ${phase.className}`;
            cue.textContent = phase.name;
            if (remaining <= 0) finishTask();
        }

        function finishTask() {
            active = false;
            clearInterval(interval);
            const elapsed = Math.min(durationMs, performance.now() - startedAt);
            timer.textContent = '00:00';
            document.getElementById('planned-time').textContent = formatClock(durationMs);
            document.getElementById('actual-time').textContent = formatClock(elapsed);
            resultPanel.classList.remove('hidden');
            cue.textContent = 'Done';
        }

        function resetTask() {
            resultPanel.classList.add('hidden');
            setupPanel.classList.remove('hidden');
            cue.textContent = 'Ready';
            circle.className = 'breath-circle';
            timer.textContent = '00:00';
        }

        function formatClock(ms) {
            const total = Math.ceil(ms / 1000);
            return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(console.log));
        }
    </script>
</body>
