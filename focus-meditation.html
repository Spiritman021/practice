<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Focus Meditation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #050505;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .focus-page {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: rgba(5, 5, 5, 0.88);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            position: relative;
            z-index: 3;
        }

        .logo {
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .hint {
            color: #cbd5e1;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .btn {
            min-height: 42px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: #ffffff;
            color: #050505;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            padding: 10px 14px;
        }

        .stage {
            position: relative;
            display: grid;
            place-items: center;
            min-height: 0;
            background: #fff;
            overflow: hidden;
        }

        .stage:fullscreen {
            width: 100vw;
            height: 100vh;
            background: #fff;
        }

        #focus-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .center-guide {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 12px;
            height: 12px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0 24%, #111 26% 62%, #fff 64%);
            pointer-events: none;
        }

        .fullscreen-note {
            position: absolute;
            left: 16px;
            bottom: 16px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.82rem;
            font-weight: 800;
            pointer-events: none;
        }

        .stage:fullscreen .fullscreen-note {
            display: block;
        }

        .stage:fullscreen .center-guide {
            width: 14px;
            height: 14px;
        }

        @media (max-width: 700px) {
            header {
                align-items: flex-start;
                flex-direction: column;
                padding: 12px 14px;
            }

            .controls {
                width: 100%;
                justify-content: flex-start;
            }

            .hint {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="focus-page">
        <header>
            <a class="logo" href="index.html">Practice Hub</a>
            <div class="controls">
                <span class="hint">Focus on the center. Press Esc to exit fullscreen.</span>
                <button class="btn" id="fullscreen-btn" type="button">Enter Fullscreen</button>
            </div>
        </header>

        <main class="stage" id="focus-stage" aria-label="Focus meditation image">
            <canvas id="focus-canvas"></canvas>
            <div class="center-guide"></div>
            <div class="fullscreen-note">Esc exits fullscreen</div>
        </main>
    </div>

    <script>
        const stage = document.getElementById('focus-stage');
        const canvas = document.getElementById('focus-canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        window.addEventListener('resize', drawFocusPattern);

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
                return;
            }

            stage.requestFullscreen().catch(error => {
                console.log('Fullscreen request failed:', error);
            });
        }

        function updateFullscreenButton() {
            fullscreenBtn.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Enter Fullscreen';
            setTimeout(drawFocusPattern, 80);
        }

        function drawFocusPattern() {
            const rect = stage.getBoundingClientRect();
            const scale = window.devicePixelRatio || 1;
            const width = Math.max(1, Math.floor(rect.width * scale));
            const height = Math.max(1, Math.floor(rect.height * scale));

            canvas.width = width;
            canvas.height = height;
            ctx.setTransform(scale, 0, 0, scale, 0, 0);

            const viewWidth = rect.width;
            const viewHeight = rect.height;
            const centerX = viewWidth / 2;
            const centerY = viewHeight / 2;
            const radius = Math.hypot(viewWidth, viewHeight) / 2;
            const rings = 58;
            const spokes = 112;

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, viewWidth, viewHeight);

            for (let ring = rings; ring >= 0; ring--) {
                const outer = radius * (ring + 1) / (rings + 1);
                const inner = radius * ring / (rings + 1);

                for (let spoke = 0; spoke < spokes; spoke++) {
                    if ((ring + spoke) % 2 !== 0) {
                        continue;
                    }

                    const start = (spoke / spokes) * Math.PI * 2;
                    const end = ((spoke + 1) / spokes) * Math.PI * 2;

                    ctx.beginPath();
                    ctx.arc(centerX, centerY, outer, start, end);
                    ctx.arc(centerX, centerY, inner, end, start, true);
                    ctx.closePath();
                    ctx.fillStyle = '#000';
                    ctx.fill();
                }
            }

            drawRadialLines(centerX, centerY, radius, spokes);
        }

        function drawRadialLines(centerX, centerY, radius, spokes) {
            ctx.save();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.2;
            ctx.globalAlpha = 0.9;

            for (let spoke = 0; spoke < spokes; spoke += 2) {
                const angle = (spoke / spokes) * Math.PI * 2;
                const startRadius = radius * 0.04;
                ctx.beginPath();
                ctx.moveTo(centerX + Math.cos(angle) * startRadius, centerY + Math.sin(angle) * startRadius);
                ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                ctx.stroke();
            }

            ctx.restore();
        }

        drawFocusPattern();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
</body>

</html>
