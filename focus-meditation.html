<body>
    <div class="focus-page">
        <header>
            <a class="logo" href="index.html">Practice Hub</a>
            <div class="controls">
                <span class="hint">Focus on the center. Press Esc to exit fullscreen.</span>
                <button class="btn" id="fullscreen-btn" type="button">Enter Fullscreen</button>
            </div>
        </header>

        <main class="stage" id="focus-stage" aria-label="Focus meditation image">
            <canvas id="focus-canvas"></canvas>
            <div class="center-guide"></div>
            <div class="fullscreen-note">Esc exits fullscreen</div>
            <div class="session-timer hidden" id="session-timer">00:00</div>

            <section class="task-panel" id="setup-panel">
                <h1>Focus Task</h1>
                <p>Select a time, then start. The page will enter fullscreen, end automatically, and show your result.</p>
                <div class="form-row">
                    <div>
                        <label for="duration-select">Duration</label>
                        <select id="duration-select">
                            <option value="60">1 minute</option>
                            <option value="120">2 minutes</option>
                            <option value="300" selected>5 minutes</option>
                            <option value="600">10 minutes</option>
                            <option value="900">15 minutes</option>
                        </select>
                    </div>
                    <div>
                        <label for="custom-minutes">Custom min</label>
                        <input id="custom-minutes" type="number" min="1" max="60" inputmode="numeric" placeholder="Optional">
                    </div>
                </div>
                <button class="btn" id="start-task-btn" type="button">Start Focus Task</button>
            </section>

            <section class="task-panel hidden" id="result-panel">
                <h2>Focus Complete</h2>
                <p id="result-message">Session finished.</p>
                <div class="result-grid">
                    <div class="result-box">
                        <div class="result-value" id="planned-time">00:00</div>
                        <div class="result-label">Planned</div>
                    </div>
                    <div class="result-box">
                        <div class="result-value" id="actual-time">00:00</div>
                        <div class="result-label">Focused</div>
                    </div>
                </div>
                <button class="btn" id="restart-task-btn" type="button">Start Again</button>
            </section>
        </main>
    </div>

    <script>
        const stage = document.getElementById('focus-stage');
        const canvas = document.getElementById('focus-canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const startTaskBtn = document.getElementById('start-task-btn');
        const restartTaskBtn = document.getElementById('restart-task-btn');
        const setupPanel = document.getElementById('setup-panel');
        const resultPanel = document.getElementById('result-panel');
        const sessionTimer = document.getElementById('session-timer');
        const durationSelect = document.getElementById('duration-select');
        const customMinutes = document.getElementById('custom-minutes');

        let sessionDurationMs = 0;
        let sessionStartedAt = 0;
        let sessionTimerInterval = null;
        let sessionActive = false;

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        startTaskBtn.addEventListener('click', startFocusTask);
        restartTaskBtn.addEventListener('click', resetTask);
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        window.addEventListener('resize', drawFocusPattern);

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
                return;
            }

            stage.requestFullscreen().catch(error => {
                console.log('Fullscreen request failed:', error);
            });
        }

        function updateFullscreenButton() {
            fullscreenBtn.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Enter Fullscreen';
            if (sessionActive && !document.fullscreenElement && performance.now() - sessionStartedAt > 1000) {
                finishFocusTask(false);
            }
            setTimeout(drawFocusPattern, 80);
        }

        function startFocusTask() {
            const customValue = parseInt(customMinutes.value, 10);
            const durationSeconds = Number.isFinite(customValue) && customValue > 0
                ? customValue * 60
                : parseInt(durationSelect.value, 10);

            sessionDurationMs = durationSeconds * 1000;
            sessionStartedAt = performance.now();
            sessionActive = true;
            setupPanel.classList.add('hidden');
            resultPanel.classList.add('hidden');
            sessionTimer.classList.remove('hidden');
            updateSessionTimer();
            clearInterval(sessionTimerInterval);
            sessionTimerInterval = setInterval(updateSessionTimer, 250);

            if (!document.fullscreenElement) {
                stage.requestFullscreen().catch(error => {
                    console.log('Fullscreen request failed:', error);
                });
            }
        }

        function updateSessionTimer() {
            if (!sessionActive) {
                return;
            }

            const elapsedMs = performance.now() - sessionStartedAt;
            const remainingMs = Math.max(0, sessionDurationMs - elapsedMs);
            sessionTimer.textContent = formatClock(remainingMs);

            if (remainingMs <= 0) {
                finishFocusTask(true);
            }
        }

        function finishFocusTask(completed) {
            if (!sessionActive) {
                return;
            }

            sessionActive = false;
            clearInterval(sessionTimerInterval);
            const elapsedMs = Math.min(sessionDurationMs, Math.max(0, performance.now() - sessionStartedAt));
            sessionTimer.classList.add('hidden');
            document.getElementById('planned-time').textContent = formatClock(sessionDurationMs);
            document.getElementById('actual-time').textContent = formatClock(elapsedMs);
            document.getElementById('result-message').textContent = completed ? 'Task completed. Good focus.' : 'Session stopped early.';
            resultPanel.classList.remove('hidden');

            if (document.fullscreenElement) {
                document.exitFullscreen().catch(error => {
                    console.log('Fullscreen exit failed:', error);
                });
            }
        }

        function resetTask() {
            resultPanel.classList.add('hidden');
            setupPanel.classList.remove('hidden');
            sessionTimer.classList.add('hidden');
            customMinutes.value = '';
        }

        function formatClock(milliseconds) {
            const totalSeconds = Math.ceil(milliseconds / 1000);
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        function drawFocusPattern() {
            const rect = stage.getBoundingClientRect();
            const scale = window.devicePixelRatio || 1;
            const width = Math.max(1, Math.floor(rect.width * scale));
            const height = Math.max(1, Math.floor(rect.height * scale));

            canvas.width = width;
            canvas.height = height;
            ctx.setTransform(scale, 0, 0, scale, 0, 0);

            const viewWidth = rect.width;
            const viewHeight = rect.height;
            const centerX = viewWidth / 2;
            const centerY = viewHeight / 2;
            const radius = Math.hypot(viewWidth, viewHeight) / 2;
            const rings = 58;
            const spokes = 112;

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, viewWidth, viewHeight);

            for (let ring = rings; ring >= 0; ring--) {
                const outer = radius * (ring + 1) / (rings + 1);
                const inner = radius * ring / (rings + 1);

                for (let spoke = 0; spoke < spokes; spoke++) {
                    if ((ring + spoke) % 2 !== 0) {
                        continue;
                    }

                    const start = (spoke / spokes) * Math.PI * 2;
                    const end = ((spoke + 1) / spokes) * Math.PI * 2;

                    ctx.beginPath();
                    ctx.arc(centerX, centerY, outer, start, end);
                    ctx.arc(centerX, centerY, inner, end, start, true);
                    ctx.closePath();
                    ctx.fillStyle = '#000';
                    ctx.fill();
                }
            }

            drawRadialLines(centerX, centerY, radius, spokes);
        }

        function drawRadialLines(centerX, centerY, radius, spokes) {
            ctx.save();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.2;
            ctx.globalAlpha = 0.9;

            for (let spoke = 0; spoke < spokes; spoke += 2) {
                const angle = (spoke / spokes) * Math.PI * 2;
                const startRadius = radius * 0.04;
                ctx.beginPath();
                ctx.moveTo(centerX + Math.cos(angle) * startRadius, centerY + Math.sin(angle) * startRadius);
                ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                ctx.stroke();
            }

            ctx.restore();
        }

        drawFocusPattern();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
